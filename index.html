<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#B25835">
<title>Jess's Cycle Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#B25835;color:#3D2C2C;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:0 0 110px}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .12s}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
:root{
--bg:#B25835;--cream:#FFF6F0;--cream2:#FEEDE3;--cream3:#F0DDD0;
--cobalt:#2B5C8A;--cob-bg:rgba(43,92,138,.1);
--burnt:#C4652A;--burnt-bg:rgba(196,101,42,.1);
--gold:#9A7B1E;--gold-bg:rgba(154,123,30,.1);
--rose:#A84455;--rose-bg:rgba(168,68,85,.08);
--plum:#6B4E8B;--plum-bg:rgba(107,78,139,.08);
--forest:#4A7D5E;--forest-bg:rgba(74,125,94,.08);
--txt:#3D2C2C;--txt2:#6B5E56;--txt3:#8A7D74;--txt4:#A0928A;--txt5:#B8ADA4;
--card:#fff;--sh:0 1px 4px rgba(60,30,10,.06);
}
.hdr{padding:28px 20px 16px;background:var(--bg)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr h1{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px;margin:0}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}
.csv-btn{background:rgba(255,255,255,.15);border-radius:10px;padding:8px 12px;color:#fff;font-size:11px;font-weight:600}
.tabs{display:flex;gap:2px;padding:3px 16px 14px;background:var(--bg)}
.tab{flex:1;padding:9px 0;border-radius:10px;font-size:11px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.55);text-align:center}
.tab.on{background:var(--cream);color:var(--txt)}
.content{background:var(--cream2);border-radius:24px 24px 0 0;min-height:80vh;padding:8px 0 40px}
.section{padding:0 16px;margin-bottom:12px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 0 8px}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt3)}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:10px}
.ring-container{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.ring-svg{width:150px;height:150px}
.ring-bg{fill:none;stroke:var(--cream3);stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:38px;font-weight:800;color:var(--txt);line-height:1}
.ring-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700}
.phase-dot{width:8px;height:8px;border-radius:50%}
.phase-desc{font-size:12px;color:var(--txt2);line-height:1.5;margin-top:6px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sh)}
.sv{font-size:20px;font-weight:800;color:var(--txt)}
.sl{font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.cw{background:var(--card);border-radius:16px;padding:12px 8px 8px;box-shadow:var(--sh);margin-bottom:10px}
canvas{width:100%;display:block}
.filters{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px;margin-bottom:10px}
.flt{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card);color:var(--txt3);box-shadow:var(--sh)}
.flt.on{color:#fff}
.flt-ov.on{background:var(--gold)}.flt-per.on{background:var(--rose)}.flt-sex.on{background:var(--cobalt)}.flt-cm.on{background:var(--burnt)}
.pills{display:flex;gap:6px;padding:0 16px;overflow-x:auto;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.pill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;background:var(--card);color:var(--txt3);white-space:nowrap;box-shadow:var(--sh);flex-shrink:0}
.pill.on{background:var(--cobalt);color:#fff}
.pill.dim{opacity:.35}
.pill.clr{color:#fff}
.rdg{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04);cursor:pointer}
.rdg:last-child{border-bottom:none}
.rdg-d{width:32px;font-size:18px;font-weight:800;color:var(--txt);text-align:center}
.rdg-dt{font-size:10px;color:var(--txt4);text-align:center}
.rdg-m{flex:1}.rdg-t{font-size:15px;font-weight:700;color:var(--txt)}
.rdg-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.rdg-tag{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
.mbg{position:fixed;inset:0;background:rgba(60,30,10,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mdl{background:var(--cream);border-radius:24px 24px 0 0;padding:20px 20px calc(30px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;width:100%;max-width:480px}
.mt{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:16px}
.fl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.fi{width:100%;padding:12px;border:2px solid var(--cream3);border-radius:12px;font-size:15px;background:var(--card);color:var(--txt);outline:none}
.fi:focus{border-color:var(--cobalt)}
.fr{margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:700;background:var(--card);color:var(--txt3);box-shadow:var(--sh)}
.chip.on{color:#fff}
.chip-m.on{background:var(--cobalt)}.chip-s.on{background:var(--burnt)}.chip-c.on{background:var(--gold)}.chip-f.on{background:var(--rose)}
.br{display:flex;gap:10px;margin-top:16px}
.cb{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:700;background:var(--cream3);color:var(--txt2)}
.sb{flex:2;padding:14px;border-radius:14px;font-size:14px;font-weight:800;background:var(--burnt);color:#fff}
.db{width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;background:var(--rose-bg);color:var(--rose);margin-top:10px}
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:calc(50% - 220px);width:56px;height:56px;border-radius:50%;background:var(--cobalt);color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(43,92,138,.35);z-index:50}
@media(max-width:480px){.fab{right:20px}}
.toast{position:fixed;top:calc(16px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);z-index:999;background:var(--cobalt);border-radius:20px;padding:8px 20px;font-size:12px;font-weight:700;color:#fff;animation:fi .2s;pointer-events:none}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.tr{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.tl{font-size:13px;font-weight:600;color:var(--txt)}
.tg{width:44px;height:26px;border-radius:13px;background:var(--cream3);position:relative;transition:background .2s;cursor:pointer}
.tg.on{background:var(--cobalt)}
.tg::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tg.on::after{transform:translateX(18px)}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pn{font-size:11px;font-weight:600;color:var(--txt2);width:80px;text-align:right;flex-shrink:0}
.pt{flex:1;background:var(--cream3);border-radius:4px;height:8px;overflow:hidden}
.pb{height:8px;border-radius:4px}
.ni{padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04)}.ni:last-child{border-bottom:none}
.nm{font-size:10px;font-weight:600;color:var(--txt4);margin-bottom:4px}
.nt{font-size:13px;color:var(--txt);line-height:1.4}
.pu{width:100%;padding:20px;border:2px dashed var(--cream3);border-radius:14px;text-align:center;color:var(--txt4);font-size:12px;font-weight:600;cursor:pointer;background:var(--card)}
.pth{width:60px;height:60px;border-radius:10px;object-fit:cover;border:2px solid var(--cream3)}
textarea{resize:vertical;min-height:60px}
/* Landscape mode */
@media(orientation:landscape) and (max-height:500px){
  .hdr{padding:12px 20px 8px}
  .hdr h1{font-size:18px}
  .hdr-sub{display:none}
  .tabs{padding:2px 16px 6px}
  .tab{padding:6px 0;font-size:11px}
  .content{padding:4px 0 20px;border-radius:16px 16px 0 0}
  .app{max-width:100%;padding-bottom:60px}
  .section{padding:0 12px;margin-bottom:6px}
  .card{padding:10px;margin-bottom:6px;border-radius:12px}
  .cw{padding:6px 4px 4px;border-radius:12px;margin-bottom:6px}
  .cw canvas{height:calc(100vh - 160px)!important;min-height:200px}
  .pills{margin-bottom:6px;padding:0 12px}
  .pill{padding:5px 10px;font-size:11px}
  .filters{padding:0 12px;margin-bottom:6px;gap:4px}
  .flt{padding:4px 10px;font-size:10px}
  .fab{width:44px;height:44px;font-size:22px;bottom:calc(12px + env(safe-area-inset-bottom,0px))}
  .sg{gap:6px}
  .sc{padding:10px}
  .sv{font-size:16px}
  .ring-container{width:100px;height:100px}
  .ring-svg{width:100px;height:100px}
  .ring-num{font-size:26px}
  .sec-hdr{padding:8px 0 4px}
  /* Hide non-chart content on overlay/cycle when landscape */
  .land-hide{display:none!important}
}
/* Quick log */
.ql{display:flex;gap:8px;align-items:center}
.ql input{flex:1;padding:10px 12px;border:2px solid var(--cream3);border-radius:12px;font-size:16px;font-weight:700;background:var(--card);color:var(--txt);text-align:center;outline:none}
.ql input:focus{border-color:var(--cobalt)}
.ql button{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:800;background:var(--cobalt);color:#fff}
/* OV prob */
.prob-bar{height:24px;border-radius:12px;background:var(--cream3);overflow:hidden;position:relative}
.prob-fill{height:100%;border-radius:12px;transition:width .5s ease}
.prob-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--txt)}
/* Compare */
.cmp-sel{display:flex;gap:8px;margin-bottom:10px}
.cmp-sel select{flex:1;padding:10px;border:2px solid var(--cream3);border-radius:12px;font-size:13px;font-weight:600;background:var(--card);color:var(--txt);outline:none;-webkit-appearance:none}
/* PT log */
.pt-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.pt-row:last-child{border-bottom:none}
.pt-res{padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700}
/* Meds */
.med-chip{padding:6px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--forest-bg);color:var(--forest);display:inline-flex;align-items:center;gap:4px}
/* Backup */
.bk-row{display:flex;gap:8px}
.bk-btn{flex:1;padding:12px;border-radius:12px;font-size:12px;font-weight:700;text-align:center}
/* Heatmap */
.hm{display:grid;grid-template-columns:repeat(auto-fill,22px);gap:2px}
.hm-cell{width:22px;height:22px;border-radius:4px;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:700;color:rgba(0,0,0,.3)}
/* Summary card */
.sum-card{background:var(--card);border-radius:16px;padding:20px;box-shadow:var(--sh);margin-bottom:10px;position:relative;overflow:hidden}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--cobalt),var(--burnt))}
.sum-row{display:flex;justify-content:space-between;padding:4px 0}
.sum-lbl{font-size:11px;color:var(--txt3)}.sum-val{font-size:11px;font-weight:700;color:var(--txt)}
/* Score ring */
.score-ring{position:relative;width:60px;height:60px;display:inline-flex;align-items:center;justify-content:center}
.score-ring svg{width:60px;height:60px}
.score-ring .sr-bg{fill:none;stroke:var(--cream3);stroke-width:5}
.score-ring .sr-fg{fill:none;stroke-width:5;stroke-linecap:round}
.score-num{position:absolute;font-size:14px;font-weight:800}
/* Notif banner */
.notif{padding:10px 14px;border-radius:12px;margin-bottom:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.notif-icon{font-size:16px;flex-shrink:0}
/* Smooth toggle */
.sm-tg{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--txt3);padding:0 16px;margin-bottom:6px}
/* TWW tracker */
.tww-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:10px}
.tww-day{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.tww-day:last-child{border-bottom:none}
.tww-dpo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.tww-dpo.now{background:var(--cobalt);color:#fff}
.tww-dpo.past{background:var(--cream3);color:var(--txt3)}
.tww-dpo.future{background:var(--cream);color:var(--txt5);border:1px dashed var(--cream3)}
.tww-info{flex:1}
.tww-title{font-size:12px;font-weight:700;color:var(--txt)}
.tww-desc{font-size:11px;color:var(--txt3);line-height:1.4;margin-top:2px}
/* Journey timeline */
.jrn-line{position:relative;padding-left:24px;border-left:2px solid var(--cream3);margin-left:10px}
.jrn-dot{position:absolute;left:-7px;top:8px;width:12px;height:12px;border-radius:50%}
.jrn-item{padding:6px 0 16px;position:relative}
.jrn-date{font-size:10px;font-weight:600;color:var(--txt4)}
.jrn-text{font-size:12px;font-weight:600;color:var(--txt);margin-top:2px}
/* Appointment */
.appt-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.appt-item:last-child{border-bottom:none}
/* Mood journal */
.mj-entry{padding:12px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.mj-entry:last-child{border-bottom:none}
.mj-date{font-size:10px;font-weight:600;color:var(--txt4);margin-bottom:4px}
.mj-text{font-size:13px;color:var(--txt);line-height:1.5;white-space:pre-wrap}
/* CM score */
.cm-score{display:flex;align-items:center;gap:12px}
.cm-bar{flex:1;height:8px;border-radius:4px;background:var(--cream3);overflow:hidden}
.cm-fill{height:100%;border-radius:4px}
/* AI insight */
.ai-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:var(--sh);margin-bottom:10px;border-left:3px solid var(--cobalt)}
.ai-btn{width:100%;padding:14px;border-radius:14px;font-size:13px;font-weight:700;background:var(--cob-bg);color:var(--cobalt);display:flex;align-items:center;justify-content:center;gap:8px}
.ai-btn:active{background:var(--cobalt);color:#fff}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--txt3);font-size:12px;padding:12px 0}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--cobalt);animation:pulse 1s infinite}
.ai-dot:nth-child(2){animation-delay:.2s}.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ai-text{font-size:13px;color:var(--txt);line-height:1.6;white-space:pre-wrap}
.ai-disclaimer{font-size:9px;color:var(--txt4);margin-top:8px;font-style:italic}
/* Game plan */
.gp{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--sh);margin-bottom:10px;position:relative;overflow:hidden}
.gp::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.gp-title{font-size:15px;font-weight:800;color:var(--txt);margin-bottom:4px}
.gp-sub{font-size:12px;color:var(--txt2);line-height:1.5}
.gp-actions{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.gp-action{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--txt);padding:6px 0}
.gp-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.gp-check.done{background:var(--forest);border-color:var(--forest);color:#fff}
/* Quick symptom taps */
.qs-wrap{padding:0 16px;margin-bottom:10px}
.qs-chips{display:flex;flex-wrap:wrap;gap:6px}
.qs-chip{padding:10px 14px;border-radius:20px;font-size:13px;font-weight:600;background:var(--card);color:var(--txt3);box-shadow:var(--sh);min-height:40px;display:flex;align-items:center}
.qs-chip.on{color:#fff;box-shadow:none}
.qs-chip.on-s{background:var(--burnt)}.qs-chip.on-m{background:var(--cobalt)}.qs-chip.on-c{background:var(--gold)}
/* Collapsible sections */
.col-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.col-hdr .sec-title{margin:0}
.col-arrow{font-size:14px;color:var(--txt4);transition:transform .2s}
.col-arrow.open{transform:rotate(180deg)}
.col-body{overflow:hidden;transition:max-height .3s ease}
.col-body.shut{max-height:0!important;padding:0;overflow:hidden}
/* Auto-save indicator */
.save-ind{position:fixed;top:calc(8px + env(safe-area-inset-top,0px));right:16px;z-index:998;background:var(--forest);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;opacity:0;transition:opacity .2s;pointer-events:none}
.save-ind.show{opacity:1}
/* Backup banner */
.bk-banner{padding:10px 14px;border-radius:12px;font-size:11px;color:var(--txt3);background:var(--cream);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bk-banner.warn{background:var(--rose-bg);color:var(--rose)}
/* Period start button */
.period-btn{width:100%;padding:14px;border-radius:14px;font-size:14px;font-weight:800;background:var(--rose);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px}
/* Pull to refresh */
.ptr-indicator{text-align:center;padding:8px;font-size:11px;color:var(--txt4);display:none}
.ptr-indicator.show{display:block}
/* Streak */
.streak{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--burnt);padding:3px 8px;border-radius:8px;background:var(--burnt-bg)}
/* Phase progress bar */
.phase-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0 4px}
.phase-bar div{height:100%}
.phase-marker{position:absolute;width:3px;height:14px;background:var(--txt);border-radius:2px;top:-3px}
/* Cycle history cards */
.cyc-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cyc-card:active{transform:scale(.98)}
.cyc-hdr{display:flex;justify-content:space-between;align-items:center}
.cyc-mini{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cyc-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px}
/* Share card */
.share-card{background:linear-gradient(135deg,#FFF6F0 0%,#F5E6D8 100%);border-radius:20px;padding:24px;position:relative;overflow:hidden}
.share-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--cobalt),var(--burnt))}
.share-card h2{font-size:16px;color:var(--txt);margin:0 0 12px}
.share-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.share-lbl{color:var(--txt3)}.share-val{font-weight:700;color:var(--txt)}
/* Regularity gauge */

/* Conception probability: based on intercourse timing relative to OV */
function conceptionProb(ci){
  var c=D.cycles[ci];var od=effOv(ci);if(!od)return null;
  var fw={};// fertile window: OV-5 to OV (day of OV is day 0)
  for(var d=od-5;d<=od;d++)fw[d]=true;
  var hits=0,total=0;
  c.readings.forEach(function(r){
    if(fw[r.day]){total++;if(D.sex[r.date])hits++}
  });
  // Also check sex dates not in readings
  var cStart=new Date(c.key+'T12:00:00');
  for(var d2=od-5;d2<=od;d2++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+d2-1);

    if(D.sex[ds]&&!fw['_'+d2]){fw['_'+d2]=true;if(!c.readings.find(function(r){return r.day===d2})){total++;hits++}}
  }
  if(total===0)return{pct:0,hits:0,total:6,lbl:"No fertile window data"};
  // Weight by proximity to OV
  var score=0,maxScore=0;
  for(var d3=od-5;d3<=od;d3++){
    var w=d3===od?0.1:d3===od-1?0.3:d3===od-2?0.27:d3===od-3?0.16:d3===od-4?0.1:0.07;

    var dt2=new Date(cStart);dt2.setDate(dt2.getDate()+d3-1);var ds2=dt2.toISOString().slice(0,10);
    if(D.sex[ds2])score+=w;
  }
  var pct=Math.round(score/maxScore*100);
  var lbl=pct>=70?"Excellent timing":pct>=40?"Good timing":pct>=15?"Some chance":"Low — missed fertile window";
  return{pct:pct,hits:hits,total:6,lbl:lbl}
}

/* Intercourse timing score for current cycle */
function ixScore(ci){
  var c=D.cycles[ci];var od=effOv(ci);if(!od)return null;
  var cStart=new Date(c.key+'T12:00:00');
  var days=[];
  for(var d=od-5;d<=od;d++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+d-1);var ds=dt.toISOString().slice(0,10);
    var w=d===od?"OV day":d===od-1?"OV-1 (peak)":d===od-2?"OV-2 (high)":"OV-"+(od-d);
    days.push({day:d,date:ds,label:w,hit:!!D.sex[ds],peak:d>=od-2&&d<=od})
  }
  return days
}

/* 3-day moving average */
function smooth3(readings){
  return readings.map(function(r,i){
    var sum=r.temp,cnt=1;
    if(i>0){sum+=readings[i-1].temp;cnt++}
    if(i<readings.length-1){sum+=readings[i+1].temp;cnt++}
    return{day:r.day,temp:sum/cnt}
  })
}

/* BBT triphasic detection: second temp rise 7-10 DPO */
function detectTriphasic(c,ci){
  var od=effOv(ci);if(!od)return null;
  var cl=avgCL2();if(!cl)return null;
  var post=c.readings.filter(function(r){return r.day>od});
  if(post.length<8)return null;
  // Get average of DPO 1-6 and DPO 7-10
  var early=[],late=[];
  post.forEach(function(r){var dpo=r.day-od;if(dpo>=1&&dpo<=6)early.push(r.temp);if(dpo>=7&&dpo<=10)late.push(r.temp)});
  if(early.length<3||late.length<2)return null;
  var earlyAvg=early.reduce(function(a,b){return a+b},0)/early.length;
  var lateAvg=late.reduce(function(a,b){return a+b},0)/late.length;
  var shift=lateAvg-earlyAvg;
  if(shift>=0.1)return{found:true,shift:shift.toFixed(2),earlyAvg:earlyAvg.toFixed(2),lateAvg:lateAvg.toFixed(2)};
  return{found:false,shift:shift.toFixed(2)}
}

/* CM quality scoring */
function cmScore(ci){
  var c=D.cycles[ci];var od=effOv(ci)||aod();
  var fertile=[];// Days OV-5 to OV
  c.readings.forEach(function(r){
    if(r.day>=od-5&&r.day<=od){
      var syms=D.sym[r.date]||[];
      var cm=syms.filter(function(s){return s.indexOf("CM:")===0});
      fertile.push({day:r.day,cm:cm})
    }
  });
  if(!fertile.length)return null;
  var score=0,max=0;
  fertile.forEach(function(f){
    max+=3;// max 3 per day
    f.cm.forEach(function(c2){
      if(c2==="CM: Egg white")score+=3;
      else if(c2==="CM: Watery")score+=2;
      else if(c2==="CM: Creamy")score+=1;
    });
    if(!f.cm.length)score+=0;
  });
  var pct=max>0?Math.round(score/max*100):0;
  var lbl=pct>=70?"Excellent — peak fertility CM":pct>=40?"Good — some fertile CM":pct>=10?"Fair — mostly non-fertile CM":"Low — no fertile CM logged";
  return{pct:pct,lbl:lbl,logged:fertile.filter(function(f){return f.cm.length}).length,total:fertile.length}
}

/* Am I late? calculator */

  var late=curLut>avgLut;var veryLate=curLut>maxLut;

}

/* OV probability: count consecutive post-OV temps above coverline */
function ovProb(c,ci){
  var od=effOv(ci);if(!od)return null;var cl=avgCL2();if(!cl)return null;
  var post=c.readings.filter(function(r){return r.day>od});
  var above=0;for(var i=0;i<post.length;i++){if(post[i].temp>=cl)above++;else break}
  if(above>=3)return{pct:95,lbl:"Very likely confirmed"};
  if(above>=2)return{pct:75,lbl:"Likely — need 1 more high temp"};
  if(above>=1)return{pct:45,lbl:"Possible — too early to confirm"};
  return{pct:20,lbl:"Waiting for temp shift"};
}
/* Cycle regularity score */
function regScore(){
  var lens=[];D.cycles.forEach(function(c,i){if(!isExcl(i)&&c.length)lens.push(c.length)});
  if(lens.length<3)return null;
  var avg=lens.reduce(function(a,b){return a+b},0)/lens.length;
  var variance=lens.reduce(function(a,b){return a+(b-avg)*(b-avg)},0)/lens.length;
  var sd=Math.sqrt(variance);
  var pct=Math.max(0,Math.min(100,Math.round(100-sd*10)));
  var lbl=pct>=80?"Very regular":pct>=60?"Fairly regular":pct>=40?"Somewhat irregular":"Irregular";
  return{pct:pct,lbl:lbl,sd:sd.toFixed(1),avg:Math.round(avg)}
}

/* Symptom trends — frequency per cycle */
function symTrends(){
  var symMap={};
  D.cycles.forEach(function(c,i){
    if(isExcl(i))return;
    var seen={};
    c.readings.forEach(function(r){
      var sy=D.sym[r.date]||[];
      sy.forEach(function(s){if(!seen[s]){seen[s]=true;if(!symMap[s])symMap[s]=[];symMap[s].push(i)}})
    });
  });
  var total=D.cycles.filter(function(c,i){return!isExcl(i)}).length;
  var trends=[];
  Object.keys(symMap).forEach(function(s){
    var count=symMap[s].length;
    // Check if trending up (appears in recent cycles more)
    var recentCount=symMap[s].filter(function(i){return i>=D.cycles.length-4}).length;
    var earlyCount=symMap[s].filter(function(i){return i<D.cycles.length-4}).length;
    var earlyRate=D.cycles.length>4?earlyCount/Math.max(1,D.cycles.length-4):0;
    var recentRate=recentCount/Math.min(4,D.cycles.length);
    var trend=recentRate>earlyRate+0.15?"up":recentRate<earlyRate-0.15?"down":"stable";
    trends.push({sym:s,count:count,pct:Math.round(count/total*100),trend:trend})
  });
  return trends.sort(function(a,b){return b.count-a.count})
}

      h+='<div class="section"><div class="sec-hdr"><span class="sec-title">Two Week Wait</span></div><div class="tww-card">';
      for(var tw=Math.max(1,dpo-2);tw<=Math.min(14,dpo+3);tw++){

        h+='<div class="tww-day"><div class="tww-dpo '+cls+'">'+tw+'</div><div class="tww-info"><div class="tww-title">'+g.t+'</div><div class="tww-desc">'+g.d+'</div></div></div>'
      }
      h+='</div></div>'}}
  // Mood journal for today
  h+='<div class="section"><div class="card" style="padding:12px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="fl" style="margin:0">Journal</div><button onclick="openJournal()" style="font-size:11px;font-weight:700;color:var(--cobalt);background:none">'+(D.journal[td()]?'Edit':'Write')+'</button></div>';
  if(D.journal[td()])h+='<div style="font-size:12px;color:var(--txt);line-height:1.5;white-space:pre-wrap">'+D.journal[td()].substring(0,100)+(D.journal[td()].length>100?'…':'')+'</div>';
  else h+='<div style="font-size:12px;color:var(--txt4)">How are you feeling today?</div>';
  h+='</div></div>';
  // Meds for today
  var todayMeds=D.meds[td()]||[];
  h+='<div class="section"><div class="card" style="padding:12px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="fl" style="margin:0">Medications Today</div><button onclick="openMeds()" style="font-size:11px;font-weight:700;color:var(--cobalt);background:none">Edit</button></div>';
  if(todayMeds.length){todayMeds.forEach(function(m){h+='<span class="med-chip" style="margin:0 4px 4px 0">💊 '+m+'</span>'})}
  else h+='<div style="font-size:12px;color:var(--txt4)">None logged — tap Edit to add</div>';
  h+='</div></div>';
  // Compare this day
  h+='<div class="section"><div class="sec-hdr"><span class="sec-title">Day '+info.cd+' Across Cycles</span></div>';
  var cmp=[];D.cycles.forEach(function(c,i){var r3=c.readings.find(function(x){return x.day===info.cd});if(r3)cmp.push({i:i,t:r3.temp,d:r3.date})});
  if(cmp.length){var av2=cmp.reduce(function(a,b){return a+b.t},0)/cmp.length;h+='<div class="card"><div style="font-size:11px;color:var(--txt3);margin-bottom:8px">Average: <strong style="color:var(--txt)">'+av2.toFixed(2)+'°C</strong></div>';cmp.forEach(function(c2){h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04)"><span style="font-size:12px;font-weight:600;color:'+PAL[c2.i%7]+'">C'+(c2.i+1)+' · '+fd(c2.d)+'</span><span style="font-size:14px;font-weight:700;color:var(--txt)">'+c2.t.toFixed(2)+'°</span></div>'});h+='</div>'}
  else h+='<div class="card" style="color:var(--txt3);font-size:12px">No data for Day '+info.cd+' yet</div>';
  h+='</div>';
  h+='</div></div>';/* close col-body + section for Analysis */
  return h;
}

function quickLog(){var t=parseFloat(document.getElementById('qlT').value);if(isNaN(t)){flash("Enter a temp");return}var date=td();var last=D.cycles[D.cycles.length-1];var day=db(last.key,date)+1;var rdg={day:day,date:date,temp:t};var ei=last.readings.findIndex(function(r){return r.date===date});if(ei>-1)last.readings[ei].temp=t;else{last.readings.push(rdg);last.readings.sort(function(a,b){return a.day-b.day})}save();render();flash("Logged "+t.toFixed(2)+"° ✓")}

/* SYMPTOM KNOWLEDGE BASE */
var SKB={
"Cramps":{menstrual:"Ugh, cramps. Your uterus is doing its thing — squeezing to shed the lining. Totally normal, even if it doesn't feel great. A hot water bottle and ibuprofen are your best friends today.",follicular:"A bit of cramping now is usually just your ovaries waking up and getting follicles ready. Nothing to stress about — your body's just warming up for the main event.",ovulatory:"Ooh, this could actually be a good sign! It's called mittelschmerz (fancy German for 'middle pain') and it happens when your follicle pops to release the egg. If it's on one side, even more likely. Your body is doing exactly what it should be doing. 🎯",luteal:"Progesterone is the culprit here — it makes everything a bit crampy and uncomfortable after ovulation. Totally par for the course in the luteal phase. Nothing unusual.",dpo:{"6-9":"OK so cramping at "+6+"-9 DPO is one of those symptoms that makes you sit up and pay attention. This is smack in the middle of the implantation window, and some women do feel a pulling or pinching sensation when the embryo burrows into the lining. It's subtle though — more like a twinge than period cramps. Try not to obsess (easier said than done, I know).","10-12":"The million-pound question: is this my period coming or implantation? Honestly? It's impossible to tell from cramps alone — the same hormones cause both. If your period doesn't show by 12 DPO, grab a test. The waiting is the hardest part.","13-14":"You're right at the point where your period would normally start. Cramps now could mean it's on its way, or if you're pregnant, your uterus is doing a lot of adjusting. If you haven't tested, now's the time."}},
"Bloating":{menstrual:"Feeling like a balloon? That's prostaglandins causing inflammation and your body holding onto water. It passes — promise. Loose clothes and peppermint tea help.",follicular:"Bloating in the follicular phase isn't super common cycle-wise. Could be what you ate, stress, or just one of those days. Nothing to read into.",ovulatory:"Blame oestrogen — it's peaking right now and that makes you hold onto water. Some women swell up like clockwork around ovulation. It'll settle in a day or two.",luteal:"Welcome to the progesterone bloat club. Basically every woman in the luteal phase is dealing with this — progesterone literally slows your digestion down, so everything just... sits there. Lovely.",dpo:{"6-9":"Here's the frustrating truth: progesterone bloat feels exactly the same whether or not there's a little embryo in there. Your body can't tell you the answer yet. Try to distract yourself (I know, I know).","10-14":"Still bloated? Could be PMS, could be early pregnancy — both involve the same hormones doing the same things. If it helps, lots of women who got their positive said the bloating was worse than usual. But lots who didn't also said that. 🤷‍♀️"}},
"Headache":{menstrual:"Hormone headaches at the start of your period are really common — your oestrogen just crashed and your brain is adjusting. Water, paracetamol, and rest. Be kind to yourself.",follicular:"A headache now probably isn't cycle-related. Are you drinking enough water? Sleeping OK? Stressed? Check the basics first.",ovulatory:"The oestrogen surge around ovulation can trigger headaches in some women, especially if you're prone to migraines. It should pass once things settle.",luteal:"Your hormones are all over the place right now — progesterone up, oestrogen fluctuating. Some women get headaches like clockwork in the luteal phase. Stay hydrated, it really does help.",dpo:{"6-9":"Headaches during the implantation window are fairly common — your body is going through hormonal shifts regardless of what's happening. Not a reliable sign either way, but worth noting.","10-14":"Fun fact: headaches are actually one of the more commonly reported early pregnancy symptoms because your blood volume starts increasing quite early. But they're also a classic PMS thing. Helpful, right? 😅"}},
"Fatigue":{menstrual:"You're tired because your body is literally doing hard physical work right now, plus your iron levels dip during your period. Eat some red meat or spinach, rest when you can, and don't feel guilty about it.",follicular:"Your energy should be picking up as oestrogen rises — it's usually the 'feel good' phase. If you're still wiped, check your sleep, iron levels, or stress. Something else might be going on.",ovulatory:"Most women feel a burst of energy around ovulation — nature's way of making you feel social and, well, amorous. If you're tired instead, it might be worth checking if something else is off.",luteal:"OK here's the thing about progesterone: it is literally a sedative. Like, it acts on the same brain receptors as sleeping pills. So if you feel like you could sleep for a week, that is 100% normal and expected.",dpo:{"6-9":"The tiredness you're feeling is progesterone — it doesn't care whether you're pregnant or not, it just makes you exhausted. HOWEVER, if implantation happens, hCG starts adding to the fatigue. Some women describe early pregnancy fatigue as a different kind of tired — like bone-deep, falling-asleep-at-your-desk tired rather than just sleepy.","10-14":"If you're absolutely shattered and this feels different or stronger than your usual luteal tiredness, it's worth paying attention. Fatigue is consistently one of the first symptoms women notice before their positive test. Your body might be working overtime growing something tiny. Test at 12+ DPO if this isn't normal for you. 🤞"}},
"Nausea":{menstrual:"Period nausea is a real thing — prostaglandins (the same chemicals causing cramps) can upset your stomach too. Ginger tea, small meals, and fresh air all help.",follicular:"Feeling queasy in the follicular phase isn't typically cycle-related. Could be something you ate, anxiety, or just a rough day. Keep an eye on it but don't worry.",ovulatory:"Some women get a wave of nausea around ovulation from the hormone surge. It's brief and nothing to worry about — just your body reacting to the oestrogen peak.",luteal:"Progesterone slows everything down, including your digestion. That sluggish, slightly sick feeling? Classic. Eat little and often rather than big meals.",dpo:{"6-9":"I know you're wondering, but at 6-9 DPO it's genuinely too early for pregnancy nausea — even if implantation just happened, hCG isn't high enough yet to cause sickness. This is almost certainly progesterone. The real pregnancy nausea doesn't usually kick in until 6+ weeks.","10-14":"Now THIS is interesting. If you're feeling genuinely nauseous at 10+ DPO and this isn't normal for you in the luteal phase, pay attention. Some women are really sensitive to hCG and start feeling sick earlier than the textbooks say. It's not common, but it happens. Definitely test if you haven't. 🤞"}},
"Backache":{menstrual:"Your lower back is taking a hit because the same prostaglandins causing cramps also make back muscles contract. Heat pad on your lower back and gentle stretching can help a lot.",follicular:"Back pain now probably isn't cycle-related — more likely posture, activity, or just life. Give it a stretch.",ovulatory:"Some women feel a dull ache in their lower back around ovulation — it's related to the follicle rupturing and the fluid release. Usually one-sided, usually mild.",luteal:"Progesterone relaxes your ligaments (preparing for potential pregnancy), which can make your lower back feel achy and unstable. Annoying but normal.",dpo:{"6-12":"Lower back ache in the TWW is a progesterone thing. Some women who got positives report it as an early sign — the relaxin hormone starts even earlier in pregnancy — but it's not reliable enough to read into on its own.","13-14":"Back ache near your expected period could go either way. If your period's late and your back is killing you, test. If not, it's probably just your body gearing up to bleed. 💪"}},
"Breast tenderness":{menstrual:"The tenderness usually starts to ease once your period arrives because progesterone drops. Sweet relief incoming.",follicular:"Your breasts are usually at their least tender in the follicular phase. If they're sore now, it might be something else — check in with your GP if it persists.",ovulatory:"Mild tenderness starting around ovulation makes sense — progesterone is beginning to rise and your breast tissue is sensitive to it. This is usually the very start of the luteal soreness.",luteal:"Ah, the classic. Progesterone makes breast tissue swell and get tender. It's probably the most common luteal phase symptom alongside tiredness. Some months are worse than others — it depends on how much progesterone your corpus luteum produces.",dpo:{"6-9":"Your boobs hurt because of progesterone, and they'd hurt whether or not you're pregnant right now. I know that's not what you want to hear. The honest truth is breast tenderness alone isn't a pregnancy sign at this stage — progesterone causes it regardless.","10-14":"OK so here's the thing women say about breast tenderness and pregnancy: it feels DIFFERENT. Not just tender, but fuller, heavier, and particularly sensitive around the nipples. If this feels noticeably different from your usual PMS boob pain, that's worth noting. It's not definitive, but it's one of the more commonly reported 'I knew something was different' symptoms."}},
"Acne":{menstrual:"Hormonal spots love to pop up right as your period starts. The hormone shift triggers extra oil production. It'll calm down in a few days as oestrogen rises.",follicular:"Your skin should be at its best right now — oestrogen is a skin's best friend. If you're breaking out, it might be products, diet, or stress rather than hormones.",ovulatory:"Some women get a mini breakout around ovulation from the hormone surge. Short-lived — don't worry about it.",luteal:"Progesterone + oil = spots. It's as simple as that. Your skin produces more sebum in the luteal phase, which is why you might break out like clockwork every month. Not much you can do except keep your skin clean and wait it out.",dpo:{"1-14":"Sadly, acne doesn't tell you anything about whether you're pregnant or not — it's all progesterone-driven and happens either way. Not a useful symptom for TTC, just an annoying one. 😤"}},
"Insomnia":{menstrual:"Sleep disruption at the start of your period is common — your hormones just did a nosedive and your brain is adjusting. It should settle in a day or two.",follicular:"Sleep usually improves in the follicular phase as oestrogen rises. If you're still struggling, look at screen time, caffeine, and stress — the usual suspects.",ovulatory:"Some women feel buzzy and wired around ovulation — too much energy to sleep. Nature wants you awake and sociable right now. It'll pass.",luteal:"Here's the irony: progesterone makes you desperately tired but also disrupts your deep sleep cycles. So you're exhausted AND can't sleep properly. Welcome to the luteal phase experience. 🙃",dpo:{"6-9":"Tossing and turning in the TWW is totally normal — part hormonal (progesterone), part emotional (the waiting). Try magnesium before bed and put your phone in another room.","10-14":"Insomnia at 10+ DPO is actually reported as an early pregnancy symptom more often than you'd think. Rising hCG and progesterone together can really mess with sleep patterns. If you're lying awake at 3am, at least you're not alone — every woman in the TWW is doing the same thing. 💜"}},
"Spotting":{menstrual:"Light spotting at the start or tail end of your period is completely normal — just the lining making its exit.",follicular:"Spotting between periods isn't super common. If it happens once, probably nothing. If it keeps happening, worth mentioning to your GP at your next visit.",ovulatory:"This is actually exciting! Ovulation spotting is a real thing — when the follicle ruptures to release the egg, a tiny bit of blood can escape. It's usually just a spot or two, and it's a really good sign that you actually ovulated. ✨",luteal:"Spotting after ovulation is one of those symptoms that grabs your attention when TTC. It could be implantation, or it could be a sign that progesterone is a bit low. Either way, note the colour and how long it lasts.",dpo:{"6-9":"OK, deep breath. Spotting at 6-9 DPO is in THE implantation window. If it's light pink or brown, just a small amount, and lasts hours rather than days — that ticks the boxes for implantation bleeding. About 25% of pregnancies have some spotting at this stage. Don't get your hopes too high, but... this is genuinely one of the more encouraging signs. 🤞","10-12":"Light spotting at 10-12 DPO could be late implantation or the very start of your period. The key thing to watch: does it STOP? If the spotting is brief and then nothing, that's more implantation-like. If it builds into full flow, that's your period arriving. Test if it stops.","13-14":"You're right on the edge of when your period would start. Spotting now could be period arrival or breakthrough bleeding in very early pregnancy. The only way to know is to test. Either way, you'll have your answer soon. 💛"}},
"CM: Egg white":{menstrual:"Egg white CM during your period is unusual — you probably can't tell what's CM and what's flow right now. Don't worry about tracking it today.",follicular:"Your body is gearing up! Egg white CM in the follicular phase means oestrogen is rising nicely and your body is prepping the red carpet for sperm. This is a really positive sign that ovulation is on its way.",ovulatory:"THIS IS IT. Egg white cervical mucus is the gold standard of fertility signs. It's basically a superhighway for sperm — they can swim through it easily and survive for up to 5 days. If you see this, you are at peak fertility RIGHT NOW. Go go go. 🏃‍♀️",luteal:"Egg white CM after confirmed ovulation is unusual because progesterone normally dries things up. If you're seeing it again in the luteal phase, it could be a secondary oestrogen surge, or some women report it as an early pregnancy sign. Worth noting!",dpo:{"1-5":"A bit of EWCM right after ovulation can happen as your hormones transition. Nothing unusual — the progesterone takeover isn't instant.","6-12":"Wait, egg white CM is back? After it dried up? This is one of those symptoms that gets mentioned a lot on TTC forums as an early sign. The theory is that rising hCG causes a secondary mucus surge. It's not proven, but enough women report it that it's worth writing down. 👀"}},
"CM: Watery":{menstrual:"Hard to track CM during your period — skip today.",follicular:"Watery CM means your oestrogen is building — you're on the right track towards fertile mucus. This often appears before egg white CM, so things are moving in the right direction.",ovulatory:"Watery CM is fertile! Not quite as ideal as egg white, but sperm can absolutely survive and swim in it. Don't wait for 'perfect' CM — this is good enough to get the job done. 💪",luteal:"Watery CM after ovulation is a bit unusual — progesterone normally thickens things up. Keep an eye on it.",dpo:{"6-14":"Noticing watery CM when you'd normally be dry or sticky? Some women report increased wetness before their positive test. It's not well-studied but it's a common anecdotal observation in TTC communities."}},
"CM: Creamy":{menstrual:"Can't really tell during your period — no need to track CM today.",follicular:"Creamy, lotiony CM is transitional — you're moving from dry towards fertile. Not there yet, but your body's working on it. Give it a few days and it should progress.",ovulatory:"Creamy around expected ovulation isn't quite peak, but don't dismiss it. Some women never get textbook egg white — creamy might be YOUR peak. Everyone's different.",luteal:"Creamy CM is the classic luteal phase mucus — progesterone thickens everything into that white, lotiony consistency. Totally normal and expected.",dpo:{"1-14":"Creamy CM throughout the TWW is completely standard. Some women say they had MORE creamy CM than usual before their positive, but honestly this one is really hard to read. Your body, your patterns — note it and see if a pattern emerges over time."}},
"CM: Dry":{menstrual:"Normal — your body has other priorities right now.",follicular:"Dry at the start of the follicular phase is totally normal. CM production ramps up as you get closer to ovulation. Give it time — and drink plenty of water to help things along.",ovulatory:"Dry around ovulation isn't ideal for conception since sperm need mucus to survive. Don't panic though — try staying really well hydrated (2+ litres of water), and consider using a sperm-friendly lubricant like Preseed during sex. It mimics fertile CM.",luteal:"Dry after ovulation is classic progesterone doing its job — it dries up cervical mucus to create a 'plug' at the cervix. This is completely normal and expected.",dpo:{"1-14":"Dryness in the TWW is the norm. Progesterone = dry. Don't read into it — it's just hormones being hormones."}},
"Tired":{menstrual:"Being tired during your period is your body's way of saying 'slow down, I'm busy.' Listen to it. Rest isn't lazy, it's necessary. 💤",follicular:"You should be getting your energy back as oestrogen rises. If you're still dragging, check sleep quality and iron levels.",ovulatory:"Energy usually peaks around ovulation — if you're tired instead, something else might be going on. Stress? Poor sleep? Check in with yourself.",luteal:"Progesterone is basically nature's sleeping pill. Feeling absolutely wiped in the luteal phase is THE most normal symptom there is. Everyone gets it. Nap if you can. 😴",dpo:{"6-14":"Exhaustion in the TWW is universal. But here's the thing — if this tiredness feels DIFFERENT from your usual luteal fatigue, like a bone-deep, can't-keep-your-eyes-open, falling-asleep-at-7pm kind of tired... that's what women describe as early pregnancy fatigue. Your body might be quietly building something incredible. 🤞"}},
"Irritable":{menstrual:"Snapping at everyone? Your oestrogen and progesterone just crashed simultaneously. Your irritability has a biological reason — it's not 'just you.' Give yourself grace today.",follicular:"Mood usually lifts as oestrogen rises. If you're still irritable, it might be life stuff rather than hormones. Either way, it's valid.",ovulatory:"High oestrogen usually makes you feel great, social, and patient. Irritability around ovulation is less common — might be stress or tiredness rather than hormones.",luteal:"Progesterone affects your serotonin levels, which is why you might feel more easily wound up. It's like PMS turns down your patience dial. This is genuinely chemical, not a character flaw. 💛",dpo:{"6-14":"Irritable in the TWW? Join the club. Honestly, between the progesterone messing with your serotonin AND the emotional weight of waiting to find out... anyone would be snappy. Be gentle with yourself. Your partner too — they're probably walking on eggshells already. 😂"}},
"Anxious":{menstrual:"Anxiety often spikes when your period arrives — partly hormonal (everything just dropped), partly emotional (especially when TTC, because it means this cycle didn't work). Both are valid. 💜",follicular:"Anxiety usually eases as oestrogen rises — it has a calming, mood-lifting effect. If you're still anxious, be kind to yourself. TTC is a rollercoaster even on the 'good' days.",ovulatory:"Some women feel heightened emotions around ovulation. If you're anxious, it might be about timing and pressure rather than hormones. Try to remember that stressing about it doesn't change the outcome.",luteal:"The TWW is basically an anxiety generator, especially when you're TTC. Progesterone can make anxiety worse on a chemical level, AND you're waiting for the most important test result of your life. It's a lot. 🫂",dpo:{"6-14":"Listen — the anxiety of the TWW when you want this so badly is one of the hardest parts of TTC. No amount of 'just relax' helps (and anyone who says it can shush). What IS true is that the outcome is already decided — worrying won't change it. Try to do one nice thing for yourself today. You're being so brave just by going through this. 💜"}},
"Emotional":{menstrual:"Crying at everything? Your hormones just did a dramatic shift and your brain is catching up. Plus, if you're TTC, getting your period is genuinely sad. Let yourself feel it.",follicular:"Feeling emotional in the follicular phase is less common hormonally. It might be that you're still processing the last cycle, or life is just a lot right now. That's OK.",ovulatory:"Some women feel everything more intensely around ovulation — heightened sensitivity, stronger reactions, deeper feelings. It's oestrogen amplifying everything.",luteal:"Progesterone turns up the volume on ALL your emotions. Happy becomes ecstatic, sad becomes devastating, and that advert with the puppy becomes a full-on cry session. This is SO normal. 😭📺",dpo:{"6-14":"Being emotional in the TWW is part hormones, part hope, part fear. You're carrying something huge — the weight of wanting this baby — and that's exhausting on its own. Whether you're crying because you're hopeful or crying because you're scared, both are completely valid. You're not 'too much.' You're human. 💛"}},
"Sad":{menstrual:"Sadness when your period arrives is grief, plain and simple. Each cycle that doesn't work carries a loss — the loss of what you hoped for this month. You're allowed to be sad. You're allowed to have a duvet day. This is hard. 💜",follicular:"If sadness lingers into the follicular phase, be aware of it. Some sadness after a disappointment is normal — but if it feels heavy and persistent, talk to someone. Your GP, a friend, your partner, anyone. You don't have to carry this alone.",ovulatory:"Sadness around ovulation when TTC can come from the pressure of it all — the timing, the hoping, the knowing you have to 'try' again. It can make something that should be intimate feel clinical. That's a really common feeling and you're not alone in it.",luteal:"The luteal phase is emotionally heavy when you're TTC. You're waiting, wondering, hoping, and trying not to hope too much in case you're disappointed. That's exhausting. Be gentle with yourself today. 🫂",dpo:{"6-14":"Feeling sad in the TWW is so, so common when you've been trying for a while. The hope is wonderful but it's also heavy because you know how much it hurts if it doesn't work. Whatever happens this cycle — you showed up, you tracked, you tried. That takes courage. And if you need to cry, cry. If you need to talk, reach out. You matter in this process too, not just the outcome. 💛"}},
"Happy":{menstrual:"Feeling good during your period? That's wonderful — hold onto it! Not every period has to be doom and gloom.",follicular:"Oestrogen is your mood's best friend — enjoy the uplift! This is usually the feel-good phase of your cycle.",ovulatory:"Peak mood time! Oestrogen is high, energy is up, and your body feels good. Enjoy this feeling. ✨",luteal:"Happy in the luteal phase? That's genuinely lovely. Hold onto the good moments — they make the harder days more bearable.",dpo:{"1-14":"A good day in the TWW is a gift. Don't feel guilty for being happy or worry that 'feeling too good' means anything negative. Enjoy today. 💛"}},
"Calm":{menstrual:"Feeling calm during your period is a really healthy sign. Your body is at peace with the process.",follicular:"Calm and grounded — oestrogen supports this nicely. Soak it up.",ovulatory:"Feeling centred around ovulation is lovely. Some women feel their best right now.",luteal:"Calm in the TWW is actually genuinely helpful. Studies show that chronic stress can affect implantation (though normal day-to-day stress is fine). Whatever you're doing to stay calm, keep doing it. Yoga? Baths? Good books? More of that. 🧘‍♀️",dpo:{"1-14":"Being calm during the TWW is both rare and wonderful. You're giving your body the best possible environment. Whatever happens, you're handling this beautifully."}},
"Energetic":{menstrual:"Energy during your period? Love that for you! Not everyone gets it but when you do, make the most of it.",follicular:"Classic oestrogen boost — this is your power phase! Use this energy for things that make you happy.",ovulatory:"Peak energy is nature's design — you're at your most vibrant, social, and dynamic. Enjoy it! ⚡",luteal:"Feeling energetic in the luteal phase is unusual (progesterone usually wipes you out) so this is great! Some women report unexpected bursts of energy in early pregnancy, but it's not reliable as a sign. Just enjoy feeling good!",dpo:{"1-14":"Energy in the TWW? Take it and run with it (maybe not literally — but do whatever brings you joy). Some women report feeling unexpectedly good right before their positive. But even if not, a good energy day is a win. 🙌"}},

/* COMBO ANALYSIS — detects meaningful symptom combinations */
function getComboInsights(syms,moods,phaseName,dpo,info){
  var all=syms.concat(moods);var combos=[];
  var has=function(s){return all.indexOf(s)>-1};
  var hasCM=function(t){return syms.some(function(s){return s==="CM: "+t})};

  // === IMPLANTATION SIGNS (6-12 DPO) ===
  if(dpo&&dpo>=6&&dpo<=12){
    if(has("Spotting")&&has("Cramps"))
      combos.push({icon:"🤞",color:"var(--plum)",title:"Possible implantation signs",text:"Spotting + cramps at "+dpo+" DPO is a classic implantation combo. Implantation bleeding is usually light pink/brown and lasts hours, not days. The cramping is typically milder than period cramps — more like a pulling or pinching. This is one of the more promising sign combinations in the TWW."});
    if(has("Spotting")&&!has("Cramps"))
      combos.push({icon:"🔵",color:"var(--cobalt)",title:"Spotting in the implantation window",text:"Light spotting at "+dpo+" DPO falls right in the implantation window (6-12 DPO). If it's pink or brown and very light, it could be implantation bleeding. If it turns into full red flow, it's more likely your period coming early. Watch over the next 12 hours."});
    if(has("Fatigue")&&has("Breast tenderness"))
      combos.push({icon:"📈",color:"var(--plum)",title:"Rising progesterone or early hCG",text:"Fatigue + breast tenderness at "+dpo+" DPO are both progesterone-driven — but also the first symptoms women report in early pregnancy. If these feel MORE intense than your usual luteal phase, that's worth noting. Progesterone and hCG cause very similar symptoms, which is why the TWW is so maddening."});
    if(has("Nausea")&&dpo>=8)
      combos.push({icon:"🤔",color:"var(--gold)",title:"Early nausea",text:"Nausea at "+dpo+" DPO is early but not impossible if implantation happened at 6-7 DPO. hCG doubles every 48 hours after implantation. Most pregnancy nausea starts around 6 weeks, but some women are very sensitive to hCG and feel it earlier. Note whether this is unusual for your typical luteal phase."});
    if(has("Cramps")&&has("Fatigue")&&has("Bloating"))
      combos.push({icon:"⏳",color:"var(--burnt)",title:"Could go either way",text:"Cramps + fatigue + bloating at "+dpo+" DPO is the classic 'is it PMS or pregnancy?' combo. Unfortunately these symptoms are identical in both scenarios because they're all progesterone-driven. The frustrating truth is you won't know until you can test. Try to test at 12 DPO with a FRER for the earliest reliable result."});
  }

  // === LATE LUTEAL / AM I LATE? (12+ DPO) ===
  if(dpo&&dpo>=12){

    }
  }

  return combos;
}

/* Get instant insight from KB */
function getInsight(date){
  var info=cInfo();var c=info.c;var ci=info.ci;
  var syms=D.sym[date]||[];var moods=D.mood[date]||[];var all=syms.concat(moods);
  if(!all.length)return null;
  var od=effOv(ci);var cd=db(c.key,date)+1;var dpo=od?(cd-od):null;
  var ph=phase(cd,info.av,info.ao,!!od,od);
  var phaseName=cd<=5?"menstrual":(!od||cd<(od||info.ao)-1)?"follicular":(cd>=(od||info.ao)-1&&cd<=(od||info.ao)+1)?"ovulatory":"luteal";
  // Personal history
  var hist={};all.forEach(function(s){hist[s]=0});
  D.cycles.forEach(function(cc,i){if(isExcl(i))return;cc.readings.forEach(function(r){
    if(r.day===cd){var rs=(D.sym[r.date]||[]).concat(D.mood[r.date]||[]);rs.forEach(function(s){if(hist[s]!==undefined)hist[s]++})}
  })});
  var cards=[];
  all.forEach(function(s){
    var kb=SKB[s];if(!kb)return;
    var txt=kb[phaseName]||"";
    // Check DPO-specific
    if(dpo&&dpo>0&&kb.dpo){
      var best=null;
      Object.keys(kb.dpo).forEach(function(range){
        var parts=range.split("-");var lo=parseInt(parts[0]),hi=parseInt(parts[1]||parts[0]);
        if(dpo>=lo&&dpo<=hi)best=kb.dpo[range];
      });
      if(best)txt=best;
    }
    var personal="";var cnt=hist[s]||0;
    var totalCyc=D.cycles.filter(function(cc2,i2){return!isExcl(i2)}).length;
    if(cnt>0)personal="You've had "+s.replace("CM: ","")+" on Day "+cd+" in "+cnt+" of "+totalCyc+" tracked cycles.";
    else personal="First time logging "+s.replace("CM: ","")+" on Day "+cd+".";
    cards.push({sym:s,phase:txt,personal:personal});
  });
  return cards;
}

/* Build AI context */
function buildContext(date){
  var info=cInfo();var c=info.c;var ci=info.ci;
  var syms=D.sym[date]||[];var moods=D.mood[date]||[];
  var od=effOv(ci);var dpo=od?(db(c.key,date)+1-od):null;
  var cl=avgCL2();var ph=phase(info.cd,info.av,info.ao,info.ho,info.od);
  var recent=c.readings.slice(-5).map(function(r){return"Day "+r.day+": "+r.temp.toFixed(2)+"°"}).join(", ");
  var hist=[];
  D.cycles.forEach(function(cc,i){if(isExcl(i))return;
    var cd2=db(c.key,date)+1;
    cc.readings.forEach(function(r){if(r.day===cd2){var s2=D.sym[r.date]||[];if(s2.length)hist.push("C"+(i+1)+": "+s2.join(", "))}})
  });
  var cp=conceptionProb(ci);
  var ctx="You are a knowledgeable fertility and BBT tracking assistant. Analyse these symptoms for a woman who is TTC.\n\n";
  ctx+="TODAY: "+date+"\nCycle day: "+(db(c.key,date)+1)+"\nPhase: "+ph.n+"\n";
  if(od)ctx+="Ovulation: Day "+od+(dpo?" ("+dpo+" DPO)":"")+"\n";
  if(cl)ctx+="Coverline: "+cl.toFixed(2)+"°C\n";
  ctx+="Recent temps: "+recent+"\nSymptoms: "+(syms.length?syms.join(", "):"none")+"\nMood: "+(moods.length?moods.join(", "):"not logged")+"\n";
  ctx+="Avg cycle: "+info.av+"d, Avg OV: Day "+info.ao+"\n";
  if(cp)ctx+="Conception prob: "+cp.pct+"%\n";
  if(hist.length)ctx+="\nThis day in previous cycles:\n"+hist.join("\n")+"\n";
  ctx+="\nCycles tracked: "+D.cycles.length+" (~"+Math.round((new Date()-new Date(D.cycles[0].key))/864e5/30)+" months TTC)\n";
  ctx+="\nGive personalised analysis: is this normal for the phase, have I had it before at this point, what it might mean for TTC, and what to watch for. 2-3 short paragraphs, warm and honest. No headers or bullets.";
  return ctx;
}

function aiDeepDive(date){

    var text="";

/* Logging streak */
function getStreak(){
  var c=D.cycles[D.cycles.length-1];var streak=0;
  var d=td();
  for(var i=0;i<60;i++){
    if(c.readings.some(function(r){return r.date===d})){streak++;d=ad(d,-1)}else break;

}

/* Backup/restore */
function backup(){var b=JSON.stringify(D,null,2);var blob=new Blob([b],{type:"application/json"});var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;a.download="bbt_backup_"+td()+".json";a.click();URL.revokeObjectURL(u);flash("Backup saved ✓")}
function restore(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.cycles){D=d;save();render();flash("Restored ✓")}else flash("Invalid file")}catch(err){flash("Error: bad JSON")}};rd.readAsText(f)}

/* Export CSV */
function exp(){
  var csv="Cycle,Day,Date,Temp,Ovulation,Flow,Intimacy,Moods,Symptoms,Meds,Notes\n";
  D.cycles.forEach(function(c,i){c.readings.forEach(function(r){csv+=(i+1)+","+r.day+","+r.date+","+r.temp.toFixed(2)+","+(r.ov?"Yes":"")+","+(r.flow||"")+","+(D.sex[r.date]?"Yes":"")+",\""+(D.mood[r.date]||[]).join("; ")+"\",\""+(D.sym[r.date]||[]).join("; ")+"\",\""+(D.meds[r.date]||[]).join("; ")+"\","+(D.notes[r.date]||"")+"\n"})});
  var b=new Blob([csv],{type:"text/csv"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="bbt_jess.csv";a.click();URL.revokeObjectURL(u);flash("Exported ✓");
}

function sw(t){curTab=t;render()}
function flash(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},1800)}

load();render();initPTR();
// Redraw on orientation change
window.addEventListener('orientationchange',function(){setTimeout(render,200)});
window.addEventListener('resize',function(){
  clearTimeout(window._rsz);window._rsz=setTimeout(render,150);
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyTrack">
<meta name="theme-color" content="#B25835">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Jess's Cycle Tracker v14</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#B25835;color:#3D2C2C;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:0 0 100px}
@media(min-width:768px){
  .app{max-width:680px}
  .hdr{padding:28px 28px 0}
  .hdr h1{font-size:28px}
  .hdr-sub{font-size:13px}
  .tabs{padding:12px 20px 16px}
  .tab{padding:11px 0;font-size:13px;border-radius:12px}
  .content{padding:10px 0 50px}
  .section{padding:0 20px;margin-bottom:10px}
  .card{padding:18px;border-radius:18px;margin-bottom:10px}
  .cw{padding:14px 10px 10px;border-radius:18px;margin-bottom:10px}
  .cw canvas{height:400px!important}
  .sc{padding:16px 18px;border-radius:16px}
  .sv{font-size:22px}
  .sl{font-size:10px;margin-top:3px}
  .sg{gap:10px}
  .sec-title{font-size:13px}
  .sec-hdr{padding:16px 0 8px}
  .sec-hdr-col{padding:14px 0 8px}
  .pills{padding:0 20px;gap:6px;margin-bottom:10px}
  .pill{padding:8px 16px;font-size:12px;border-radius:20px}
  .filters{padding:0 20px;gap:6px;margin-bottom:10px}
  .flt{padding:7px 14px;font-size:11px}
  .rdg{padding:12px 0}
  .rdg-d{font-size:20px;width:36px}
  .rdg-t{font-size:16px}
  .rdg-tag{font-size:9px;padding:3px 7px}
  .fi{padding:13px;font-size:16px;border-radius:14px}
  .chip{padding:8px 14px;font-size:11px}
  .qs-chip{padding:7px 12px;font-size:11px}
  .notif{padding:14px 16px;font-size:13px;border-radius:16px}
  .fab{width:60px;height:60px;font-size:30px;bottom:calc(30px + env(safe-area-inset-bottom,0px))}
  .mdl{max-width:560px;border-radius:24px 24px 0 0;padding:24px 20px calc(34px + env(safe-area-inset-bottom,0px))}
  .gp{padding:20px;border-radius:18px}
  .gp-title{font-size:16px}
  .gp-sub{font-size:13px}
  .tww-card{padding:18px;border-radius:18px}
  .sum-card{padding:22px;border-radius:18px}
  .morning-hi{font-size:28px}
  .ring-container{width:180px;height:180px}
  .ring-svg{width:180px;height:180px}
  .ring-num{font-size:44px}
  .legend{padding:6px 20px;font-size:10px;gap:10px}
}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .15s ease}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
:root{
--bg:#B25835;--cream:#FFF6F0;--cream2:#FEEDE3;--cream3:#F0DDD0;
--cobalt:#2B5C8A;--cob-bg:rgba(43,92,138,.08);
--burnt:#C4652A;--burnt-bg:rgba(196,101,42,.08);
--gold:#9A7B1E;--gold-bg:rgba(154,123,30,.08);
--rose:#A84455;--rose-bg:rgba(168,68,85,.06);
--plum:#6B4E8B;--plum-bg:rgba(107,78,139,.06);
--forest:#4A7D5E;--forest-bg:rgba(74,125,94,.06);
--txt:#3D2C2C;--txt2:#6B5E56;--txt3:#8A7D74;--txt4:#A0928A;--txt5:#B8ADA4;
--card:#fff;--sh:0 1px 3px rgba(60,30,10,.05),0 4px 12px rgba(60,30,10,.04);
}
/* Dark mode */
.dark{--bg:#1C1210;--cream:#2A201C;--cream2:#1C1210;--cream3:#3D2C24;
--card:#2A201C;--txt:#E8DDD6;--txt2:#B8ADA4;--txt3:#8A7D74;--txt4:#6B5E56;--txt5:#4A3E36;
--cob-bg:rgba(43,92,138,.15);--burnt-bg:rgba(196,101,42,.15);--gold-bg:rgba(154,123,30,.15);
--rose-bg:rgba(168,68,85,.12);--plum-bg:rgba(107,78,139,.12);--forest-bg:rgba(74,125,94,.12);
--sh:0 1px 3px rgba(0,0,0,.2)}
.dark .hdr{background:#1C1210}
.dark .content{background:#1C1210}
.dark .tabs .tab{background:rgba(255,255,255,.06);color:rgba(255,255,255,.35)}
.dark .tabs .tab.on{background:var(--cream3);color:var(--burnt)}
.dark .notif{background:var(--card)}
.dark .gp{background:var(--card)}
.dark .sum-card{background:var(--card)}
.dark .tww-card{background:var(--card)}
.dark .morning-temp input{background:rgba(255,255,255,.08)}
.dark .morning-fact{background:rgba(255,255,255,.06)}
.dark .ql input{background:var(--card);border-color:var(--cream3);color:var(--txt)}
.dark .fi{background:var(--card);border-color:var(--cream3);color:var(--txt)}
.dark .mbg{background:rgba(0,0,0,.6)}
.dark .mdl{background:#2A201C}
.dark .hdr-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
.dark .qs-chip{background:var(--cream3);color:var(--txt3)}
.dark .chip{background:var(--cream3);color:var(--txt3)}
.dark .pill{background:var(--card);color:var(--txt4)}
.dark .flt{background:var(--card);color:var(--txt4)}
.dark .toast{background:var(--burnt)}
/* Header */
.hdr{padding:20px 20px 0;background:#B25835}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;margin:0}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;font-weight:500}
.hdr-btns{display:flex;gap:4px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.1);border-radius:8px;padding:7px 10px;color:rgba(255,255,255,.6);font-size:9px;font-weight:600;letter-spacing:.3px}
.hdr-btn:active{background:rgba(255,255,255,.2)}
/* Tabs at top */
.tabs{display:flex;gap:2px;padding:10px 16px 14px;background:transparent}
.tab{flex:1;padding:8px 0;border-radius:10px;font-size:11px;font-weight:600;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);text-align:center;transition:all .15s}
.tab.on{background:var(--cream);color:var(--txt);font-weight:700}
/* Content */
.content{background:#B25835;border-radius:0;min-height:80vh;padding:6px 0 40px}
.section{padding:0 14px;margin-bottom:6px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 0 6px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.2px;color:rgba(255,255,255,.7)}
.card{background:var(--cream);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px}
/* Collapsible */
.sec-hdr-col{display:flex;justify-content:space-between;align-items:center;padding:12px 0 6px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.sec-hdr-col .sec-arrow{font-size:10px;color:var(--txt5);transition:transform .2s ease;margin-left:5px;display:inline-block}
.sec-hdr-col.collapsed .sec-arrow{transform:rotate(-90deg)}
.sec-body{overflow:hidden;transition:max-height .3s ease,opacity .25s ease;max-height:2000px;opacity:1}
.sec-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
/* Morning welcome */
.morning-wrap{padding:8px 0 0}
.morning-hi{font-size:24px;font-weight:800;color:#fff;letter-spacing:-.5px}
.morning-fact{margin:14px 0;padding:12px 14px;background:rgba(255,255,255,.08);border-radius:12px;font-size:11px;color:rgba(255,255,255,.75);line-height:1.5;font-weight:400}
.morning-phase{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:16px}
.morning-temp{display:flex;gap:8px;align-items:center}
.morning-temp input{flex:1;padding:14px;border:none;border-radius:12px;font-size:18px;font-weight:700;background:rgba(255,255,255,.12);color:#fff;text-align:center;outline:none}
.morning-temp input::placeholder{color:rgba(255,255,255,.3)}
.morning-temp input:focus{background:rgba(255,255,255,.18)}
.morning-temp button{padding:14px 22px;border-radius:12px;font-size:14px;font-weight:700;background:rgba(255,255,255,.9);color:var(--burnt)}
/* Ring */
.ring-container{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.ring-svg{width:150px;height:150px}
.ring-bg{fill:none;stroke:var(--cream3);stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:38px;font-weight:800;color:var(--txt);line-height:1}
.ring-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700}
.phase-dot{width:7px;height:7px;border-radius:50%}
.phase-desc{font-size:12px;color:var(--txt2);line-height:1.5;margin-top:5px}
/* Stats grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc{background:var(--cream);border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(80,30,10,.08)}
.sv{font-size:18px;font-weight:800;color:var(--txt)}
.sl{font-size:9px;font-weight:600;color:var(--txt4);letter-spacing:.2px;margin-top:2px}
/* Chart */
.cw{background:var(--cream);border-radius:16px;padding:10px 6px 6px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px}
canvas{width:100%;display:block}
/* Filters & pills */
.filters{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px;margin-bottom:8px}
.flt{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;background:var(--cream);color:var(--txt4);box-shadow:0 1px 4px rgba(80,30,10,.1)}
.flt.on{color:#fff}
.flt-ov.on{background:var(--gold)}.flt-per.on{background:var(--rose)}.flt-sex.on{background:var(--cobalt)}.flt-cm.on{background:var(--burnt)}
.pills{display:flex;gap:5px;padding:0 16px;overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.pill{padding:6px 12px;border-radius:18px;font-size:11px;font-weight:600;background:var(--cream);color:var(--txt4);white-space:nowrap;flex-shrink:0;box-shadow:0 1px 4px rgba(80,30,10,.1)}
.pill.on{background:var(--cobalt);color:#fff}
.pill.dim{opacity:.25}
.pill.clr{color:#fff}
/* Readings */
.rdg{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04);cursor:pointer}
.rdg:last-child{border-bottom:none}
.rdg-d{width:30px;font-size:17px;font-weight:800;color:var(--txt);text-align:center}
.rdg-dt{font-size:9px;color:var(--txt4);text-align:center}
.rdg-m{flex:1}.rdg-t{font-size:14px;font-weight:700;color:var(--txt)}
.rdg-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.rdg-tag{font-size:8px;padding:2px 5px;border-radius:6px;font-weight:600}
/* Modal */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,30,10,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mdl{background:var(--cream);border-radius:20px 20px 0 0;padding:20px 16px calc(30px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:480px;position:relative;z-index:101}
.mt{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:14px}
.fl{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.2px;margin-bottom:5px}
.fi{width:100%;padding:11px;border:1.5px solid var(--cream3);border-radius:12px;font-size:15px;background:var(--card);color:var(--txt);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cobalt)}
.fr{margin-bottom:12px;position:relative;overflow:visible}
.chips{display:flex;flex-wrap:wrap;gap:5px;max-width:100%;overflow:hidden}
.chip{padding:6px 11px;border-radius:18px;font-size:10px;font-weight:600;background:var(--cream3);color:var(--txt4)}
.chip.on{color:#fff;border-color:transparent}
.chip-m.on{background:var(--cobalt)}.chip-s.on{background:var(--burnt)}.chip-c.on{background:var(--gold)}.chip-f.on{background:var(--rose)}
.br{display:flex;gap:8px;margin-top:14px}
.cb{flex:1;padding:13px;border-radius:14px;font-size:14px;font-weight:700;background:var(--cream3);color:var(--txt3)}
.sb{flex:2;padding:13px;border-radius:14px;font-size:14px;font-weight:800;background:var(--burnt);color:#fff}
.sb:active{transform:scale(.97)}
.db{width:100%;padding:11px;border-radius:12px;font-size:12px;font-weight:700;background:var(--rose-bg);color:var(--rose);margin-top:8px}
/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:52px;height:52px;border-radius:50%;background:var(--cobalt);color:#fff;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(43,92,138,.3);z-index:55}
.fab:active{transform:scale(.9)}
@media(min-width:481px){.fab{right:calc(50% - 320px)}}
@media(min-width:768px){.fab{right:calc(50% - 320px)}}
/* Toast */
.toast{position:fixed;top:calc(12px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);z-index:999;background:var(--txt);border-radius:14px;padding:8px 18px;font-size:11px;font-weight:700;color:#fff;animation:fi .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Toggle */
.tr{display:flex;align-items:center;justify-content:space-between;padding:7px 0}
.tl{font-size:13px;font-weight:600;color:var(--txt)}
.tg{width:42px;height:24px;border-radius:12px;background:var(--cream3);position:relative;transition:background .2s;cursor:pointer}
.tg.on{background:var(--cobalt)}
.tg::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tg.on::after{transform:translateX(18px)}
/* Progress bars */
.pr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pn{font-size:10px;font-weight:600;color:var(--txt3);width:76px;text-align:right;flex-shrink:0}
.pt{flex:1;background:var(--cream3);border-radius:4px;height:6px;overflow:hidden}
.pb{height:6px;border-radius:4px}
/* Notes */
.ni{padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04)}.ni:last-child{border-bottom:none}
.nm{font-size:9px;font-weight:600;color:var(--txt4);margin-bottom:3px}
.nt{font-size:12px;color:var(--txt);line-height:1.4}
/* Photo & upload */
.pu{width:100%;padding:18px;border:1.5px dashed var(--cream3);border-radius:14px;text-align:center;color:var(--txt4);font-size:11px;font-weight:600;cursor:pointer;background:var(--card)}
.pth{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1.5px solid var(--cream3)}
textarea{resize:vertical;min-height:56px}
/* Landscape */
@media(orientation:landscape) and (max-height:500px){
  .hdr{padding:10px 20px 6px}
  .hdr h1{font-size:17px}
  .hdr-sub{display:none}
  .tabs{padding:4px 0 calc(4px + env(safe-area-inset-bottom,0px))}
  .content{padding:4px 0 16px;border-radius:0}
  .app{max-width:100%;padding-bottom:56px}
  .section{padding:0 12px;margin-bottom:3px}
  .card{padding:8px;margin-bottom:4px;border-radius:12px}
  .cw{padding:4px;border-radius:10px;margin-bottom:4px}
  .cw canvas{height:calc(100vh - 140px)!important;min-height:180px}
  .pills{margin-bottom:4px;padding:0 12px}.pill{padding:4px 8px;font-size:10px}
  .filters{padding:0 12px;margin-bottom:4px;gap:3px}.flt{padding:3px 8px;font-size:9px}
  .fab{width:40px;height:40px;font-size:20px;bottom:calc(50px + env(safe-area-inset-bottom,0px))}
  .sg{gap:4px}.sc{padding:8px}.sv{font-size:15px}
  .sec-hdr{padding:6px 0 3px}.sec-hdr-col{padding:6px 0 3px}
  .land-hide{display:none!important}
}
/* Quick log */
.ql{display:flex;gap:6px;align-items:center}
.ql input{flex:1;padding:12px;border:1.5px solid var(--cream3);border-radius:12px;font-size:20px;font-weight:700;background:var(--card);color:var(--txt);text-align:center;outline:none;-moz-appearance:textfield}
.ql input::-webkit-outer-spin-button,.ql input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ql input:focus{border-color:var(--cobalt)}
.ql button{padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;background:var(--cobalt);color:#fff}
/* OV prob bar */
.prob-bar{height:22px;border-radius:11px;background:var(--cream3);overflow:hidden;position:relative}
.prob-fill{height:100%;border-radius:11px;transition:width .5s ease}
.prob-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--txt)}
/* Compare */
.cmp-sel{display:flex;gap:6px;margin-bottom:8px}
.cmp-sel select{flex:1;padding:9px;border:1.5px solid var(--cream3);border-radius:12px;font-size:12px;font-weight:600;background:var(--card);color:var(--txt);outline:none;-webkit-appearance:none}
/* PT log */
.pt-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.pt-row:last-child{border-bottom:none}
.pt-res{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700}
/* Meds */
.med-chip{padding:5px 9px;border-radius:8px;font-size:10px;font-weight:600;background:var(--forest-bg);color:var(--forest);display:inline-flex;align-items:center;gap:3px}
/* Backup */
.bk-row{display:flex;gap:6px}
.bk-btn{flex:1;padding:10px;border-radius:12px;font-size:11px;font-weight:700;text-align:center}
/* Summary card */
.sum-card{background:var(--cream);border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px;position:relative;overflow:hidden}
.sum-row{display:flex;justify-content:space-between;padding:3px 0}
.sum-lbl{font-size:10px;color:var(--txt3)}.sum-val{font-size:10px;font-weight:700;color:var(--txt)}
/* Score ring */
.score-ring{position:relative;width:56px;height:56px;display:inline-flex;align-items:center;justify-content:center}
.score-ring svg{width:56px;height:56px}
.score-ring .sr-bg{fill:none;stroke:var(--cream3);stroke-width:5}
.score-ring .sr-fg{fill:none;stroke-width:5;stroke-linecap:round}
.score-num{position:absolute;font-size:13px;font-weight:800}
/* Notifications */
.notif{padding:10px 12px;border-radius:14px;margin-bottom:6px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px;background:var(--cream);box-shadow:0 2px 8px rgba(80,30,10,.08)}
.notif-icon{font-size:15px;flex-shrink:0}
/* Smooth toggle */
.sm-tg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--txt4);padding:0 16px;margin-bottom:5px}
/* TWW */
.tww-card{background:var(--cream);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px}
.tww-day{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.tww-day:last-child{border-bottom:none}
.tww-dpo{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.tww-dpo.now{background:var(--cobalt);color:#fff}
.tww-dpo.past{background:var(--cream3);color:var(--txt4)}
.tww-dpo.future{background:var(--cream);color:var(--txt5);border:1px dashed var(--cream3)}
.tww-info{flex:1}.tww-title{font-size:11px;font-weight:700;color:var(--txt)}.tww-desc{font-size:10px;color:var(--txt3);line-height:1.4;margin-top:1px}
/* Journey */
.jrn-line{position:relative;padding-left:22px;border-left:2px solid var(--cream3);margin-left:10px}
.jrn-dot{position:absolute;left:-7px;top:7px;width:12px;height:12px;border-radius:50%}
.jrn-item{padding:5px 0 14px;position:relative}
.jrn-date{font-size:9px;font-weight:600;color:var(--txt4)}
.jrn-text{font-size:11px;font-weight:600;color:var(--txt);margin-top:1px}
/* CM score */
.cm-score{display:flex;align-items:center;gap:10px}
.cm-bar{flex:1;height:6px;border-radius:3px;background:var(--cream3);overflow:hidden}
.cm-fill{height:100%;border-radius:3px}
/* AI insight */
.ai-disclaimer{font-size:8px;color:var(--txt5);margin-top:6px;font-style:italic}
/* Game plan */
.gp{background:var(--cream);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px;position:relative;overflow:hidden}
.gp-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:3px}
.gp-sub{font-size:11px;color:var(--txt2);line-height:1.4}
.gp-actions{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.gp-action{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--txt);padding:5px 0}
.gp-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.gp-check.done{background:var(--forest);border-color:var(--forest);color:#fff}
/* Quick symptom chips */
.qs-chips{display:flex;flex-wrap:wrap;gap:4px}
.qs-chip{padding:5px 9px;border-radius:14px;font-size:10px;font-weight:600;background:var(--cream3);color:var(--txt4)}
.qs-chip.on{color:#fff;box-shadow:none;border-color:transparent}
.qs-chip.on-s{background:var(--burnt)}.qs-chip.on-m{background:var(--cobalt)}.qs-chip.on-c{background:var(--gold)}
/* Streak */
.streak{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--burnt);padding:2px 7px;border-radius:8px;background:var(--burnt-bg)}
/* Temp range bar */
.tmp-range{height:6px;border-radius:3px;background:var(--cream3);position:relative;margin:6px 0}
.tmp-range-fill{position:absolute;top:0;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--cobalt),var(--burnt))}
.tmp-range-dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:5px 16px;font-size:9px;font-weight:600;color:var(--txt4)}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-sq{width:6px;height:6px;transform:rotate(45deg);flex-shrink:0}
/* Compare stats */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:10px}
.cmp-tbl th{font-weight:600;color:var(--txt4);text-align:left;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.cmp-tbl td{padding:5px 0;font-weight:600;color:var(--txt);border-bottom:1px solid rgba(0,0,0,.03)}
.cmp-tbl td:not(:first-child),.cmp-tbl th:not(:first-child){text-align:center}
/* Empty state */
.empty{padding:20px;text-align:center;color:var(--txt4);font-size:11px;line-height:1.5}
.empty-icon{font-size:22px;margin-bottom:5px}
/* Regularity */
.reg-bar{height:6px;border-radius:3px;background:var(--cream3);overflow:hidden}
.reg-fill{height:100%;border-radius:3px;transition:width .4s ease}
/* Chart tooltip */
.chart-tip{position:absolute;background:var(--txt);color:#fff;border-radius:10px;padding:7px 11px;font-size:10px;font-weight:600;line-height:1.4;pointer-events:none;z-index:10;max-width:190px;box-shadow:0 4px 14px rgba(0,0,0,.25);white-space:nowrap}
.chart-tip::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--txt)}
</style>

function conceptionProb(ci){
  var c=D.cycles[ci];var od=effOv(ci);if(!od)return null;
  var fw={};
  for(var d=od-5;d<=od;d++)fw[d]=true;
  var hits=0,total=0;
  c.readings.forEach(function(r){
    if(fw[r.day]){total++;if(D.sex[r.date])hits++}
  });
  var cStart=new Date(c.key+'T12:00:00');
  for(var d2=od-5;d2<=od;d2++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+d2-1);
    var ds=dt.toISOString().slice(0,10);
    if(D.sex[ds]&&!fw['_'+d2]){fw['_'+d2]=true;if(!c.readings.find(function(r){return r.day===d2})){total++;hits++}}
  }
  if(total===0)return{pct:0,hits:0,total:6,lbl:"No fertile window data"};
  var score=0,maxScore=0;
  for(var d3=od-5;d3<=od;d3++){
    var w=d3===od?0.1:d3===od-1?0.3:d3===od-2?0.27:d3===od-3?0.16:d3===od-4?0.1:0.07;
    maxScore+=w;
    var dt2=new Date(cStart);dt2.setDate(dt2.getDate()+d3-1);var ds2=dt2.toISOString().slice(0,10);
    if(D.sex[ds2])score+=w;
  }
  var pct=Math.round(score/maxScore*100);
  var lbl=pct>=70?"Excellent timing":pct>=40?"Good timing":pct>=15?"Some chance":"Low — missed fertile window";
  return{pct:pct,hits:hits,total:6,lbl:lbl}
}

}

function tempAlerts(info){
  var alerts=[];var c=info.c;var rs=c.readings;
  if(rs.length<2)return alerts;
  var last=rs[rs.length-1];var prev=rs[rs.length-2];
  if(!last.temp||!prev.temp)return alerts;
  var drop=prev.temp-last.temp;
  if(info.ho&&info.cd>=info.od+6&&info.cd<=info.od+12&&drop>=0.15){
    alerts.push({type:"implantation",icon:"🔵",bg:"var(--cob-bg)",color:"var(--cobalt)",msg:"Possible implantation dip — temp dropped "+drop.toFixed(2)+"° ("+last.temp.toFixed(2)+"°). Watch for rise tomorrow."})
  }
  if(info.ho&&info.cd>=info.od+10&&drop>=0.1){
    var cl=avgCL2();if(cl&&last.temp<cl)
      alerts.push({type:"period",icon:"🔴",bg:"var(--rose-bg)",color:"var(--rose)",msg:"Temp dropped below coverline ("+last.temp.toFixed(2)+"°) — period may be coming."})
  }
  var at=ats();var av=atVar();
  if(at[last.day]){
    var diff=last.temp-at[last.day];var sd=av[last.day]||0.1;
    if(diff>0.25)alerts.push({type:"spike",icon:"🟡",bg:"var(--gold-bg)",color:"var(--gold)",msg:"Temp is "+diff.toFixed(2)+"° above average for Day "+last.day+". Possible fever, poor sleep, or ovulation shift."});
    else if(diff<-0.2)alerts.push({type:"low",icon:"🔻",bg:"var(--cob-bg)",color:"var(--cobalt)",msg:"Temp is "+Math.abs(diff).toFixed(2)+"° below average for Day "+last.day+" (avg "+at[last.day].toFixed(2)+"°). Could be estrogen surge, poor sleep, or early waking."});
    else if(Math.abs(diff)>sd*1.8&&sd>0.05)alerts.push({type:"outlier",icon:"📊",bg:"var(--gold-bg)",color:"var(--gold)",msg:"Temp "+(diff>0?"above":"below")+" your usual range for Day "+last.day+" ("+last.temp.toFixed(2)+"° vs "+at[last.day].toFixed(2)+"° ±"+sd.toFixed(2)+")."});
  }
  // Today's temp vs yesterday — big swing alert
  var swing=Math.abs(last.temp-prev.temp);
  if(swing>=0.3&&!alerts.some(function(a){return a.type==="implantation"})){
    alerts.push({type:"swing",icon:"↕️",bg:"var(--burnt-bg)",color:"var(--burnt)",msg:"Big temp swing of "+swing.toFixed(2)+"° from yesterday. Check: same time? Alcohol? Illness? Mouth breathing?"})
  }
  return alerts
}

function smooth3(readings){
  var valid=readings.filter(function(r){return r.temp!=null});
  return valid.map(function(r,i){
    var sum=r.temp,cnt=1;
    if(i>0&&valid[i-1].temp!=null){sum+=valid[i-1].temp;cnt++}
    if(i<valid.length-1&&valid[i+1].temp!=null){sum+=valid[i+1].temp;cnt++}
    return{day:r.day,temp:sum/cnt}
  })
}

function detectTriphasic(c,ci){

  var early=[],late=[];
  post.forEach(function(r){var dpo=r.day-od;if(dpo>=1&&dpo<=6)early.push(r.temp);if(dpo>=7&&dpo<=10)late.push(r.temp)});

  var lateAvg=late.reduce(function(a,b){return a+b},0)/late.length;
  var shift=lateAvg-earlyAvg;

}

/* Cycle prediction accuracy */
function predAccuracy(){
  var results=[];
  D.cycles.forEach(function(c,i){
    if(i===0||!c.length||isExcl(i))return;
    // What would we have predicted based on cycles before this one?
    var prevLens=[];
    for(var j=0;j<i;j++){if(!isExcl(j)&&D.cycles[j].length&&D.cycles[j].length<45)prevLens.push(D.cycles[j].length)}
    if(!prevLens.length)return;
    var predicted=Math.round(prevLens.reduce(function(a,b){return a+b},0)/prevLens.length);
    var actual=c.length;
    var diff=actual-predicted;
    results.push({i:i,label:c.label,predicted:predicted,actual:actual,diff:diff});
  });
  return results;
}

/* Cycle regularity score */
function regularityScore(){
  var lens=[];
  D.cycles.forEach(function(c,i){if(!isExcl(i)&&c.length&&c.length<45)lens.push(c.length)});
  if(lens.length<3)return null;
  var avg=lens.reduce(function(a,b){return a+b},0)/lens.length;
  var variance=lens.reduce(function(a,b){return a+(b-avg)*(b-avg)},0)/lens.length;
  var sd=Math.sqrt(variance);
  // Score: 100 = perfectly regular, 0 = chaotic
  var score=Math.max(0,Math.round(100-sd*15));
  var lbl=score>=85?"Very regular":score>=70?"Regular":score>=50?"Somewhat variable":score>=30?"Variable":"Irregular";
  return{score:score,sd:sd.toFixed(1),lbl:lbl,count:lens.length};
}

/* FIXED: OV probability — count TOTAL post-OV temps above coverline, not just consecutive */
function ovProb(c,ci){
  var od=effOv(ci);if(!od)return null;
  // Get pre-OV and post-OV temps for this cycle
  var pre=c.readings.filter(function(r){return r.day<=od&&r.day>=od-6&&r.temp!=null});
  var post=c.readings.filter(function(r){return r.day>od&&r.temp!=null});
  if(!post.length)return{pct:10,lbl:"No post-OV data yet"};
  if(pre.length<2)return{pct:15,lbl:"Not enough pre-OV data to assess shift"};
  // Calculate pre-OV average (baseline)
  var preAvg=pre.reduce(function(a,b){return a+b.temp},0)/pre.length;
  // This cycle's coverline (median of pre-OV + 0.05)
  var preSorted=pre.map(function(r){return r.temp}).sort(function(a,b){return a-b});
  var med=preSorted.length%2===0?(preSorted[preSorted.length/2-1]+preSorted[preSorted.length/2])/2:preSorted[Math.floor(preSorted.length/2)];
  var cl=med+0.05;
  // Count post-OV temps above the shift threshold
  var above=0,total=post.length,consec=0,brokeConsec=false;
  var postAvg=post.reduce(function(a,b){return a+b.temp},0)/post.length;
  var shift=postAvg-preAvg;
  for(var i=0;i<post.length;i++){
    if(post[i].temp>cl){above++;if(!brokeConsec)consec++}
    else{brokeConsec=true}
  }
  var abovePct=total>0?Math.round(above/total*100):0;
  // Scoring: combine shift magnitude + consistency
  var shiftStr=shift>=0?"+"+shift.toFixed(2):shift.toFixed(2);
  if(total<2)return{pct:25,lbl:"Only "+total+" reading — need 2-3 more days to confirm (shift "+shiftStr+"°)"};
  if(shift>=0.2&&consec>=3&&abovePct>=70)return{pct:95,lbl:"Confirmed — clear "+shiftStr+"° shift, "+consec+" consecutive above baseline"};
  if(shift>=0.15&&consec>=3)return{pct:90,lbl:"Confirmed — "+shiftStr+"° shift sustained over "+consec+" days"};
  if(shift>=0.2&&consec>=2)return{pct:85,lbl:"Very likely — "+shiftStr+"° shift, "+above+"/"+total+" above baseline"};
  if(shift>=0.15&&consec>=2)return{pct:80,lbl:"Likely — "+shiftStr+"° shift, building confirmation"};
  if(shift>=0.1&&above>=2)return{pct:70,lbl:"Probable — "+shiftStr+"° shift, "+above+"/"+total+" readings up"};
  if(shift>=0.1&&consec>=1)return{pct:55,lbl:"Emerging — "+shiftStr+"° shift starting, need more data"};
  if(shift>=0.05)return{pct:40,lbl:"Possible — small "+shiftStr+"° shift, watching pattern"};
  if(shift>0)return{pct:25,lbl:"Minimal shift ("+shiftStr+"°) — may be too early or no clear rise yet"};
  return{pct:10,lbl:"No temp shift detected — temps flat or dropping"};
}

function quickLog(){saveUndo();var inp=document.getElementById('qlT');var raw=inp.value.replace(/[^0-9]/g,'');if(raw.length<4){flash("Type 4 digits, e.g. 3650");return}var t=parseFloat(raw.slice(0,2)+'.'+raw.slice(2,4));if(isNaN(t)||t<35||t>38){flash("Temperature out of range");return}var date=td();var last=D.cycles[D.cycles.length-1];var day=db(last.key,date)+1;var rdg={day:day,date:date,temp:t};var ei=last.readings.findIndex(function(r){return r.date===date});if(ei>-1)last.readings[ei].temp=t;else{last.readings.push(rdg);last.readings.sort(function(a,b){return a.day-b.day})}
  if(!D.ttime)D.ttime={};var timeEl=document.getElementById('qlTime');if(timeEl&&timeEl.value)D.ttime[date]=timeEl.value;
  save();render();flash(t.toFixed(2)+"° logged",true)}

function logWrist(){saveUndo();var inp=document.getElementById('qlW');if(!inp||!inp.value.trim()){flash("Enter a value");return}
  var raw=inp.value.trim().replace(/[^0-9.]/g,'');var val=parseFloat(raw);
  if(isNaN(val)){flash("Enter a number like 0.50");return}
  var signBtn=document.getElementById('wSign');var isNeg=signBtn&&signBtn.textContent==='−';
  var dev=isNeg?-val:val;
  var t=Math.round((WRIST_BASELINE+dev)*100)/100;

function logSleepHrs(){var el=document.getElementById('qlSH');if(!el||!el.value)return;var h=parseFloat(el.value);if(isNaN(h)||h<0||h>14){flash("Enter 0-14");return}if(!D.sleepHrs)D.sleepHrs={};D.sleepHrs[td()]=h;save();render();flash(h+"h logged",true)}
function calcSleepHrs(asleep,woke){
  var ap=asleep.split(':'),wp=woke.split(':');
  var aM=parseInt(ap[0])*60+parseInt(ap[1]),wM=parseInt(wp[0])*60+parseInt(wp[1]);
  var diff=wM-aM;if(diff<0)diff+=1440;
  return(Math.round(diff/6)/10).toFixed(1);
}

  if(!D.sleepHrs)D.sleepHrs={};D.sleepHrs[td()]=parseFloat(hrs);
  save();render();flash(hrs+"h sleep logged",true);
}

/* Symptom knowledge base — keeping the full SKB from original */
var SKB={"Cramps":{menstrual:"Ugh, cramps. Your uterus is doing its thing — squeezing to shed the lining. Totally normal. A hot water bottle and ibuprofen are your best friends today.",follicular:"A bit of cramping now is usually just your ovaries waking up and getting follicles ready.",ovulatory:"This could be mittelschmerz — happens when your follicle pops to release the egg. If it's on one side, even more likely. 🎯",luteal:"Progesterone is the culprit here — it makes everything a bit crampy after ovulation.",dpo:{"6-9":"Cramping at 6-9 DPO is in the implantation window. Some women feel a pulling or pinching when the embryo burrows in. Try not to obsess (easier said than done).","10-12":"Is this period or implantation? Honestly, impossible to tell from cramps alone. If your period doesn't show by 12 DPO, grab a test.","13-14":"Right at the point where your period would normally start. Test if you haven't."}},"Bloating":{menstrual:"Feeling like a balloon? Prostaglandins causing inflammation. It passes — promise.",follicular:"Bloating now isn't super common cycle-wise. Could be diet or stress.",ovulatory:"Blame oestrogen — it's peaking right now and makes you hold water.",luteal:"Welcome to the progesterone bloat club. It literally slows your digestion down.",dpo:{"6-9":"Progesterone bloat feels exactly the same whether or not there's a little embryo. Your body can't tell you yet.","10-14":"Still bloated? Could be PMS, could be early pregnancy — both involve the same hormones."}},"Headache":{menstrual:"Hormone headaches at period start are common — oestrogen just crashed. Water and paracetamol help.",follicular:"Probably not cycle-related. Check hydration and sleep.",ovulatory:"The oestrogen surge can trigger headaches, especially if migraine-prone.",luteal:"Hormones all over the place. Some women get headaches like clockwork here.",dpo:{"6-9":"Headaches during implantation window are common — hormonal shifts regardless.","10-14":"Headaches are commonly reported as early pregnancy symptoms because blood volume increases early."}},"Fatigue":{menstrual:"Your body is doing hard work. Iron dips during period. Rest and eat iron-rich food.",follicular:"Energy should be picking up as oestrogen rises.",ovulatory:"Most women feel energy burst around ovulation.",luteal:"Progesterone is literally a sedative. Feeling wiped is 100% normal. 😴",dpo:{"6-9":"The tiredness is progesterone. But if implantation happens, hCG adds to it.","10-14":"If this tiredness feels DIFFERENT — bone-deep, falling-asleep-at-your-desk tired — pay attention. Test at 12+ DPO. 🤞"}},"Nausea":{menstrual:"Prostaglandins can upset your stomach. Ginger tea helps.",follicular:"Not typically cycle-related.",ovulatory:"Some women get a wave from the hormone surge. Brief and harmless.",luteal:"Progesterone slows digestion. Eat little and often.",dpo:{"6-9":"At 6-9 DPO it's genuinely too early for pregnancy nausea — hCG isn't high enough yet.","10-14":"If genuinely nauseous at 10+ DPO and this isn't normal for you, pay attention. Test if you haven't. 🤞"}},"Backache":{menstrual:"Prostaglandins make back muscles contract. Heat pad helps.",follicular:"Probably posture or activity, not cycle-related.",ovulatory:"Some feel dull ache from follicle rupturing. Usually one-sided.",luteal:"Progesterone relaxes ligaments, making lower back achy.",dpo:{"6-12":"Lower back ache in TWW is progesterone. Some report it as early sign.","13-14":"Back ache near expected period could go either way. Test if late."}},"Breast tenderness":{menstrual:"Tenderness usually eases once period arrives as progesterone drops.",follicular:"Breasts usually least tender now.",ovulatory:"Mild tenderness makes sense — progesterone beginning to rise.",luteal:"Classic. Progesterone makes breast tissue swell. Most common luteal symptom.",dpo:{"6-9":"Your boobs hurt because of progesterone — they'd hurt whether pregnant or not.","10-14":"Women say pregnancy breast tenderness feels DIFFERENT — fuller, heavier, especially nipples."}},"Acne":{menstrual:"Hormone shift triggers extra oil. Calms in a few days.",follicular:"Skin should be at its best — oestrogen is a skin's friend.",ovulatory:"Mini breakout from hormone surge. Short-lived.",luteal:"Progesterone + oil = spots. More sebum in luteal phase.",dpo:{"1-14":"Acne doesn't tell you about pregnancy — all progesterone-driven."}},"Insomnia":{menstrual:"Sleep disruption from hormone nosedive. Settles in a day or two.",follicular:"Sleep usually improves as oestrogen rises.",ovulatory:"Some feel buzzy and wired around ovulation.",luteal:"Irony: progesterone makes you tired but disrupts deep sleep. 🙃",dpo:{"6-9":"Tossing and turning is normal — hormonal + emotional. Try magnesium.","10-14":"Insomnia at 10+ DPO is reported as early pregnancy symptom more than you'd think."}},"Spotting":{menstrual:"Normal at start/end of period.",follicular:"Not super common. Mention to GP if recurring.",ovulatory:"Ovulation spotting is real and a good sign you ovulated! ✨",luteal:"Spotting after OV grabs attention when TTC. Could be implantation or low progesterone.",dpo:{"6-9":"Deep breath. Light pink/brown, small amount, lasting hours not days — ticks implantation boxes. About 25% of pregnancies have some spotting. 🤞","10-12":"Could be late implantation or period starting. If it STOPS, more implantation-like.","13-14":"Right on the edge. Only way to know is to test."}},"CM: Egg white":{menstrual:"Unusual during period. Don't worry about tracking CM today.",follicular:"Your body is gearing up! Oestrogen rising nicely.",ovulatory:"THIS IS IT. Peak fertility. Superhighway for sperm. Go go go. 🏃‍♀️",luteal:"Unusual after confirmed OV — could be secondary oestrogen surge or early pregnancy sign.",dpo:{"1-5":"A bit right after OV can happen as hormones transition.","6-12":"EWCM is back after drying up? Mentioned a lot as early sign. Theory: rising hCG causes secondary mucus surge. 👀"}},"CM: Watery":{menstrual:"Hard to track during period.",follicular:"Oestrogen building — you're on the right track towards fertile mucus.",ovulatory:"Fertile! Not quite egg white but sperm can survive in it. 💪",luteal:"A bit unusual — progesterone normally thickens things.",dpo:{"6-14":"Noticing watery CM when normally dry? Common anecdotal observation before positive tests."}},"CM: Creamy":{menstrual:"Can't tell during period.",follicular:"Transitional — moving from dry towards fertile.",ovulatory:"Not quite peak but don't dismiss it — creamy might be YOUR peak.",luteal:"Classic luteal phase mucus. Totally normal.",dpo:{"1-14":"Standard throughout TWW. Some say MORE than usual before positive."}},"CM: Dry":{menstrual:"Normal.",follicular:"Normal at start. CM ramps up closer to OV. Stay hydrated.",ovulatory:"Not ideal for conception. Try Preseed lubricant during sex.",luteal:"Classic progesterone doing its job.",dpo:{"1-14":"Dryness in TWW is the norm. Don't read into it."}},"Tired":{menstrual:"Your body's saying 'slow down.' Listen to it. 💤",follicular:"Energy should pick up. Check sleep and iron.",ovulatory:"Energy usually peaks. If tired, something else might be off.",luteal:"Progesterone is nature's sleeping pill. Nap if you can. 😴",dpo:{"6-14":"If this tiredness feels DIFFERENT — bone-deep, can't-keep-your-eyes-open tired — that's what women describe as early pregnancy fatigue. 🤞"}},"Irritable":{menstrual:"Oestrogen and progesterone crashed simultaneously. Biological reason, not 'just you.'",follicular:"Mood usually lifts. Might be life stuff.",ovulatory:"High oestrogen usually makes you feel great.",luteal:"Progesterone affects serotonin. Genuinely chemical, not a character flaw. 💛",dpo:{"6-14":"Between progesterone messing with serotonin AND the emotional weight of waiting... anyone would be snappy."}},"Anxious":{menstrual:"Anxiety spikes when period arrives — hormonal + emotional. Both valid. 💜",follicular:"Usually eases as oestrogen rises.",ovulatory:"Might be about timing pressure rather than hormones.",luteal:"TWW is an anxiety generator. Progesterone makes it worse chemically. 🫂",dpo:{"6-14":"The anxiety of the TWW is one of the hardest parts. The outcome is already decided — worrying won't change it. 💜"}},"Emotional":{menstrual:"Hormones did a dramatic shift. Plus, getting your period when TTC is genuinely sad.",follicular:"Less common hormonally. Maybe still processing last cycle.",ovulatory:"Some feel everything more intensely around ovulation.",luteal:"Progesterone turns up the volume on ALL emotions. SO normal. 😭",dpo:{"6-14":"Being emotional in the TWW is part hormones, part hope, part fear. You're not 'too much.' You're human. 💛"}},"Sad":{menstrual:"This is grief. Each failed cycle carries a loss. You're allowed to be sad. 💜",follicular:"If sadness lingers, talk to someone.",ovulatory:"Can come from the pressure of it all.",luteal:"Emotionally heavy when TTC. Be gentle with yourself. 🫂",dpo:{"6-14":"Whatever happens this cycle — you showed up, you tracked, you tried. That takes courage. 💛"}},"Happy":{menstrual:"Feeling good? Hold onto it!",follicular:"Oestrogen is your mood's best friend.",ovulatory:"Peak mood time! ✨",luteal:"Hold onto the good moments.",dpo:{"1-14":"A good day in the TWW is a gift. Enjoy today. 💛"}},"Calm":{menstrual:"Feeling calm is a healthy sign.",follicular:"Soak it up.",ovulatory:"Feeling centred is lovely.",luteal:"Studies show chronic stress can affect implantation. Whatever you're doing, keep doing it. 🧘‍♀️",dpo:{"1-14":"Being calm during the TWW is rare and wonderful."}},"Energetic":{menstrual:"Make the most of it!",follicular:"Classic oestrogen boost! ⚡",ovulatory:"Peak energy by design.",luteal:"Unusual — some report unexpected bursts in early pregnancy.",dpo:{"1-14":"Energy in the TWW? Take it and run with it. 🙌"}}};

function getComboInsights(syms,moods,phaseName,dpo,info){
  var all=syms.concat(moods);var combos=[];
  var has=function(s){return all.indexOf(s)>-1};
  var hasCM=function(t){return syms.some(function(s){return s==="CM: "+t})};
  if(dpo&&dpo>=6&&dpo<=12){
    if(has("Spotting")&&has("Cramps"))combos.push({icon:"🤞",color:"var(--plum)",title:"Possible implantation signs",text:"Spotting + cramps at "+dpo+" DPO is a classic implantation combo. Light pink/brown, milder than period cramps."});
    if(has("Fatigue")&&has("Breast tenderness"))combos.push({icon:"📈",color:"var(--plum)",title:"Rising progesterone or early hCG",text:"Fatigue + breast tenderness at "+dpo+" DPO — if these feel MORE intense than usual, worth noting."});
    if(has("Cramps")&&has("Fatigue")&&has("Bloating"))combos.push({icon:"⏳",color:"var(--burnt)",title:"Could go either way",text:"Classic 'is it PMS or pregnancy?' combo. Identical in both scenarios. Test at 12 DPO with FRER."});
  }
  if(dpo&&dpo>=12){
    if(has("Nausea")&&has("Fatigue"))combos.push({icon:"✨",color:"var(--plum)",title:"Test-worthy symptoms",text:"Nausea + fatigue at "+dpo+" DPO — test now with FRER, first morning urine."});
  }
  if(phaseName==="ovulatory"){
    if(hasCM("Egg white")&&has("Cramps"))combos.push({icon:"🥚",color:"var(--gold)",title:"Ovulation likely happening",text:"Egg white CM + cramping is a very strong ovulation signal. Peak fertility — today and tomorrow are crucial."});
    if(hasCM("Egg white")&&!has("Cramps"))combos.push({icon:"🟢",color:"var(--forest)",title:"Peak fertility CM",text:"Egg white CM means peak fertility. Prioritise intercourse today."});
  }
  if(phaseName==="menstrual"){
    if(has("Cramps")&&has("Fatigue")&&has("Headache"))combos.push({icon:"🫂",color:"var(--rose)",title:"Tough period day",text:"Take it easy — ibuprofen, warmth, and iron-rich foods."});
    if(has("Sad")||has("Emotional"))combos.push({icon:"💜",color:"var(--plum)",title:"Period emotions are valid",text:"More than just hormones when TTC — it's grief. Be gentle with yourself."});
  }
  if(has("Anxious")&&has("Tired"))combos.push({icon:"🧡",color:"var(--burnt)",title:"TWW anxiety is real",text:"Progesterone makes you exhausted, waiting makes you anxious. Do something that brings you joy today."});
  return combos;
}

function getInsight(date){
  var info=cInfo();var c=info.c;var ci=info.ci;
  var syms=D.sym[date]||[];var moods=D.mood[date]||[];var all=syms.concat(moods);
  if(!all.length)return null;
  var od=effOv(ci);var cd=db(c.key,date)+1;var dpo=od?(cd-od):null;
  var phaseName=cd<=5?"menstrual":(!od||cd<(od||info.ao)-1)?"follicular":(cd>=(od||info.ao)-1&&cd<=(od||info.ao)+1)?"ovulatory":"luteal";
  var hist={};all.forEach(function(s){hist[s]=0});
  D.cycles.forEach(function(cc,i){if(isExcl(i))return;cc.readings.forEach(function(r){
    if(r.day===cd){var rs=(D.sym[r.date]||[]).concat(D.mood[r.date]||[]);rs.forEach(function(s){if(hist[s]!==undefined)hist[s]++})}
  })});
  var cards=[];
  all.forEach(function(s){
    var kb=SKB[s];if(!kb)return;
    var txt=kb[phaseName]||"";
    if(dpo&&dpo>0&&kb.dpo){
      var best=null;
      Object.keys(kb.dpo).forEach(function(range){
        var parts=range.split("-");var lo=parseInt(parts[0]),hi=parseInt(parts[1]||parts[0]);
        if(dpo>=lo&&dpo<=hi)best=kb.dpo[range];
      });
      if(best)txt=best;
    }
    var personal="";var cnt=hist[s]||0;
    var totalCyc=D.cycles.filter(function(cc2,i2){return!isExcl(i2)}).length;
    if(cnt>0)personal="You've had "+s.replace("CM: ","")+" on Day "+cd+" in "+cnt+" of "+totalCyc+" tracked cycles.";
    else personal="First time logging "+s.replace("CM: ","")+" on Day "+cd+".";
    cards.push({sym:s,phase:txt,personal:personal});
  });
  return cards;
}

function showInsight(date){
  var el=document.getElementById('aiResult');if(!el)return;
  var dt=date||td();
  var cards=getInsight(dt);
  if(!cards||!cards.length){el.innerHTML='<div style="font-size:12px;color:var(--txt4);padding:8px 0">Log symptoms to get insights</div>';return}
  var info=cInfo();var ci=info.ci;var c=info.c;
  var od=effOv(ci);var cd=db(c.key,dt)+1;var dpo=od?(cd-od):null;
  var phaseName=cd<=5?"menstrual":(!od||cd<(od||info.ao)-1)?"follicular":(cd>=(od||info.ao)-1&&cd<=(od||info.ao)+1)?"ovulatory":"luteal";
  var syms=D.sym[dt]||[];var moods=D.mood[dt]||[];
  var combos=getComboInsights(syms,moods,phaseName,dpo,info);
  var h='';
  if(combos.length){combos.forEach(function(cb){
    h+='<div style="padding:12px;background:var(--cream);border-radius:12px;margin-bottom:8px;border-left:3px solid '+cb.color+'">';
    h+='<div style="font-size:13px;font-weight:800;color:'+cb.color+';margin-bottom:6px">'+cb.icon+' '+cb.title+'</div>';
    h+='<div style="font-size:12px;color:var(--txt);line-height:1.6">'+cb.text+'</div></div>';
  })}
  h+='<div>';
  cards.forEach(function(c2){
    h+='<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)">';
    h+='<div style="font-size:12px;font-weight:700;color:var(--burnt)">'+c2.sym.replace("CM: ","")+'</div>';
    h+='<div style="font-size:12px;color:var(--txt);line-height:1.5;margin-top:3px">'+c2.phase+'</div>';
    h+='<div style="font-size:11px;color:var(--cobalt);margin-top:3px">'+c2.personal+'</div></div>';
  });
  h+='</div><div class="ai-disclaimer">General guidance — not medical advice.</div>';
  el.innerHTML=h;
}

function analyseSymptoms(date){showInsight(date)}
function analyseFromModal(date){showInsight(date)}

function getBiology(info){
  var cd=info.cd;var dpo=info.ho?(cd-info.od):null;
  if(dpo!==null&&dpo>=0){
    var dpoBio={0:{icon:"🥚",title:"Ovulation day",body:"Your dominant follicle has ruptured, releasing an egg into the fallopian tube. The egg is viable for 12-24 hours."},1:{icon:"🏊",title:"Fertilisation window",body:"If sperm are present, fertilisation happens today. The fertilised egg is now a zygote."},2:{icon:"🔬",title:"First cell divisions",body:"The zygote divides into 2 cells, then 4. Floating through the fallopian tube."},3:{icon:"🫧",title:"Morula stage",body:"Now 8-16 cells, called a morula. Still travelling through the tube."},4:{icon:"💫",title:"Blastocyst forming",body:"Develops a fluid-filled cavity. Two cell groups: inner (baby) and trophoblast (placenta)."},5:{icon:"🏠",title:"Arriving in the uterus",body:"The blastocyst enters the uterine cavity and floats freely, absorbing nutrients."},6:{icon:"📌",title:"Implantation can begin",body:"May start attaching to the uterine wall. Only ~15% implant this early."},7:{icon:"🔗",title:"Implantation window",body:"Prime implantation day. Tiny blood vessels may be disrupted — this causes implantation spotting."},8:{icon:"✨",title:"Peak implantation day",body:"Most common day. hCG secretion begins, signalling corpus luteum to keep producing progesterone."},9:{icon:"📈",title:"hCG rising",body:"hCG doubling every ~48 hours. FRER might show faint line but most won't yet."},10:{icon:"🧪",title:"Testing becomes possible",body:"hCG may be detectable on a sensitive test. Use first morning urine. Negative today doesn't mean you're out."},11:{icon:"🧪",title:"Reliable testing day",body:"Most implantations done. A faint line IS a positive."},12:{icon:"📊",title:"Definitive testing",body:"~90% of pregnancies show positive by 12 DPO. If negative, test again in 2 days."},13:{icon:"⏰",title:"Period watch day",body:"Without hCG, progesterone drops and lining breaks down. If pregnant, hCG maintains progesterone."},14:{icon:"🔴",title:"Expected period day",body:"Without pregnancy, progesterone triggers menstruation. If positive: congratulations!"}};
    if(dpoBio[dpo])return dpoBio[dpo];
    if(dpo>14)return{icon:"⏳",title:dpo+" DPO",body:"Past typical 14-day luteal phase. Retest in 2 days if negative."};
  }
  if(cd<=2)return{icon:"🔴",title:"Menstruation — Day "+cd,body:"Progesterone and oestrogen at lowest. Endometrium shedding. FSH already recruiting follicles."};
  if(cd<=5)return{icon:"🔴",title:"Late period — Day "+cd,body:"Flow tapering. One follicle winning dominance. Oestrogen starting to rise."};
  if(cd<=8)return{icon:"🌱",title:"Early follicular — Day "+cd,body:"Dominant follicle growing 1-2mm/day. Oestrogen thickening the lining."};
  if(cd<=12)return{icon:"🌿",title:"Mid follicular — Day "+cd,body:"Oestrogen accelerating. Follicle ~14-18mm. CM transitioning towards fertile."};
  if(cd<=info.ao-2)return{icon:"🔥",title:"Pre-ovulatory — Day "+cd,body:"Oestrogen peaks, triggering LH surge. Follicle ~20-24mm. Peak CM."};
  if(cd<=info.ao+1)return{icon:"🥚",title:"Ovulatory window — Day "+cd,body:"LH surge causes follicle rupture 24-36 hours later. Peak fertility."};
  return{icon:"🫂",title:"Luteal phase — Day "+cd,body:"Progesterone dominates. Maintains lining, raises BBT, causes symptoms."};
}

var FFACTS=["Sperm can survive up to 5 days in fertile cervical mucus, but the egg only lives 12-24 hours.","The best days for conception are OV-2, OV-1, and OV day. OV-1 has the highest single-day rate at ~25-30%.","BBT rises AFTER ovulation — by the time you see the shift, the window has passed. That's why CM and OPKs matter too.","A 'triphasic' chart is seen in ~12% of pregnancy charts and ~5% of non-pregnancy charts.","Implantation most commonly happens 8-10 DPO. Only ~5% implant before day 7.","Egg white CM can keep sperm alive for up to 5 days, while dry/sticky CM is hostile to sperm.","Progesterone raises body temp by 0.2-0.5°C — the entire basis of BBT tracking.","A luteal phase shorter than 10 days may not give enough time to implant.","hCG doubles approximately every 48 hours in early pregnancy.","Stress can delay ovulation but cannot delay your period once OV has occurred.","Having sex every day vs every other day in the fertile window has roughly the same pregnancy rates.","The endometrium grows from ~1mm after period to 8-14mm by ovulation.","Folic acid takes 3 months to reach optimal levels. Take 400mcg daily now.","Moderate exercise improves fertility; excessive high-intensity exercise can suppress ovulation.","Hydration directly affects CM quality. Aim for 2+ litres daily.","An egg is the largest cell in the human body at ~0.1mm.","The corpus luteum produces progesterone for ~12-14 days unless hCG tells it to keep going.","Women who track cycles have conception rates of ~80% within 6 cycles vs ~60% untracked.","BBT is most accurate taken at the same time daily after 3+ hours of uninterrupted sleep.","Your body produces ~200-300 eggs in a lifetime from ~1-2 million at birth."];
function getFact(){var day=Math.floor((new Date()-new Date('2024-01-01'))/864e5);return FFACTS[day%FFACTS.length]}

  var todaySy=D.sym[td()]||[];var todayCM=todaySy.filter(function(s){return s.indexOf("CM:")===0});
  if(info.cd<=5){gp.title="Period day "+info.cd;gp.color="var(--rose)";gp.sub="Rest up. Your body is resetting.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Take prenatal vitamin",done:false},{txt:"Rest & hydrate",done:false}]}
  else if(!info.ho&&info.cd>=fw-2&&info.cd<fw){gp.title="Fertile window in "+(fw-info.cd)+" days";gp.color="var(--gold)";gp.sub="Almost time. Start OPK testing daily.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Take OPK test",done:!!D.opks[td()]},{txt:"Log CM",done:todayCM.length>0},{txt:"Have sex tonight or tomorrow",done:!!D.sex[td()]}]}
  else if(!info.ho&&info.cd>=fw&&info.cd<=info.ao){gp.title="Fertile window — GO TIME";gp.color="var(--burnt)";gp.sub="Best chance this cycle. Prioritise intercourse.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Take OPK test",done:!!D.opks[td()]},{txt:"Log CM",done:todayCM.length>0},{txt:"Have sex today",done:!!D.sex[td()]}]}
  else if(info.ho&&dpo<=5){gp.title=dpo+" DPO — early TWW";gp.color="var(--plum)";gp.sub="Too early to know. Just keep logging temps.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Take prenatal",done:false}]}
  else if(info.ho&&dpo>=6&&dpo<=9){gp.title=dpo+" DPO — implantation window";gp.color="var(--plum)";gp.sub="Implantation typically happens now. Note unusual symptoms.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Log symptoms",done:todaySy.length>0},{txt:"Don't test yet — too early",done:false}]}
  else if(info.ho&&dpo>=10&&dpo<=12){gp.title=dpo+" DPO — testing window";gp.color="var(--cobalt)";gp.sub="You can test with FRER. First morning urine.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Test with FRER",done:D.ptests.some(function(p){return p.date===td()})},{txt:"Log symptoms",done:todaySy.length>0}]}
  else if(info.ho&&dpo>=13){gp.title=dpo+" DPO — test day";gp.color="var(--cobalt)";gp.sub="Reliable test day.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Test if you haven't",done:D.ptests.some(function(p){return p.date===td()})},{txt:"Log symptoms",done:todaySy.length>0}]}
  else{gp.title="Day "+info.cd+" — follicular phase";gp.color="var(--forest)";gp.sub="Building up to ovulation. Oestrogen rising.";gp.actions=[{txt:"Log temp",done:!!todayR},{txt:"Log CM",done:todayCM.length>0},{txt:"Take prenatal",done:false}]}
  return gp;
}

function getStreak(){var c=D.cycles[D.cycles.length-1];var streak=0;var d=td();for(var i=0;i<60;i++){if(c.readings.some(function(r){return r.date===d})){streak++;d=ad(d,-1)}else break}return streak}

    else if(cp.pct>0)noteS.push({icon:'📅',k:'Conception timing was off',v:'Only '+cp.pct+'%. Sex didn\'t align well with your fertile window. Aim for OV-2 to OV+1 for best chances'});
    else if(eod)noteS.push({icon:'📅',k:'No intimacy in fertile window',v:'No sex logged in your fertile days. The egg only lives 12-24 hours, so timing is critical'});
  }
  
  // Sex frequency
  if(sexCount>=8)goodS.push({icon:'💞',k:'Strong intimacy frequency',v:sexCount+' days this cycle. Frequent sex catches the fertile window'});
  else if(sexCount<=2&&info.cd>=14)noteS.push({icon:'💞',k:'Low intimacy this cycle',v:'Only '+sexCount+' days. ACOG recommends sex every 1-2 days through fertile window for TTC'});
  
  // CM
  if(cm){
    if(cm.pct>=50)goodS.push({icon:'💧',k:'Good fertile mucus',v:cm.pct+'% — '+cm.lbl+'. Egg-white CM lets sperm survive 3-5 days'});
    else if(cm.pct>0)noteS.push({icon:'💧',k:'Lower fertile mucus this cycle',v:cm.pct+'% — '+cm.lbl+'. Try staying hydrated. Some women find CoQ10 or evening primrose oil helpful'});
  }
  
  // Temp consistency
  if(temps.length>=10){
    var avg=temps.reduce(function(a,b){return a+b},0)/temps.length;
    var variance=temps.reduce(function(a,b){return a+Math.pow(b-avg,2)},0)/temps.length;
    var sd=Math.sqrt(variance);
    if(sd>0.25)noteS.push({icon:'🌡',k:'Variable temperatures',v:'SD '+sd.toFixed(2)+'° — readings are quite variable. Could be sleep timing, late nights, or alcohol. Aim to take temp at the same time daily'});
    else goodS.push({icon:'🌡',k:'Consistent temp readings',v:'SD '+sd.toFixed(2)+'° — your readings are reliable'});
  }
  
  // Symptoms pattern
  var cycSym={};c.readings.forEach(function(r){(D.sym[r.date]||[]).forEach(function(s){cycSym[s]=(cycSym[s]||0)+1})});
  for(var d3=1;d3<=info.cd;d3++){var dt3=ad(c.key,d3-1);(D.sym[dt3]||[]).forEach(function(s){if(!c.readings.find(function(r){return r.date===dt3})){cycSym[s]=(cycSym[s]||0)+1}})}
  var topSym=Object.keys(cycSym).sort(function(a,b){return cycSym[b]-cycSym[a]}).slice(0,3);
  if(topSym.length)noteS.push({icon:'📋',k:'Top symptoms this cycle',v:topSym.map(function(s){return s+' ('+cycSym[s]+'d)'}).join(', ')});
  
  // Pregnancy in TWW?
  if(dpo&&dpo>=6){
    noteS.push({icon:'🔍',k:'In implantation window',v:dpo+' DPO. Most implantation happens 8-10 DPO. Don\'t test before 11 DPO for accurate result'});
  }
  
  // Render this-cycle analysis
  function renderInsights(items,label,color){
    if(!items.length)return '';
    var hh='<div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;color:'+color+';text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'+label+'</div>';
    items.forEach(function(s){hh+='<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.04)"><span style="font-size:14px;flex-shrink:0;margin-top:1px">'+s.icon+'</span><div><div style="font-size:11px;font-weight:700;color:var(--txt)">'+s.k+'</div><div style="font-size:11px;color:var(--txt2);line-height:1.45;margin-top:1px">'+s.v+'</div></div></div>'});
    return hh+'</div>';
  }
  
  h+='<div class="card" style="padding:14px 16px;border-left:3px solid '+(warnS.length?'var(--rose)':noteS.length>=3?'var(--gold)':'var(--forest)')+'">';
  h+=renderInsights(warnS,'Worth discussing with GP','var(--rose)');
  h+=renderInsights(noteS,'Worth noting','var(--cobalt)');
  h+=renderInsights(goodS,'Going well','var(--forest)');
  h+='</div></div>';
  
  // ===== COMPARE TO ANOTHER CYCLE =====
  h+='<div class="section"><div class="sec-hdr"><span class="sec-title" style="font-size:11px;color:var(--cobalt);text-transform:uppercase;letter-spacing:.8px;font-weight:700">Compare to Another Cycle</div></div>';
  h+='<div class="card" style="padding:12px 14px"><div style="font-size:11px;color:var(--txt3);margin-bottom:10px">Pick a previous cycle to compare side-by-side with this one.</div>';
  h+='<select onchange="docCmpA='+ci+';docCmpB=parseInt(this.value);render()" style="width:100%;padding:12px;border-radius:10px;border:1.5px solid var(--cream3);font-size:13px;font-weight:600;background:var(--card);color:var(--txt);outline:none">';
  h+='<option value="-1">— Select a cycle —</option>';
  D.cycles.forEach(function(cc,i){
    if(i===ci)return;
    var ex=isExcl(i)?' [excluded]':'';
    h+='<option value="'+i+'"'+(docCmpB===i?' selected':'')+'>C'+(i+1)+' · '+cc.label+ex+'</option>';
  });
  h+='</select></div></div>';
  
  // Show comparison if selected
  if(docCmpB>=0&&docCmpB!==ci&&D.cycles[docCmpB]){
    var ca=c;var cb=D.cycles[docCmpB];
    var lA='C'+(ci+1),lB='C'+(docCmpB+1);
    var odA=ovDay(ca),odB=ovDay(cb);
    var lpA=odA&&ca.length?(ca.length-odA):(odA&&info.cd>odA?(info.cd-odA):null);
    var lpB=odB&&cb.length?(cb.length-odB):null;
    var cpA=conceptionProb(ci),cpB=conceptionProb(docCmpB);
    var cmA=cmScore(ci),cmB=cmScore(docCmpB);
    var sexA=0,sexB=0;
    ca.readings.forEach(function(r){if(D.sex[r.date])sexA++});
    cb.readings.forEach(function(r){if(D.sex[r.date])sexB++});
    var tsA=ca.readings.filter(function(r){return r.temp!=null}).map(function(r){return r.temp});
    var tsB=cb.readings.filter(function(r){return r.temp!=null}).map(function(r){return r.temp});
    var avgA=tsA.length?(tsA.reduce(function(a,b){return a+b},0)/tsA.length):null;
    var avgB=tsB.length?(tsB.reduce(function(a,b){return a+b},0)/tsB.length):null;
    
    var insights=[],stronger=[],neutral=[];
    
    // Length
    if(ca.length&&cb.length){
      var ldiff=ca.length-cb.length;
      if(Math.abs(ldiff)<=2)neutral.push({icon:'✓',k:'Cycle length',v:'Both '+ca.length+'/'+cb.length+'d — consistent'});
      else if(Math.abs(ldiff)<=5)insights.push({icon:'📏',c:'var(--cobalt)',k:'Cycle length differs',v:lA+' '+ca.length+'d vs '+lB+' '+cb.length+'d. '+Math.abs(ldiff)+'d difference is within normal variation'});
      else insights.push({icon:'⚠️',c:'var(--gold)',k:'Notable cycle length variation',v:lA+' '+ca.length+'d vs '+lB+' '+cb.length+'d — '+Math.abs(ldiff)+'d difference. If this becomes a pattern, mention to GP'});
    }
    
    // OV
    if(odA&&odB){
      var odiff=odA-odB;
      if(Math.abs(odiff)<=1)neutral.push({icon:'✓',k:'Ovulation timing',v:'Day '+odA+'/'+odB+' — very consistent'});
      else if(Math.abs(odiff)<=3)insights.push({icon:'🥚',c:'var(--cobalt)',k:'OV timing slightly differs',v:lA+' Day '+odA+', '+lB+' Day '+odB+' — within normal range'});
      else insights.push({icon:'⏰',c:'var(--gold)',k:'Ovulation timing varies',v:lA+' Day '+odA+' vs '+lB+' Day '+odB+' — '+Math.abs(odiff)+'d gap affects fertile window timing'});
    }
    
    // Luteal
    if(lpA&&lpB){
      if(lpA<10||lpB<10){var sC=lpA<10?lA:lB;var sLP=Math.min(lpA,lpB);
        insights.push({icon:'🚨',c:'var(--rose)',k:'Short luteal phase in '+sC,v:sLP+'d. Below 10 days can indicate luteal phase defect'});
      }else if(Math.abs(lpA-lpB)<=2)neutral.push({icon:'✓',k:'Luteal phase',v:lpA+'/'+lpB+'d — both healthy'});
      else insights.push({icon:'📊',c:'var(--cobalt)',k:'Luteal phase variation',v:lpA+'d vs '+lpB+'d. Both still healthy (10+)'});
    }
    
    // Conception
    if(cpA&&cpB){
      var cpdiff=cpA.pct-cpB.pct;
      var bC=cpA.pct>cpB.pct?lA:lB;var bP=Math.max(cpA.pct,cpB.pct);
      if(Math.abs(cpdiff)<=10)neutral.push({icon:'✓',k:'Conception timing',v:'Both ~'+Math.round((cpA.pct+cpB.pct)/2)+'%'});
      else stronger.push({icon:'🎯',c:'var(--forest)',k:'Better timing in '+bC,v:bC+' '+bP+'% vs '+(bC===lA?cpB.pct:cpA.pct)+'%. '+(cpdiff>0&&bC===lA?'This cycle':'The other cycle')+' caught the fertile window better'});
    }
    
    // CM
    if(cmA&&cmB){
      if(Math.abs(cmA.pct-cmB.pct)<=15)neutral.push({icon:'✓',k:'CM quality',v:'Similar — '+cmA.pct+'%/'+cmB.pct+'%'});
      else{var bCM=cmA.pct>cmB.pct?lA:lB;
        stronger.push({icon:'💧',c:'var(--forest)',k:'Better fertile CM in '+bCM,v:Math.max(cmA.pct,cmB.pct)+'% vs '+Math.min(cmA.pct,cmB.pct)+'%'});
      }
    }
    
    // Temp baseline
    if(avgA&&avgB){
      var tdiff=avgA-avgB;
      if(Math.abs(tdiff)<0.1)neutral.push({icon:'✓',k:'Temperature baseline',v:'Stable — '+avgA.toFixed(2)+'°/'+avgB.toFixed(2)+'°'});
      else if(Math.abs(tdiff)>=0.2)insights.push({icon:'🌡',c:'var(--gold)',k:'Notable temp shift',v:lA+' '+avgA.toFixed(2)+'° vs '+lB+' '+avgB.toFixed(2)+'°. '+Math.abs(tdiff).toFixed(2)+'° shift could be thyroid, illness, or measurement timing'});
    }
    
    // Sex
    if(Math.abs(sexA-sexB)>=3){
      var moreSex=sexA>sexB?lA:lB;
      insights.push({icon:'💞',c:'var(--cobalt)',k:'Intimacy frequency differs',v:moreSex+' had '+Math.max(sexA,sexB)+'d vs '+Math.min(sexA,sexB)+'d. More frequent = more chances'});
    }
    
    // Pregnancy benchmark
    if(isExcl(ci)&&!isExcl(docCmpB))stronger.push({icon:'🤰',c:'var(--forest)',k:'This cycle was a pregnancy',v:'Benchmark — what worked then'});
    if(isExcl(docCmpB)&&!isExcl(ci))stronger.push({icon:'🤰',c:'var(--forest)',k:lB+' was a pregnancy',v:'That\'s your benchmark cycle. Compare timing, CM, and sex frequency closely to see what differed'});
    
    // Verdict
    var verdict='',vCol='var(--cobalt)';
    if(stronger.length>=2&&insights.length<=1){verdict='Cycles look strong overall';vCol='var(--forest)'}
    else if(insights.filter(function(i){return i.c==='var(--rose)'}).length>0){verdict='Notable differences worth discussing';vCol='var(--rose)'}
    else if(insights.filter(function(i){return i.c==='var(--gold)'}).length>=2){verdict='Some inconsistency between cycles';vCol='var(--gold)'}
    else if(neutral.length>=3){verdict='Your cycles are remarkably consistent';vCol='var(--forest)'}
    else verdict='Broadly similar with some variation';
    
    h+='<div class="section"><div class="card" style="padding:14px 16px;border-left:3px solid '+vCol+'">';
    h+='<div style="font-size:10px;font-weight:700;color:'+vCol+';text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Comparison Verdict</div>';
    h+='<div style="font-size:14px;font-weight:700;color:var(--txt);margin-bottom:10px">'+verdict+'</div>';
    h+=renderInsights(stronger,'What\'s working','var(--forest)');
    h+=renderInsights(insights.sort(function(a,b){var p={'var(--rose)':3,'var(--gold)':2,'var(--cobalt)':1};return (p[b.c]||0)-(p[a.c]||0)}),'Worth noting','var(--cobalt)');
    h+=renderInsights(neutral,'Consistent','var(--txt4)');
    h+='</div></div>';
    
    // Quick stats table
    h+='<div class="section"><div class="card" style="padding:0;overflow:hidden">';
    h+='<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:var(--cream)"><th style="padding:8px;text-align:left"></th><th style="padding:8px;color:'+PAL[ci%7]+'">'+lA+'</th><th style="padding:8px;color:'+PAL[docCmpB%7]+'">'+lB+'</th></tr></thead><tbody>';
    function dRow(l,a,b){if(a==null&&b==null)return '';return '<tr style="border-top:1px solid rgba(0,0,0,.05)"><td style="padding:6px 8px;color:var(--txt3)">'+l+'</td><td style="padding:6px 8px;font-weight:700">'+(a==null?'—':a)+'</td><td style="padding:6px 8px;font-weight:700">'+(b==null?'—':b)+'</td></tr>'}
    h+=dRow('Length',ca.length?ca.length+'d':'ongoing',cb.length?cb.length+'d':null);
    h+=dRow('Ovulation',odA?'Day '+odA:null,odB?'Day '+odB:null);
    h+=dRow('Luteal',lpA?lpA+'d':null,lpB?lpB+'d':null);
    h+=dRow('Conception',cpA?cpA.pct+'%':null,cpB?cpB.pct+'%':null);
    h+=dRow('CM quality',cmA?cmA.pct+'%':null,cmB?cmB.pct+'%':null);
    h+=dRow('Intimacy',sexA+'d',sexB+'d');
    h+=dRow('Avg temp',avgA?avgA.toFixed(2)+'°':null,avgB?avgB.toFixed(2)+'°':null);
    h+='</tbody></table></div></div>';
  }
  
  // Doctor report buttons at bottom
  h+='<div class="section"><div class="sec-hdr"><span class="sec-title" style="font-size:11px;color:var(--cobalt);text-transform:uppercase;letter-spacing:.8px;font-weight:700">Export</div></div>';
  h+='<div class="card" style="padding:12px 14px">';
  h+='<button onclick="exportDoctorReport()" style="width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;background:var(--cobalt);color:#fff;margin-bottom:6px">📄 Full Doctor Report</button>';
  h+='<button onclick="exportDayByDay()" style="width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;background:var(--burnt);color:#fff">📅 Current Cycle Day-by-Day</button>';
  h+='</div></div>';
  
  return h;
}

    h+=fwBar('OV-2 (high)',ov2Hit,fws.length,'var(--gold)');
    h+=fwBar('OV day',ovHit2,fws.length,'var(--forest)');
    h+=fwBar('Any peak day',anyPeak,fws.length,'var(--cobalt)');
    h+='<div style="font-size:10px;color:var(--txt4);margin-top:8px">OV-1 and OV-2 have the highest conception rates (~25-30%)</div>';
    h+='</div>'+colEnd()+'</div>';
  }

  // Prediction accuracy
  var pa=predAccuracy();
  if(pa.length>=2){
    var avgErr=pa.reduce(function(a,b){return a+Math.abs(b.diff)},0)/pa.length;
    var within1=pa.filter(function(p){return Math.abs(p.diff)<=1}).length;
    var within3=pa.filter(function(p){return Math.abs(p.diff)<=3}).length;
    h+='<div class="section">'+colHdr('i-pred','Prediction Accuracy');

    h+='<div class="card" style="padding:14px 16px">';

    h+='<span style="font-size:10px;color:var(--txt4)">'+within1+'/'+pa.length+' within 1 day</span></div>';
    pa.forEach(function(p){
      var col=Math.abs(p.diff)<=1?'var(--forest)':Math.abs(p.diff)<=3?'var(--gold)':'var(--burnt)';
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:11px">';
      h+='<span style="color:'+PAL[p.i%7]+';font-weight:600">C'+(p.i+1)+'</span>';
      h+='<span style="color:var(--txt3)">Predicted '+p.predicted+'d</span>';
      h+='<span style="color:var(--txt)">Actual '+p.actual+'d</span>';

  }

  h+='<div class="section">'+colHdr('i-trend','Cycle Length Trend');

function drawCircle(info){

  }

    var hasWrist=D.wrist&&D.wrist[dt];

    var hasOPK=D.opks&&D.opks[dt];

  var csv="Cycle,Day,Date,Temp,Ovulation,Flow,Intimacy,Moods,Symptoms,Meds,Notes\n";
  D.cycles.forEach(function(c,i){c.readings.forEach(function(r){csv+=(i+1)+","+r.day+","+r.date+","+(r.temp!=null?r.temp.toFixed(2):'')+","+(r.ov?"Yes":"")+","+(r.flow||"")+","+(D.sex[r.date]?"Yes":"")+",\""+(D.mood[r.date]||[]).join("; ")+"\",\""+(D.sym[r.date]||[]).join("; ")+"\",\""+(D.meds[r.date]||[]).join("; ")+"\","+(D.notes[r.date]||"")+"\n"})});
  var b=new Blob([csv],{type:"text/csv"});dlFB(b,"bbt_jess.csv");flash("Exported ✓")
}

function sw(t){curTab=t;render()}
function toggleDark(){D.darkMode=!D.darkMode;document.documentElement.classList.toggle('dark',D.darkMode);document.querySelector('meta[name=theme-color]').content=D.darkMode?'#1C1210':'#B25835';save();render()}
var _undoState=null;
function saveUndo(){_undoState=JSON.stringify(D)}
function undo(){if(!_undoState){flash("Nothing to undo");return}D=JSON.parse(_undoState);_undoState=null;save();render();flash("Undone")}
function flash(m,showUndo){var t=document.createElement('div');t.className='toast';if(showUndo){t.innerHTML=m+' <button onclick="undo();this.parentElement.remove()" style="background:rgba(255,255,255,.25);color:#fff;border:none;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-left:8px">Undo</button>';t.style.pointerEvents='auto'}else{t.textContent=m}document.body.appendChild(t);setTimeout(function(){t.remove()},showUndo?4000:1800)}

load();if(D.darkMode)document.documentElement.classList.add('dark');render();
window.addEventListener('orientationchange',function(){setTimeout(render,200)});
window.addEventListener('resize',function(){clearTimeout(window._rsz);window._rsz=setTimeout(render,150)});

  reg.addEventListener('updatefound',function(){var w=reg.installing;if(w)w.addEventListener('statechange',function(){if(w.state==='activated')flash('App updated ✓')})});
}).catch(function(e){console.log('SW registration failed:',e)})}

var SKB={"Cramps":{menstrual:"Ugh, cramps. Your uterus is doing its thing — squeezing to shed the lining. Totally normal. A hot water bottle and ibuprofen are your best friends today.",follicular:"A bit of cramping now is usually just your ovaries waking up and getting follicles ready.",ovulatory:"This could be mittelschmerz — happens when your follicle pops to release the egg. If it's on one side, even more likely. 🎯",luteal:"Progesterone is the culprit here — it makes everything a bit crampy after ovulation.",dpo:{"6-9":"Cramping at 6-9 DPO is in the implantation window. Some women feel a pulling or pinching when the embryo burrows in. Try not to obsess (easier said than done).","10-12":"Is this period or implantation? Honestly, impossible to tell from cramps alone. If your period doesn't show by 12 DPO, grab a test.","13-14":"Right at the point where your period would normally start. Test if you haven't."}},"Bloating":{menstrual:"Feeling like a balloon? Prostaglandins causing inflammation. It passes — promise.",follicular:"Bloating now isn't super common cycle-wise. Could be diet or stress.",ovulatory:"Blame oestrogen — it's peaking right now and makes you hold water.",luteal:"Welcome to the progesterone bloat club. It literally slows your digestion down.",dpo:{"6-9":"Progesterone bloat feels exactly the same whether or not there's a little embryo. Your body can't tell you yet.","10-14":"Still bloated? Could be PMS, could be early pregnancy — both involve the same hormones."}},"Headache":{menstrual:"Hormone headaches at period start are common — oestrogen just crashed. Water and paracetamol help.",follicular:"Probably not cycle-related. Check hydration and sleep.",ovulatory:"The oestrogen surge can trigger headaches, especially if migraine-prone.",luteal:"Hormones all over the place. Some women get headaches like clockwork here.",dpo:{"6-9":"Headaches during implantation window are common — hormonal shifts regardless.","10-14":"Headaches are commonly reported as early pregnancy symptoms because blood volume increases early."}},"Fatigue":{menstrual:"Your body is doing hard work. Iron dips during period. Rest and eat iron-rich food.",follicular:"Energy should be picking up as oestrogen rises.",ovulatory:"Most women feel energy burst around ovulation.",luteal:"Progesterone is literally a sedative. Feeling wiped is 100% normal. 😴",dpo:{"6-9":"The tiredness is progesterone. But if implantation happens, hCG adds to it.","10-14":"If this tiredness feels DIFFERENT — bone-deep, falling-asleep-at-your-desk tired — pay attention. Test at 12+ DPO. 🤞"}},"Nausea":{menstrual:"Prostaglandins can upset your stomach. Ginger tea helps.",follicular:"Not typically cycle-related.",ovulatory:"Some women get a wave from the hormone surge. Brief and harmless.",luteal:"Progesterone slows digestion. Eat little and often.",dpo:{"6-9":"At 6-9 DPO it's genuinely too early for pregnancy nausea — hCG isn't high enough yet.","10-14":"If genuinely nauseous at 10+ DPO and this isn't normal for you, pay attention. Test if you haven't. 🤞"}},"Backache":{menstrual:"Prostaglandins make back muscles contract. Heat pad helps.",follicular:"Probably posture or activity, not cycle-related.",ovulatory:"Some feel dull ache from follicle rupturing. Usually one-sided.",luteal:"Progesterone relaxes ligaments, making lower back achy.",dpo:{"6-12":"Lower back ache in TWW is progesterone. Some report it as early sign.","13-14":"Back ache near expected period could go either way. Test if late."}},"Breast tenderness":{menstrual:"Tenderness usually eases once period arrives as progesterone drops.",follicular:"Breasts usually least tender now.",ovulatory:"Mild tenderness makes sense — progesterone beginning to rise.",luteal:"Classic. Progesterone makes breast tissue swell. Most common luteal symptom.",dpo:{"6-9":"Your boobs hurt because of progesterone — they'd hurt whether pregnant or not.","10-14":"Women say pregnancy breast tenderness feels DIFFERENT — fuller, heavier, especially nipples."}},"Acne":{menstrual:"Hormone shift triggers extra oil. Calms in a few days.",follicular:"Skin should be at its best — oestrogen is a skin's friend.",ovulatory:"Mini breakout from hormone surge. Short-lived.",luteal:"Progesterone + oil = spots. More sebum in luteal phase.",dpo:{"1-14":"Acne doesn't tell you about pregnancy — all progesterone-driven."}},"Insomnia":{menstrual:"Sleep disruption from hormone nosedive. Settles in a day or two.",follicular:"Sleep usually improves as oestrogen rises.",ovulatory:"Some feel buzzy and wired around ovulation.",luteal:"Irony: progesterone makes you tired but disrupts deep sleep. 🙃",dpo:{"6-9":"Tossing and turning is normal — hormonal + emotional. Try magnesium.","10-14":"Insomnia at 10+ DPO is reported as early pregnancy symptom more than you'd think."}},"Spotting":{menstrual:"Normal at start/end of period.",follicular:"Not super common. Mention to GP if recurring.",ovulatory:"Ovulation spotting is real and a good sign you ovulated! ✨",luteal:"Spotting after OV grabs attention when TTC. Could be implantation or low progesterone.",dpo:{"6-9":"Deep breath. Light pink/brown, small amount, lasting hours not days — ticks implantation boxes. About 25% of pregnancies have some spotting. 🤞","10-12":"Could be late implantation or period starting. If it STOPS, more implantation-like.","13-14":"Right on the edge. Only way to know is to test."}},"CM: Egg white":{menstrual:"Unusual during period. Don't worry about tracking CM today.",follicular:"Your body is gearing up! Oestrogen rising nicely.",ovulatory:"THIS IS IT. Peak fertility. Superhighway for sperm. Go go go. 🏃‍♀️",luteal:"Unusual after confirmed OV — could be secondary oestrogen surge or early pregnancy sign.",dpo:{"1-5":"A bit right after OV can happen as hormones transition.","6-12":"EWCM is back after drying up? Mentioned a lot as early sign. Theory: rising hCG causes secondary mucus surge. 👀"}},"CM: Watery":{menstrual:"Hard to track during period.",follicular:"Oestrogen building — you're on the right track towards fertile mucus.",ovulatory:"Fertile! Not quite egg white but sperm can survive in it. 💪",luteal:"A bit unusual — progesterone normally thickens things.",dpo:{"6-14":"Noticing watery CM when normally dry? Common anecdotal observation before positive tests."}},"CM: Creamy":{menstrual:"Can't tell during period.",follicular:"Transitional — moving from dry towards fertile.",ovulatory:"Not quite peak but don't dismiss it — creamy might be YOUR peak.",luteal:"Classic luteal phase mucus. Totally normal.",dpo:{"1-14":"Standard throughout TWW. Some say MORE than usual before positive."}},"CM: Dry":{menstrual:"Normal.",follicular:"Normal at start. CM ramps up closer to OV. Stay hydrated.",ovulatory:"Not ideal for conception. Try Preseed lubricant during sex.",luteal:"Classic progesterone doing its job.",dpo:{"1-14":"Dryness in TWW is the norm. Don't read into it."}},"Tired":{menstrual:"Your body's saying 'slow down.' Listen to it. 💤",follicular:"Energy should pick up. Check sleep and iron.",ovulatory:"Energy usually peaks. If tired, something else might be off.",luteal:"Progesterone is nature's sleeping pill. Nap if you can. 😴",dpo:{"6-14":"If this tiredness feels DIFFERENT — bone-deep, can't-keep-your-eyes-open tired — that's what women describe as early pregnancy fatigue. 🤞"}},"Irritable":{menstrual:"Oestrogen and progesterone crashed simultaneously. Biological reason, not 'just you.'",follicular:"Mood usually lifts. Might be life stuff.",ovulatory:"High oestrogen usually makes you feel great.",luteal:"Progesterone affects serotonin. Genuinely chemical, not a character flaw. 💛",dpo:{"6-14":"Between progesterone messing with serotonin AND the emotional weight of waiting... anyone would be snappy."}},"Anxious":{menstrual:"Anxiety spikes when period arrives — hormonal + emotional. Both valid. 💜",follicular:"Usually eases as oestrogen rises.",ovulatory:"Might be about timing pressure rather than hormones.",luteal:"TWW is an anxiety generator. Progesterone makes it worse chemically. 🫂",dpo:{"6-14":"The anxiety of the TWW is one of the hardest parts. The outcome is already decided — worrying won't change it. 💜"}},"Emotional":{menstrual:"Hormones did a dramatic shift. Plus, getting your period when TTC is genuinely sad.",follicular:"Less common hormonally. Maybe still processing last cycle.",ovulatory:"Some feel everything more intensely around ovulation.",luteal:"Progesterone turns up the volume on ALL emotions. SO normal. 😭",dpo:{"6-14":"Being emotional in the TWW is part hormones, part hope, part fear. You're not 'too much.' You're human. 💛"}},"Sad":{menstrual:"This is grief. Each failed cycle carries a loss. You're allowed to be sad. 💜",follicular:"If sadness lingers, talk to someone.",ovulatory:"Can come from the pressure of it all.",luteal:"Emotionally heavy when TTC. Be gentle with yourself. 🫂",dpo:{"6-14":"Whatever happens this cycle — you showed up, you tracked, you tried. That takes courage. 💛"}},"Happy":{menstrual:"Feeling good? Hold onto it!",follicular:"Oestrogen is your mood's best friend.",ovulatory:"Peak mood time! ✨",luteal:"Hold onto the good moments.",dpo:{"1-14":"A good day in the TWW is a gift. Enjoy today. 💛"}},"Calm":{menstrual:"Feeling calm is a healthy sign.",follicular:"Soak it up.",ovulatory:"Feeling centred is lovely.",luteal:"Studies show chronic stress can affect implantation. Whatever you're doing, keep doing it. 🧘‍♀️",dpo:{"1-14":"Being calm during the TWW is rare and wonderful."}},"Energetic":{menstrual:"Make the most of it!",follicular:"Classic oestrogen boost! ⚡",ovulatory:"Peak energy by design.",luteal:"Unusual — some report unexpected bursts in early pregnancy.",dpo:{"1-14":"Energy in the TWW? Take it and run with it. 🙌"}}};

function getComboInsights(syms,moods,phaseName,dpo,info){
  var all=syms.concat(moods);var combos=[];
  var has=function(s){return all.indexOf(s)>-1};
  var hasCM=function(t){return syms.some(function(s){return s==="CM: "+t})};
  if(dpo&&dpo>=6&&dpo<=12){
    if(has("Spotting")&&has("Cramps"))combos.push({icon:"🤞",color:"var(--plum)",title:"Possible implantation signs",text:"Spotting + cramps at "+dpo+" DPO is a classic implantation combo. Light pink/brown, milder than period cramps."});
    if(has("Fatigue")&&has("Breast tenderness"))combos.push({icon:"📈",color:"var(--plum)",title:"Rising progesterone or early hCG",text:"Fatigue + breast tenderness at "+dpo+" DPO — if these feel MORE intense than usual, worth noting."});
    if(has("Cramps")&&has("Fatigue")&&has("Bloating"))combos.push({icon:"⏳",color:"var(--burnt)",title:"Could go either way",text:"Classic 'is it PMS or pregnancy?' combo. Identical in both scenarios. Test at 12 DPO with FRER."});
  }
  if(dpo&&dpo>=12){
    if(has("Nausea")&&has("Fatigue"))combos.push({icon:"✨",color:"var(--plum)",title:"Test-worthy symptoms",text:"Nausea + fatigue at "+dpo+" DPO — test now with FRER, first morning urine."});
  }
  if(phaseName==="ovulatory"){
    if(hasCM("Egg white")&&has("Cramps"))combos.push({icon:"🥚",color:"var(--gold)",title:"Ovulation likely happening",text:"Egg white CM + cramping is a very strong ovulation signal. Peak fertility — today and tomorrow are crucial."});
    if(hasCM("Egg white")&&!has("Cramps"))combos.push({icon:"🟢",color:"var(--forest)",title:"Peak fertility CM",text:"Egg white CM means peak fertility. Prioritise intercourse today."});
  }
  if(phaseName==="menstrual"){
    if(has("Cramps")&&has("Fatigue")&&has("Headache"))combos.push({icon:"🫂",color:"var(--rose)",title:"Tough period day",text:"Take it easy — ibuprofen, warmth, and iron-rich foods."});
    if(has("Sad")||has("Emotional"))combos.push({icon:"💜",color:"var(--plum)",title:"Period emotions are valid",text:"More than just hormones when TTC — it's grief. Be gentle with yourself."});
  }
  if(has("Anxious")&&has("Tired"))combos.push({icon:"🧡",color:"var(--burnt)",title:"TWW anxiety is real",text:"Progesterone makes you exhausted, waiting makes you anxious. Do something that brings you joy today."});
  return combos;
}

function getInsight(date){
  var info=cInfo();var c=info.c;var ci=info.ci;
  var syms=D.sym[date]||[];var moods=D.mood[date]||[];var all=syms.concat(moods);
  if(!all.length)return null;
  var od=effOv(ci);var cd=db(c.key,date)+1;var dpo=od?(cd-od):null;
  var phaseName=cd<=5?"menstrual":(!od||cd<(od||info.ao)-1)?"follicular":(cd>=(od||info.ao)-1&&cd<=(od||info.ao)+1)?"ovulatory":"luteal";
  var hist={};all.forEach(function(s){hist[s]=0});
  D.cycles.forEach(function(cc,i){if(isExcl(i))return;cc.readings.forEach(function(r){
    if(r.day===cd){var rs=(D.sym[r.date]||[]).concat(D.mood[r.date]||[]);rs.forEach(function(s){if(hist[s]!==undefined)hist[s]++})}
  })});
  var cards=[];
  all.forEach(function(s){
    var kb=SKB[s];if(!kb)return;
    var txt=kb[phaseName]||"";
    if(dpo&&dpo>0&&kb.dpo){
      var best=null;
      Object.keys(kb.dpo).forEach(function(range){
        var parts=range.split("-");var lo=parseInt(parts[0]),hi=parseInt(parts[1]||parts[0]);
        if(dpo>=lo&&dpo<=hi)best=kb.dpo[range];
      });
      if(best)txt=best;
    }
    var personal="";var cnt=hist[s]||0;
    var totalCyc=D.cycles.filter(function(cc2,i2){return!isExcl(i2)}).length;
    if(cnt>0)personal="You've had "+s.replace("CM: ","")+" on Day "+cd+" in "+cnt+" of "+totalCyc+" tracked cycles.";
    else personal="First time logging "+s.replace("CM: ","")+" on Day "+cd+".";
    cards.push({sym:s,phase:txt,personal:personal});
  });
  return cards;
}

function showInsight(date){
  var el=document.getElementById('aiResult');if(!el)return;
  var dt=date||td();
  var cards=getInsight(dt);
  if(!cards||!cards.length){el.innerHTML='<div style="font-size:12px;color:var(--txt4);padding:8px 0">Log symptoms to get insights</div>';return}
  var info=cInfo();var ci=info.ci;var c=info.c;
  var od=effOv(ci);var cd=db(c.key,dt)+1;var dpo=od?(cd-od):null;
  var phaseName=cd<=5?"menstrual":(!od||cd<(od||info.ao)-1)?"follicular":(cd>=(od||info.ao)-1&&cd<=(od||info.ao)+1)?"ovulatory":"luteal";
  var syms=D.sym[dt]||[];var moods=D.mood[dt]||[];
  var combos=getComboInsights(syms,moods,phaseName,dpo,info);
  var h='';
  if(combos.length){combos.forEach(function(cb){
    h+='<div style="padding:12px;background:var(--cream);border-radius:12px;margin-bottom:8px;border-left:3px solid '+cb.color+'">';
    h+='<div style="font-size:13px;font-weight:800;color:'+cb.color+';margin-bottom:6px">'+cb.icon+' '+cb.title+'</div>';
    h+='<div style="font-size:12px;color:var(--txt);line-height:1.6">'+cb.text+'</div></div>';
  })}
  h+='<div>';
  cards.forEach(function(c2){
    h+='<div style="padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)">';
    h+='<div style="font-size:12px;font-weight:700;color:var(--burnt)">'+c2.sym.replace("CM: ","")+'</div>';
    h+='<div style="font-size:12px;color:var(--txt);line-height:1.5;margin-top:3px">'+c2.phase+'</div>';
    h+='<div style="font-size:11px;color:var(--cobalt);margin-top:3px">'+c2.personal+'</div></div>';
  });
  h+='</div><div class="ai-disclaimer">General guidance — not medical advice.</div>';
  el.innerHTML=h;
}

function getBiology(info){
  var cd=info.cd;var dpo=info.ho?(cd-info.od):null;
  if(dpo!==null&&dpo>=0){
    var dpoBio={0:{icon:"🥚",title:"Ovulation day",body:"Your dominant follicle has ruptured, releasing an egg into the fallopian tube. The egg is viable for 12-24 hours."},1:{icon:"🏊",title:"Fertilisation window",body:"If sperm are present, fertilisation happens today. The fertilised egg is now a zygote."},2:{icon:"🔬",title:"First cell divisions",body:"The zygote divides into 2 cells, then 4. Floating through the fallopian tube."},3:{icon:"🫧",title:"Morula stage",body:"Now 8-16 cells, called a morula. Still travelling through the tube."},4:{icon:"💫",title:"Blastocyst forming",body:"Develops a fluid-filled cavity. Two cell groups: inner (baby) and trophoblast (placenta)."},5:{icon:"🏠",title:"Arriving in the uterus",body:"The blastocyst enters the uterine cavity and floats freely, absorbing nutrients."},6:{icon:"📌",title:"Implantation can begin",body:"May start attaching to the uterine wall. Only ~15% implant this early."},7:{icon:"🔗",title:"Implantation window",body:"Prime implantation day. Tiny blood vessels may be disrupted — this causes implantation spotting."},8:{icon:"✨",title:"Peak implantation day",body:"Most common day. hCG secretion begins, signalling corpus luteum to keep producing progesterone."},9:{icon:"📈",title:"hCG rising",body:"hCG doubling every ~48 hours. FRER might show faint line but most won't yet."},10:{icon:"🧪",title:"Testing becomes possible",body:"hCG may be detectable on a sensitive test. Use first morning urine. Negative today doesn't mean you're out."},11:{icon:"🧪",title:"Reliable testing day",body:"Most implantations done. A faint line IS a positive."},12:{icon:"📊",title:"Definitive testing",body:"~90% of pregnancies show positive by 12 DPO. If negative, test again in 2 days."},13:{icon:"⏰",title:"Period watch day",body:"Without hCG, progesterone drops and lining breaks down. If pregnant, hCG maintains progesterone."},14:{icon:"🔴",title:"Expected period day",body:"Without pregnancy, progesterone triggers menstruation. If positive: congratulations!"}};
    if(dpoBio[dpo])return dpoBio[dpo];
    if(dpo>14)return{icon:"⏳",title:dpo+" DPO",body:"Past typical 14-day luteal phase. Retest in 2 days if negative."};
  }
  if(cd<=2)return{icon:"🔴",title:"Menstruation — Day "+cd,body:"Progesterone and oestrogen at lowest. Endometrium shedding. FSH already recruiting follicles."};
  if(cd<=5)return{icon:"🔴",title:"Late period — Day "+cd,body:"Flow tapering. One follicle winning dominance. Oestrogen starting to rise."};
  if(cd<=8)return{icon:"🌱",title:"Early follicular — Day "+cd,body:"Dominant follicle growing 1-2mm/day. Oestrogen thickening the lining."};
  if(cd<=12)return{icon:"🌿",title:"Mid follicular — Day "+cd,body:"Oestrogen accelerating. Follicle ~14-18mm. CM transitioning towards fertile."};
  if(cd<=info.ao-2)return{icon:"🔥",title:"Pre-ovulatory — Day "+cd,body:"Oestrogen peaks, triggering LH surge. Follicle ~20-24mm. Peak CM."};
  if(cd<=info.ao+1)return{icon:"🥚",title:"Ovulatory window — Day "+cd,body:"LH surge causes follicle rupture 24-36 hours later. Peak fertility."};
  return{icon:"🫂",title:"Luteal phase — Day "+cd,body:"Progesterone dominates. Maintains lining, raises BBT, causes symptoms."};
}

var FFACTS=["Sperm can survive up to 5 days in fertile cervical mucus, but the egg only lives 12-24 hours.","The best days for conception are OV-2, OV-1, and OV day. OV-1 has the highest single-day rate at ~25-30%.","BBT rises AFTER ovulation — by the time you see the shift, the window has passed. That's why CM and OPKs matter too.","A 'triphasic' chart is seen in ~12% of pregnancy charts and ~5% of non-pregnancy charts.","Implantation most commonly happens 8-10 DPO. Only ~5% implant before day 7.","Egg white CM can keep sperm alive for up to 5 days, while dry/sticky CM is hostile to sperm.","Progesterone raises body temp by 0.2-0.5°C — the entire basis of BBT tracking.","A luteal phase shorter than 10 days may not give enough time to implant.","hCG doubles approximately every 48 hours in early pregnancy.","Stress can delay ovulation but cannot delay your period once OV has occurred.","Having sex every day vs every other day in the fertile window has roughly the same pregnancy rates.","The endometrium grows from ~1mm after period to 8-14mm by ovulation.","Folic acid takes 3 months to reach optimal levels. Take 400mcg daily now.","Moderate exercise improves fertility; excessive high-intensity exercise can suppress ovulation.","Hydration directly affects CM quality. Aim for 2+ litres daily.","An egg is the largest cell in the human body at ~0.1mm.","The corpus luteum produces progesterone for ~12-14 days unless hCG tells it to keep going.","Women who track cycles have conception rates of ~80% within 6 cycles vs ~60% untracked.","BBT is most accurate taken at the same time daily after 3+ hours of uninterrupted sleep.","Your body produces ~200-300 eggs in a lifetime from ~1-2 million at birth."];
function getFact(){var day=Math.floor((new Date()-new Date('2024-01-01'))/864e5);return FFACTS[day%FFACTS.length]}

  var amt=getCmAmt(sym,date);

  // Pretty 12h format: "14:30" -> "2:30pm"

  var ampm=h>=12?'pm':'am';var h12=h%12||12;

/* Pre-period warning detector — returns {likely, strength, signals, eta} or null */
function prePeriodSignal(){
  var info=cInfo();var c=info.c;var dpo=info.ho?(info.cd-info.od):null;
  if(dpo===null||dpo<8)return null;  // Only meaningful from 8+ DPO
  if(c.length)return null;  // Period already arrived (cycle complete)

  var signals=[];var strength=0;
  var cl=avgCL2();
  var today=td();
  var yest=ad(today,-1);
  var todayR=c.readings.find(function(x){return x.date===today});
  var yestR=c.readings.find(function(x){return x.date===yest});

  // Signal 1: Temp drop
  if(todayR&&todayR.temp!=null&&yestR&&yestR.temp!=null){
    var drop=yestR.temp-todayR.temp;
    if(drop>=0.15){signals.push('<strong>Temp drop:</strong> '+drop.toFixed(2)+'° since yesterday');strength+=3}
    else if(drop>=0.08){signals.push('Temp dipping: '+drop.toFixed(2)+'° since yesterday');strength+=1}
  }
  if(todayR&&todayR.temp!=null&&cl){
    var belowCL=cl-todayR.temp;
    if(belowCL>=0.05){signals.push('<strong>Below coverline</strong> by '+belowCL.toFixed(2)+'°');strength+=3}
  }

  // Signal 2: Mood shifts (irritable, sad, emotional arriving today)
  var todayMo=D.mood[today]||[];
  var yestMo=D.mood[yest]||[];
  var lowMoods=['Irritable','Sad','Emotional','Anxious'];
  var newLowMoods=todayMo.filter(function(m){return lowMoods.indexOf(m)>-1&&yestMo.indexOf(m)===-1});
  if(newLowMoods.length){signals.push('Mood shift: '+newLowMoods.join(', '));strength+=1}

  // Signal 3: PMS symptoms appearing
  var todaySy=D.sym[today]||[];
  var pmsSymptoms=['Cramps','Breast tenderness','Bloating','Backache','Acne','Spotting'];
  var todayPms=todaySy.filter(function(s){return pmsSymptoms.indexOf(s)>-1});
  if(todayPms.length>=2){signals.push('PMS symptoms: '+todayPms.join(', '));strength+=2}
  else if(todayPms.length===1){signals.push('PMS symptom: '+todayPms[0]);strength+=1}

  // Signal 4: Past average luteal reached
  var luts=[];D.cycles.forEach(function(oc,oi){if(!isExcl(oi)){var od2=ovDay(oc);if(od2&&oc.length)luts.push(oc.length-od2)}});
  var avgLut=luts.length?Math.round(luts.reduce(function(a,b){return a+b},0)/luts.length):null;
  var etaText=null;
  if(avgLut){
    var daysOut=avgLut-dpo;
    if(daysOut===0){etaText='Period due today';strength+=2}
    else if(daysOut===1){etaText='Period expected tomorrow';strength+=1}
    else if(daysOut===-1){etaText='1 day past average luteal';strength+=2}
    else if(daysOut<-1){etaText=Math.abs(daysOut)+' days past average';strength+=3}
    else if(daysOut<=2)etaText='Period expected in '+daysOut+' days';
  }

  if(signals.length===0||strength<2)return null;

  return{
    likely:true,
    strength:strength>=5?'high':strength>=3?'medium':'low',
    signals:signals,
    eta:etaText,
    dpo:dpo,
  };
}

function dCyc(){
  var cv=document.getElementById('cC');if(!cv)return;
  var c=D.cycles[curCyc];var _hits=[];
  var dp=window.devicePixelRatio||1;cv.width=cv.offsetWidth*dp;cv.height=cv.offsetHeight*dp;
  var ctx=cv.getContext('2d');ctx.scale(dp,dp);
  var W=cv.offsetWidth,H=cv.offsetHeight,p={t:10,r:10,b:26,l:38},gW=W-p.l-p.r,gH=H-p.t-p.b;
  var ts=c.readings.filter(function(r){return r.temp!=null}).map(function(r){return r.temp});
  var wts=[];if(sWrist){c.readings.forEach(function(r){if(D.wrist&&D.wrist[r.date])wts.push(D.wrist[r.date])})}
  var allTs=ts.concat(wts);
  if(!allTs.length){ctx.fillStyle='#A0928A';ctx.font='13px -apple-system';ctx.textAlign='center';ctx.fillText('No temperature data',W/2,H/2);return}
  var mn=Math.floor(Math.min.apply(null,allTs)*10)/10-.05;
  var mx2=Math.ceil(Math.max.apply(null,allTs)*10)/10+.05;
  var mxDay=c.readings[c.readings.length-1].day;
  // Extend x-axis to at least the expected cycle length so phases are visible even pre-OV
  var info=cInfo();
  var xMaxDay=Math.max(mxDay,curCyc===info.ci?info.av:mxDay);
  if(xMaxDay<14)xMaxDay=14;
  function x(d){return p.l+(d-1)/(Math.max(xMaxDay,2)-1)*gW}
  function y(t){return p.t+(1-(t-mn)/(mx2-mn))*gH}

  // === NEW: Phase bands (drawn first, behind everything) ===
  var eov=effOv(curCyc);
  var av=curCyc===info.ci?info.av:(c.length||28);
  var ao=info.ao;
  var phaseOv=eov||ao;
  // Menstrual 1-5
  ctx.fillStyle="rgba(168,68,85,.09)";ctx.fillRect(x(1),p.t,x(6)-x(1),gH);
  // Follicular 6 to OV-2
  if(phaseOv>=7){ctx.fillStyle="rgba(74,125,94,.09)";ctx.fillRect(x(6),p.t,x(phaseOv-1)-x(6),gH)}
  // Ovulatory OV-1 to OV+1
  ctx.fillStyle="rgba(154,123,30,.13)";
  var ovStart=Math.max(1,phaseOv-1);var ovEnd=phaseOv+2;
  if(ovEnd<=xMaxDay+1)ctx.fillRect(x(ovStart),p.t,x(ovEnd)-x(ovStart),gH);
  // Luteal OV+2 to cycle end
  if(phaseOv+2<=xMaxDay){ctx.fillStyle="rgba(107,78,139,.09)";ctx.fillRect(x(phaseOv+2),p.t,x(xMaxDay+1)-x(phaseOv+2),gH)}

  // Gridlines + Y labels
  ctx.strokeStyle="rgba(0,0,0,.06)";ctx.lineWidth=1;
  for(var t2=Math.ceil(mn*10)/10;t2<=mx2;t2=Math.round((t2+.1)*10)/10){
    ctx.beginPath();ctx.moveTo(p.l,y(t2));ctx.lineTo(W-p.r,y(t2));ctx.stroke();
    ctx.fillStyle="#A0928A";ctx.font="600 9px -apple-system";ctx.textAlign="right";ctx.fillText(t2.toFixed(1),p.l-4,y(t2)+3);
  }

  // Coverline
  var cl=avgCL2();
  if(cl&&cl>=mn&&cl<=mx2){
    ctx.save();ctx.setLineDash([5,3]);ctx.strokeStyle="#2B5C8A";ctx.lineWidth=1.5;ctx.globalAlpha=.6;
    ctx.beginPath();ctx.moveTo(p.l,y(cl));ctx.lineTo(W-p.r,y(cl));ctx.stroke();ctx.restore();
    ctx.globalAlpha=1;ctx.fillStyle="#2B5C8A";ctx.font="bold 8px -apple-system";ctx.textAlign="left";
    ctx.fillText("CL "+cl.toFixed(2),W-p.r-52,y(cl)-4);
  }

  // BBT line
  if(sBBTcyc){
    ctx.strokeStyle="#C4652A";ctx.lineWidth=2.5;ctx.setLineDash([]);
    ctx.beginPath();
    c.readings.forEach(function(r,i){if(r.temp==null)return;var px=x(r.day),py=y(r.temp);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});
    ctx.stroke();
    c.readings.forEach(function(r){
      if(r.temp==null)return;
      var px=x(r.day),py=y(r.temp);
      _hits.push({x:px,y:py,day:r.day,date:r.date,temp:r.temp,cycle:'C'+(curCyc+1),ov:eov&&r.day===eov,lh:!!r.ov,flow:r.flow,sex:!!D.sex[r.date],dpo:eov&&r.day>eov?(r.day-eov):null,tqual:D.tqual&&D.tqual[r.date]||null});
      var _fl=D.tqual&&D.tqual[r.date];
      ctx.fillStyle=r.ov?"#9A7B1E":r.flow?"#A84455":"#C4652A";
      if(_fl){ctx.strokeStyle=ctx.fillStyle;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.stroke()}
      else{ctx.beginPath();ctx.arc(px,py,r.ov?4:3,0,Math.PI*2);ctx.fill()}
      if(r.ov&&sOv){ctx.fillStyle="#fff";ctx.font="bold 6px sans-serif";ctx.textAlign="center";ctx.fillText("+",px,py+2)}
      if(eov&&r.day===eov&&!r.ov&&sOv){ctx.fillStyle="#9A7B1E";ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle="#fff";ctx.font="bold 7px sans-serif";ctx.textAlign="center";ctx.fillText("O",px,py+2.5)}
      if(r.flow&&sPer){ctx.fillStyle="#A84455";ctx.beginPath();ctx.arc(px,py+10,3,0,Math.PI*2);ctx.fill()}
      if(D.sex[r.date]&&sSex){ctx.fillStyle="#2B5C8A";ctx.globalAlpha=.7;ctx.save();ctx.translate(px,H-p.b-8);ctx.rotate(Math.PI/4);ctx.fillRect(-3,-3,6,6);ctx.restore();ctx.globalAlpha=1}
      if(r.day%5===0||r.day===1||r.ov||r.day===eov){ctx.fillStyle="#A0928A";ctx.font="8px -apple-system";ctx.textAlign="center";ctx.fillText(r.day,px,H-p.b+12)}
    });
  }

  // Wrist temp dashed line
  if(sWrist){
    var wristPts=[];
    c.readings.forEach(function(r){if(D.wrist&&D.wrist[r.date]){var wt=D.wrist[r.date];if(wt>=mn&&wt<=mx2)wristPts.push({day:r.day,temp:wt})}});
    if(wristPts.length>1){
      ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle='#6B4E8B';ctx.lineWidth=1.5;ctx.globalAlpha=.6;
      ctx.beginPath();
      wristPts.forEach(function(w,i){var px=x(w.day),py=y(w.temp);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)});
      ctx.stroke();
      wristPts.forEach(function(w){ctx.fillStyle='#6B4E8B';ctx.beginPath();ctx.arc(x(w.day),y(w.temp),2.5,0,Math.PI*2);ctx.fill()});
      ctx.restore();
    }
  }

  cycHits=_hits;
  cv.onclick=function(e){showTip('cC',cycHits,e.clientX,e.clientY)};
}

      if(Math.abs(wd2)>=0.3)wMsg+='That\'s a notable shift from your normal wrist baseline ('+WRIST_BASELINE.toFixed(2)+'°). The Watch measures overnight skin temp — a +0.3° shift often correlates with ovulation or early luteal warming.';
      else if(Math.abs(wd2)>=0.1)wMsg+='Mild deviation from baseline. The Watch tracks overnight skin temp which lags BBT by a day or so.';
      else wMsg+='Right around your normal baseline. Watch readings within 0.1° of baseline are typical for follicular phase or stable luteal.';
      // Compare BBT to wrist
      var bbtDev=todayR.temp-(preAvg||cl||36.4);
      if(wd2>0.15&&bbtDev>0.15)wMsg+=' <em>Both BBT and wrist are elevated — strong cross-confirmation of the post-OV state.</em>';
      else if(wd2<-0.15&&bbtDev<-0.05)wMsg+=' <em>Both metrics dropping — suggests progesterone falling.</em>';
      stories.push({icon:'⌚',title:'Apple Watch confirmation',body:wMsg});
    }
    
    // === STORY 6: Sustained luteal pattern ===
    if(eod&&dpo&&dpo>=8){
      var lutTemps=sortedR.filter(function(r){return r.day>eod});
      var aboveCL=cl?lutTemps.filter(function(r){return r.temp>=cl}).length:0;
      var totalLut=lutTemps.length;
      if(totalLut>=5){
        var pcAbove=Math.round(aboveCL/totalLut*100);
        var lMsg='<strong>'+aboveCL+'/'+totalLut+' luteal readings above coverline ('+pcAbove+'%).</strong> ';
        if(pcAbove>=85)lMsg+='Excellent thermal hold — progesterone is strong. This is what we want to see post-OV. If period doesn\'t arrive on time, this consistent elevation is a strong pregnancy candidate.';
        else if(pcAbove>=65)lMsg+='Good thermal hold — most readings above coverline. Some dips are normal. Look for sustained pattern.';
        else lMsg+='More dips than ideal — could mean lower progesterone, but also could be measurement variability. Worth tracking next cycle for comparison.';
        stories.push({icon:'🔥',title:'Luteal phase strength',body:lMsg});
      }
    }
    
    // === STORY 7: Average vs typical ===
    if(temps.length>=10){
      var cAvg=temps.reduce(function(a,b){return a+b},0)/temps.length;
      // Compare to all other non-excluded cycles
      var allOtherTemps=[];
      D.cycles.forEach(function(otherC,otherI){
        if(otherI===ci||isExcl(otherI))return;
        otherC.readings.forEach(function(r){if(r.temp!=null)allOtherTemps.push(r.temp)});
      });
      if(allOtherTemps.length>=20){
        var historical=allOtherTemps.reduce(function(a,b){return a+b},0)/allOtherTemps.length;
        var diff=cAvg-historical;
        if(Math.abs(diff)>=0.1){
          var aMsg='<strong>This cycle is averaging '+cAvg.toFixed(2)+'°, '+(diff>0?'higher':'lower')+' than your historical average of '+historical.toFixed(2)+'°.</strong> ';
          if(diff>=0.15)aMsg+='A '+diff.toFixed(2)+'° elevation could mean: stronger luteal phase this cycle, illness/inflammation, or — if late luteal — possibly pregnancy. Worth watching.';
          else if(diff>=0.1)aMsg+='Slightly warmer than usual. Could be seasonal, sleep changes, or simply your body running a bit hotter this month.';
          else if(diff<=-0.15)aMsg+='Cooler than usual by '+Math.abs(diff).toFixed(2)+'°. Could be thyroid function, illness, or just normal cycle-to-cycle variation. If it persists across cycles, mention to GP.';
          else aMsg+='Slightly cooler than typical. Watch the trend.';
          stories.push({icon:'📊',title:'Compared to your normal',body:aMsg});
        }
      }
    }
    
    // Render all stories
    stories.forEach(function(s,i){
      h+='<div style="display:flex;gap:10px;padding:10px 0'+(i<stories.length-1?';border-bottom:1px solid rgba(0,0,0,.05)':'')+'">';
      h+='<span style="font-size:18px;flex-shrink:0">'+s.icon+'</span>';
      h+='<div><div style="font-size:11px;font-weight:700;color:var(--cobalt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">'+s.title+'</div>';
      h+='<div style="font-size:12px;color:var(--txt2);line-height:1.5">'+s.body+'</div></div></div>';
    });
    
    h+='<div class="ai-disclaimer" style="margin-top:10px">Pattern interpretation only. Temperature can be affected by sleep, alcohol, illness, and measurement timing.</div>';
    h+='</div>'+colEnd()+'</div>';
  }

  // Compare to another cycle is now available in the Cycle and Compare tabs — pointer instead of duplicate
  h+='<div class="section"><div class="card" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="sw(\'compare\')">';
  h+='<div><div style="font-size:12px;font-weight:700;color:var(--cobalt)">Compare this cycle to another</div>';
  h+='<div style="font-size:11px;color:var(--txt3);margin-top:2px">Full side-by-side view in the Compare tab</div></div>';
  h+='<span style="color:var(--cobalt);font-size:16px;font-weight:700">›</span></div></div>';

  // Doctor report buttons at bottom
  h+='<div class="section"><div class="sec-hdr"><span class="sec-title" style="font-size:11px;color:var(--cobalt);text-transform:uppercase;letter-spacing:.8px;font-weight:700">Export</div></div>';
  h+='<div class="card" style="padding:12px 14px">';
  h+='<button onclick="exportDoctorReport()" style="width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;background:var(--cobalt);color:#fff;margin-bottom:6px">📄 Full Doctor Report</button>';
  h+='<button onclick="exportDayByDay()" style="width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;background:var(--burnt);color:#fff">📅 Current Cycle Day-by-Day</button>';
  h+='</div></div>';
  
  return h;
}

/* Build plain-text partner summary — used by copy/share buttons */
function buildPartnerText(){
  var info=cInfo();var c=info.c;var cd=info.cd;var dpo=info.ho?(cd-info.od):null;
  var ph=phase(cd,info.av,info.ao,info.ho,info.od);
  var fwStart=info.ao-5;var fwEnd=info.ao;
  var lines=[];

  // Status line
  if(ph.n.indexOf('Menstrual')>-1){
    lines.push('🌙 Period today — low pressure week. Fertile window is ~'+(fwStart-cd)+' days away.');
  }else if(cd<fwStart-2&&!info.ho){
    lines.push('🌱 Not fertile yet. Fertile window opens in '+(fwStart-cd)+' days ('+fd(ad(c.key,fwStart-1))+').');
  }else if(cd>=fwStart-2&&cd<fwStart&&!info.ho){
    lines.push('📅 Fertile window opens '+(fwStart-cd===0?'today':'in '+(fwStart-cd)+' days')+'. Heads up!');
  }else if(cd>=fwStart&&cd<=fwEnd&&!info.ho){
    var daysIn=cd-fwStart+1;
    lines.push('🔥 FERTILE WINDOW — day '+daysIn+' of 6. Prioritise tonight.');
  }else if(info.ho&&dpo!=null&&dpo<=1){
    lines.push('💫 Just ovulated. '+(dpo===0?'Today':'One day post')+'-OV. Sex today still counts.');
  }else if(dpo!=null&&dpo<=9){
    lines.push('⏳ Two-week wait — '+dpo+' DPO. Too early to know anything.');
  }else if(dpo!=null&&dpo<=14){
    lines.push('🧪 Testing window — '+dpo+' DPO.');
  }else if(dpo!=null&&dpo>=15){
    lines.push('❓ Period is late ('+dpo+' DPO). Might test soon.');
  }else{
    lines.push('📊 Cycle Day '+cd+' — '+ph.n+' phase.');
  }

  // Period prediction if in luteal
  var luts=[];D.cycles.forEach(function(oc,oi){if(!isExcl(oi)){var od2=ovDay(oc);if(od2&&oc.length)luts.push(oc.length-od2)}});
  if(info.ho&&luts.length){
    var avgLut=Math.round(luts.reduce(function(a,b){return a+b},0)/luts.length);
    var periodDate=ad(ad(c.key,info.od-1),avgLut);
    var daysToPeriod=avgLut-dpo;
    if(daysToPeriod>0)lines.push('Period expected: '+fd(periodDate)+' (in '+daysToPeriod+' days)');
    else if(daysToPeriod===0)lines.push('Period expected today');
  }

  // Key "what helps"
  if(cd>=fwStart&&cd<=fwEnd&&!info.ho){
    lines.push('');lines.push('💕 Sex every other day is ideal through ovulation.');
  }else if(dpo!=null&&dpo>=6&&dpo<=12){
    lines.push('');lines.push('💛 Extra patience — she might be extra tired or moody (progesterone).');
  }

  return lines.join('\n');
}
function copyPartnerText(){
  var t=buildPartnerText();

      // Fallback
      var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      flash('✓ Copied');

  }else{
    var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);

}

}

function saveR(){saveUndo();
  var date=document.getElementById('mD').value;var temp=parseFloat(document.getElementById('mT').value);

  var ov=document.getElementById('mOv').classList.contains('on');var sx=document.getElementById('mSx').classList.contains('on');

  var mdStr=document.getElementById('mMd').value.trim();var md=mdStr?mdStr.split(',').map(function(s){return s.trim()}).filter(Boolean):[];

  D.cycles.forEach(function(c,i){var end=D.cycles[i+1]?D.cycles[i+1].key:"9999";if(date>=c.key&&date<end){var day=db(c.key,date)+1;var rdg={day:day,date:date,temp:temp};if(ov)rdg.ov=true;if(fl)rdg.flow=fl;var ei=c.readings.findIndex(function(r){return r.date===date});if(ei>-1)c.readings[ei]=rdg;else{c.readings.push(rdg);c.readings.sort(function(a,b){return a.day-b.day})}placed=true}});
  if(!placed){var last=D.cycles[D.cycles.length-1];var day=db(last.key,date)+1;var rdg={day:day,date:date,temp:temp};if(ov)rdg.ov=true;if(fl)rdg.flow=fl;last.readings.push(rdg);last.readings.sort(function(a,b){return a.day-b.day})}

  }else delete D.wrist[date];

  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='CYCLE-BY-CYCLE DETAIL\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  D.cycles.forEach(function(c,i){
    var od=ovDay(c);var eod=effOv(i);var lp=od&&c.length?(c.length-od):null;
    var ex=isExcl(i);var cp=conceptionProb(i);
    r+='\nCycle '+(i+1)+': '+fd(c.key)+' '+new Date(c.key+'T12:00:00').getFullYear();
    if(ex)r+=' [EXCLUDED — pregnancy/loss]';
    r+='\n';
    r+='  Length: '+(c.length||'ongoing')+' days\n';
    r+='  Ovulation: '+(eod?'Day '+eod+(od?' (LH+ Day '+od+')':''):'Not detected')+'\n';
    if(lp)r+='  Luteal phase: '+lp+' days\n';
    var sexCount=0;c.readings.forEach(function(x){if(D.sex[x.date])sexCount++});
    r+='  Intimacy: '+sexCount+' days\n';
    if(cp)r+='  Conception timing: '+cp.pct+'% ('+cp.lbl+')\n';
    var cm=cmScore(i);if(cm)r+='  CM quality: '+cm.pct+'% — '+cm.lbl+'\n';
    // Temp stats
    var temps=c.readings.filter(function(x){return x.temp!=null}).map(function(x){return x.temp});
    if(temps.length){var avg=temps.reduce(function(a,b){return a+b},0)/temps.length;
      r+='  Temp range: '+Math.min.apply(null,temps).toFixed(2)+'–'+Math.max.apply(null,temps).toFixed(2)+'°C (avg '+avg.toFixed(2)+'°C)\n';
      r+='  Readings: '+temps.length+'\n';
    }
    // Period intensity
    var flows={};c.readings.forEach(function(x){if(x.flow&&x.flow!=='none'&&x.flow!=='unspecified'){flows[x.flow]=(flows[x.flow]||0)+1}});
    var fk=Object.keys(flows);if(fk.length)r+='  Period: '+fk.map(function(k){return flows[k]+'d '+k}).join(', ')+'\n';
    // Pregnancy
    if(ex){
      var cyc12=D.cycles[i];
      r+='  NOTE: This was a pregnancy cycle.\n';
      var posTests=D.ptests.filter(function(p){return p.result==='positive'&&p.date>=c.key});
      if(posTests.length)r+='  Positive test: '+fd(posTests[0].date)+'\n';
    }
  });
  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='CURRENT CYCLE STATUS\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='Cycle day: '+info.cd+'\n';
  r+='Phase: '+phase(info.cd,info.av,info.ao,info.ho,info.od).n+'\n';
  if(info.ho)r+='DPO: '+(info.cd-info.od)+'\n';
  r+='Period expected: ~'+fd(ad(info.c.key,info.av-1))+'\n';
  var op=ovProb(info.c,info.ci);if(op)r+='Ovulation confirmation: '+op.pct+'% — '+op.lbl+'\n';
  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='PREGNANCY TESTS\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  if(D.ptests.length){D.ptests.forEach(function(p){r+=fd(p.date)+' '+new Date(p.date+'T12:00:00').getFullYear()+': '+p.result+(p.brand?' ('+p.brand+')':'')+(p.dpo?' — '+p.dpo+' DPO':'')+'\n'})}
  else r+='None logged\n';
  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='SYMPTOM FREQUENCY (across all non-excluded cycles)\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  var allSym={};Object.keys(D.sym).forEach(function(d){(D.sym[d]||[]).forEach(function(s){allSym[s]=(allSym[s]||0)+1})});
  Object.keys(allSym).sort(function(a,b){return allSym[b]-allSym[a]}).forEach(function(s){r+='  '+s+': '+allSym[s]+' days\n'});
  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='OPK HISTORY\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  var opkDates=Object.keys(D.opks||{}).sort();
  var posOPK=opkDates.filter(function(d){return getOpkResult(d)==='pos'});
  var negOPK=opkDates.filter(function(d){return getOpkResult(d)==='neg'});
  r+='Total tests: '+opkDates.length+' ('+posOPK.length+' positive, '+negOPK.length+' negative)\n';
  posOPK.forEach(function(d){r+='  Positive: '+fdf(d)+'\n'});
  r+='\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='NOTES FOR CLINICIAN\n';
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='• BBT measured orally each morning\n';
  r+='• Apple Watch wrist temperature also tracked (baseline '+WRIST_BASELINE.toFixed(2)+'°C)\n';
  r+='• Cycle 12 (Oct–Dec 2025) was a pregnancy ending in early loss\n';
  r+='• Currently trying to conceive\n';
  r+='• Data sourced from Flo app + manual BBT logging\n';
  r+='\nGenerated by CyTrack — jessicaomahoney95.github.io/Cytrack\n';
  // Share/download
  var blob=new Blob([r],{type:'text/plain'});
  dlFB(blob,'cytrack_doctor_report_'+td()+'.txt');
}
function exportDayByDay(targetCi){
  var info=cInfo();
  // Default to current cycle if no argument passed (preserves old Doctor tab button)
  var ci=(typeof targetCi==='number'&&targetCi>=0&&targetCi<D.cycles.length)?targetCi:info.ci;
  var c=D.cycles[ci];var cl=avgCL2();var eod=effOv(ci);var od=ovDay(c);
  var isCurrent=(ci===info.ci);
  // Determine the last day to export — current day for ongoing, last reading day for completed
  var lastDay;
  if(isCurrent)lastDay=info.cd;
  else if(c.length)lastDay=c.length;
  else if(c.readings.length)lastDay=c.readings[c.readings.length-1].day;
  else lastDay=1;
  var r='';
  r+=(isCurrent?'CURRENT CYCLE':'CYCLE '+(ci+1))+' — DAY BY DAY BREAKDOWN\n';
  r+='Generated: '+fdf(td())+'\n';
  r+='Cycle started: '+fdf(c.key)+'\n';
  if(c.length)r+='Cycle length: '+c.length+' days\n';
  else if(isCurrent)r+='Current day: '+info.cd+' (in progress)\n';
  if(eod)r+='Ovulation: Day '+eod+(od&&od===eod?' (LH+ confirmed)':od?' (LH+ Day '+od+', est. OV Day '+eod+')':' (estimated from temp)')+'\n';
  if(cl)r+='Coverline: '+cl.toFixed(2)+'°C\n';
  if(eod&&c.length)r+='Luteal phase: '+(c.length-eod)+' days\n';
  // Triphasic status for this cycle
  var cTri=detectTriphasic(c,ci);
  if(cTri===null)r+='Triphasic: insufficient post-OV data\n';
  else if(cTri.found)r+='Triphasic pattern: YES (+'+cTri.shift+'° second rise'+(cTri.dpo?' around '+cTri.dpo+' DPO':'')+')\n';
  else r+='Triphasic pattern: No (second rise was +'+cTri.shift+'°)\n';
  if(isExcl(ci))r+='★ PREGNANCY CYCLE\n';
  r+='\n';
  // Build a complete day-by-day from day 1 to lastDay
  // For historical cycles, we need av (cycle length) and ao (avg OV day) for phase calc — use c-specific values if available
  var cycAv=c.length||info.av;
  var cycAo=eod||info.ao;
  for(var d=1;d<=lastDay;d++){
    var dt=ad(c.key,d-1);
    var rdg=c.readings.find(function(x){return x.date===dt});
    var sy=D.sym[dt]||[];var mo=D.mood[dt]||[];
    var sx=D.sex[dt];var nt=D.notes[dt];var jn=D.journal[dt];
    var opk=D.opks&&D.opks[dt];var wt=D.wrist&&D.wrist[dt];
    var sl=D.sleep&&D.sleep[dt];var slT=D.sleepTimes&&D.sleepTimes[dt];
    var slH=D.sleepHrs&&D.sleepHrs[dt];
    var md=D.meds[dt]||[];var tq=D.tqual&&D.tqual[dt];
    var tt=D.ttime&&D.ttime[dt];
    var ph=phase(d,cycAv,cycAo,!!eod,eod);
    var dpo=eod&&d>eod?(d-eod):null;
    r+='━━━ Day '+d+' — '+fdf(dt)+' ━━━\n';
    r+='Phase: '+ph.n;
    if(dpo)r+=' ('+dpo+' DPO)';
    r+='\n';
    if(rdg&&rdg.temp!=null){
      r+='BBT: '+rdg.temp.toFixed(2)+'°C';
      if(tt)r+=' at '+tt;
      if(cl)r+=' ('+(rdg.temp>=cl?'above':'BELOW')+' coverline)';
      if(tq)r+=' ⚠️ '+tq;
      r+='\n';
    }
    if(wt){var wd=wt-WRIST_BASELINE;r+='Wrist: '+wt.toFixed(2)+'°C ('+(wd>=0?'+':'')+wd.toFixed(2)+' from baseline)\n'}
    if(rdg&&rdg.flow)r+='Flow: '+rdg.flow+'\n';
    if(rdg&&rdg.ov)r+='OPK: Positive (LH surge)\n';
    else if(opk)r+='OPK: '+(opk==='pos'?'Positive':'Negative')+'\n';
    if(sx)r+='Intimacy: Yes\n';
    if(sy.length)r+='Symptoms: '+sy.map(function(s){return fmtSym(s,dt)}).join(', ')+'\n';
    if(mo.length)r+='Mood: '+mo.join(', ')+'\n';
    if(sl)r+='Sleep quality: '+sl+'\n';
    if(slT)r+='Sleep: '+slT.asleep+' → '+slT.woke+(slH?' ('+slH+'h)':'')+'\n';
    if(md.length)r+='Meds: '+md.join(', ')+'\n';
    if(nt)r+='Note: '+nt+'\n';
    if(jn)r+='Journal: '+jn+'\n';
    // Pregnancy tests on this date
    D.ptests.forEach(function(pt){if(pt.date===dt)r+='Pregnancy test: '+pt.result+(pt.brand?' ('+pt.brand+')':'')+'\n'});
    r+='\n';
  }
  // Summary footer
  r+='━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
  r+='CYCLE SUMMARY\n';
  var temps=c.readings.filter(function(x){return x.temp!=null}).map(function(x){return x.temp});
  if(temps.length){r+='Temp range: '+Math.min.apply(null,temps).toFixed(2)+'–'+Math.max.apply(null,temps).toFixed(2)+'°C\n';
    r+='Avg temp: '+(temps.reduce(function(a,b){return a+b},0)/temps.length).toFixed(2)+'°C\n'}
  var sexDays=0;for(var d2=1;d2<=lastDay;d2++){if(D.sex[ad(c.key,d2-1)])sexDays++}
  r+='Intimacy: '+sexDays+' days\n';
  var cp=conceptionProb(ci);if(cp)r+='Conception timing: '+cp.pct+'% — '+cp.lbl+'\n';
  var op=ovProb(c,ci);if(op)r+='Ovulation confirmation: '+op.pct+'% — '+op.lbl+'\n';
  r+='\nGenerated by CyTrack\n';
  var blob=new Blob([r],{type:'text/plain'});
  dlFB(blob,'cytrack_cycle_'+(ci+1)+'_day_by_day_'+td()+'.txt');
}
function backup(){var b=JSON.stringify(D,null,2);var blob=new Blob([b],{type:"application/json"});
  if(navigator.canShare&&navigator.canShare({files:[new File([blob],"bbt_backup_"+td()+".json",{type:"application/json"})]})){
    navigator.share({files:[new File([blob],"bbt_backup_"+td()+".json",{type:"application/json"})],title:"CyTrack Backup"}).then(function(){flash("Shared ✓")}).catch(function(){dlFB(blob,"bbt_backup_"+td()+".json")});
  }else{dlFB(blob,"bbt_backup_"+td()+".json")}
}
function dlFB(blob,name){var u=URL.createObjectURL(blob);var a=document.createElement("a");a.href=u;a.download=name;a.style.display="none";document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u)},1000);flash("Saved ✓")}
function restore(inp){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.cycles){D=d;
  // Re-init any fields that might be missing from older backups
  if(!D.photos)D.photos={};if(!D.notes)D.notes={};if(!D.mood)D.mood={};if(!D.sym)D.sym={};
  if(!D.excl)D.excl={};if(!D.ptests)D.ptests=[];if(!D.meds)D.meds={};if(!D.myOv)D.myOv={};
  if(!D.appts)D.appts=[];if(!D.journal)D.journal={};if(!D.checks)D.checks={};if(!D.opks)D.opks={};
  if(!D.tqual)D.tqual={};if(!D.wrist)D.wrist={};if(!D.sleep)D.sleep={};if(!D.ttime)D.ttime={};
  if(!D.sleepHrs)D.sleepHrs={};if(!D.sleepTimes)D.sleepTimes={};if(!D.opkPhotos)D.opkPhotos={};
  if(!D.bedtime)D.bedtime='22:30';if(!D.waketime)D.waketime='06:30';
  save();location.reload();
  }else flash("Invalid file")}catch(err){flash("Error: "+err.message)}};rd.readAsText(f)}
function exp(){
  var csv="Cycle,Day,Date,Temp,Ovulation,Flow,Intimacy,Moods,Symptoms,Meds,Notes\n";
  D.cycles.forEach(function(c,i){c.readings.forEach(function(r){csv+=(i+1)+","+r.day+","+r.date+","+(r.temp!=null?r.temp.toFixed(2):'')+","+(r.ov?"Yes":"")+","+(r.flow||"")+","+(D.sex[r.date]?"Yes":"")+",\""+(D.mood[r.date]||[]).join("; ")+"\",\""+(D.sym[r.date]||[]).join("; ")+"\",\""+(D.meds[r.date]||[]).join("; ")+"\","+(D.notes[r.date]||"")+"\n"})});
  var b=new Blob([csv],{type:"text/csv"});dlFB(b,"bbt_jess.csv");flash("Exported ✓")
}

function saveUndo(){_undoState=JSON.stringify(D)}
function undo(){if(!_undoState){flash("Nothing to undo");return}D=JSON.parse(_undoState);_undoState=null;save();render();flash("Undone")}

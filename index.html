<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CyTrack">
<meta name="theme-color" content="#F5E5D6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Jess's Cycle Tracker v14</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:linear-gradient(165deg,#F5E5D6 0%,#F5D8CC 35%,#EED5D8 65%,#E5D4E0 100%);background-attachment:fixed;color:#2A2424;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-feature-settings:"ss01","cv01";min-height:100vh}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:480px;margin:0 auto;padding:0 0 100px}
@media(min-width:768px){
  .app{max-width:680px}
  .hdr{padding:28px 28px 0}
  .hdr h1{font-size:28px}
  .hdr-sub{font-size:13px}
  .tabs{padding:12px 20px 16px}
  .tab{padding:11px 0;font-size:13px;border-radius:12px}
  .content{padding:10px 0 50px}
  .section{padding:0 20px;margin-bottom:10px}
  .card{padding:18px;border-radius:18px;margin-bottom:10px}
  .cw{padding:14px 10px 10px;border-radius:18px;margin-bottom:10px}
  .cw canvas{height:400px!important}
  .sc{padding:16px 18px;border-radius:16px}
  .sv{font-size:22px}
  .sl{font-size:10px;margin-top:3px}
  .sg{gap:10px}
  .sec-title{font-size:13px}
  .sec-hdr{padding:16px 0 8px}
  .sec-hdr-col{padding:14px 0 8px}
  .pills{padding:0 20px;gap:6px;margin-bottom:10px}
  .pill{padding:8px 16px;font-size:12px;border-radius:20px}
  .filters{padding:0 20px;gap:6px;margin-bottom:10px}
  .flt{padding:7px 14px;font-size:11px}
  .rdg{padding:12px 0}
  .rdg-d{font-size:20px;width:36px}
  .rdg-t{font-size:16px}
  .rdg-tag{font-size:9px;padding:3px 7px}
  .fi{padding:13px;font-size:16px;border-radius:14px}
  .chip{padding:8px 14px;font-size:11px}
  .qs-chip{padding:7px 12px;font-size:11px}
  .notif{padding:14px 16px;font-size:13px;border-radius:16px}
  .fab{width:60px;height:60px;font-size:30px;bottom:calc(30px + env(safe-area-inset-bottom,0px))}
  .mdl{max-width:560px;border-radius:24px 24px 0 0;padding:24px 20px calc(34px + env(safe-area-inset-bottom,0px))}
  .gp{padding:20px;border-radius:18px}
  .gp-title{font-size:16px}
  .gp-sub{font-size:13px}
  .tww-card{padding:18px;border-radius:18px}
  .sum-card{padding:22px;border-radius:18px}
  .morning-hi{font-size:28px}
  .ring-container{width:180px;height:180px}
  .ring-svg{width:180px;height:180px}
  .ring-num{font-size:44px}
  .legend{padding:6px 20px;font-size:10px;gap:10px}
}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .15s ease}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
:root{
--bg:#F5E5D6;--cream:#FDF4EA;--cream2:#F2DECC;--cream3:#E3C9B0;
--cobalt:#7A8BA8;--cob-bg:rgba(122,139,168,.14);
--burnt:#D89272;--burnt-bg:rgba(216,146,114,.18);
--gold:#C5A868;--gold-bg:rgba(197,168,104,.18);
--rose:#D89499;--rose-bg:rgba(216,148,153,.16);
--plum:#A692B8;--plum-bg:rgba(166,146,184,.14);
--forest:#9BB598;--forest-bg:rgba(155,181,152,.16);
--blush:#F5C8BE;--blush-bg:rgba(245,200,190,.35);
--sage:#D5DFC5;--sage-bg:rgba(213,223,197,.35);
--peach:#F7D4B0;--peach-bg:rgba(247,212,176,.38);
--lavender:#D9C8E0;--lavender-bg:rgba(217,200,224,.38);
--butter:#F5E2A8;--butter-bg:rgba(245,226,168,.32);
--txt:#3A2F2B;--txt2:#6E5D52;--txt3:#8F7B6D;--txt4:#B29D8D;--txt5:#CFBBAA;
--card:#FFFAF4;--sh:0 2px 4px rgba(120,80,40,.06),0 4px 16px rgba(120,80,40,.07);
}
/* Dark mode */
.dark{--bg:#1F1814;--cream:#2B211A;--cream2:#241B15;--cream3:#3F3128;
--card:#2B211A;--txt:#E8DDD6;--txt2:#B8ADA4;--txt3:#8A7D74;--txt4:#6B5E56;--txt5:#4A3E36;
--cob-bg:rgba(122,139,168,.18);--burnt-bg:rgba(216,146,114,.18);--gold-bg:rgba(197,168,104,.18);
--rose-bg:rgba(216,148,153,.14);--plum-bg:rgba(166,146,184,.14);--forest-bg:rgba(155,181,152,.14);
--blush-bg:rgba(245,200,190,.14);--sage-bg:rgba(213,223,197,.14);
--peach-bg:rgba(247,212,176,.16);--lavender-bg:rgba(217,200,224,.16);--butter-bg:rgba(245,226,168,.14);
--sh:0 1px 3px rgba(0,0,0,.28)}
html.dark,body.dark{background:linear-gradient(165deg,#1F1814 0%,#241A15 50%,#1C1620 100%);background-attachment:fixed}
.dark .hdr{background:transparent}
.dark .content{background:transparent}
.dark .tabs .tab{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4)}
.dark .tabs .tab.on{background:var(--cream3);color:var(--txt)}
.dark .notif{background:var(--card)}
.dark .gp{background:var(--card)}
.dark .sum-card{background:var(--card)}
.dark .tww-card{background:var(--card)}
.dark .morning-temp input{background:rgba(255,255,255,.06)}
.dark .morning-fact{background:rgba(255,255,255,.04)}
.dark .ql input{background:var(--card);border-color:var(--cream3);color:var(--txt)}
.dark .fi{background:var(--card);border-color:var(--cream3);color:var(--txt)}
.dark .mbg{background:rgba(0,0,0,.6)}
.dark .mdl{background:#241F1C}
.dark .hdr-btn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55)}
.dark .qs-chip{background:var(--cream3);color:var(--txt3)}
.dark .chip{background:var(--cream3);color:var(--txt3)}
.dark .pill{background:var(--card);color:var(--txt4)}
.dark .flt{background:var(--card);color:var(--txt4)}
.dark .toast{background:var(--cobalt)}
/* Header */
.hdr{padding:18px 18px 0;background:transparent}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.hdr h1{font-size:22px;font-weight:700;color:var(--txt);letter-spacing:-.4px;margin:0}
.hdr-sub{font-size:11px;color:var(--txt3);margin-top:3px;font-weight:500}
.hdr-btns{display:flex;gap:4px;align-items:center}
.hdr-btn{background:var(--peach-bg);border-radius:8px;padding:7px 10px;color:var(--burnt);font-size:10px;font-weight:600;letter-spacing:.2px;border:none;cursor:pointer;transition:background .15s}
.hdr-btn:active{background:var(--blush-bg)}
/* Tabs at top */
.tabs{display:flex;gap:2px;padding:8px 14px 14px;background:transparent;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:auto;padding:9px 8px;border-radius:10px;font-size:11px;font-weight:600;background:transparent;color:var(--txt3);text-align:center;transition:all .15s;border:none;cursor:pointer;white-space:nowrap}
.tab.on{background:var(--card);color:var(--burnt);font-weight:700;box-shadow:var(--sh)}
/* Content */
.content{background:transparent;border-radius:0;min-height:80vh;padding:6px 0 40px}
.section{padding:0 14px;margin-bottom:8px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 2px 8px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--txt3);text-transform:uppercase}
.card{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--sh);margin-bottom:8px;border:1px solid rgba(0,0,0,.03)}
/* Collapsible */
.sec-hdr-col{display:flex;justify-content:space-between;align-items:center;padding:12px 0 6px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.sec-hdr-col .sec-arrow{font-size:10px;color:var(--txt5);transition:transform .2s ease;margin-left:5px;display:inline-block}
.sec-hdr-col.collapsed .sec-arrow{transform:rotate(-90deg)}
.sec-body{overflow:hidden;transition:max-height .3s ease,opacity .25s ease;max-height:2000px;opacity:1}
.sec-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
/* Morning welcome */
.morning-wrap{padding:8px 0 0}
.morning-hi{font-size:24px;font-weight:700;color:var(--txt);letter-spacing:-.4px}
.morning-fact{margin:14px 0;padding:12px 14px;background:var(--cream);border-radius:12px;font-size:11px;color:var(--txt2);line-height:1.5;font-weight:400;border:1px solid var(--cream2)}
.morning-temp{display:flex;gap:8px;align-items:center}
.morning-temp input{flex:1;padding:14px;border:1px solid var(--cream3);border-radius:12px;font-size:18px;font-weight:700;background:var(--card);color:var(--txt);text-align:center;outline:none}
.morning-temp input::placeholder{color:var(--txt4)}
.morning-temp input:focus{border-color:var(--cobalt)}
.morning-temp button{padding:14px 22px;border-radius:12px;font-size:14px;font-weight:700;background:var(--cobalt);color:#fff;border:none;cursor:pointer}
.morning-phase{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:16px;background:var(--cream);color:var(--txt2)}
/* Ring */
.ring-container{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.ring-svg{width:150px;height:150px}
.ring-bg{fill:none;stroke:var(--cream3);stroke-width:8}
.ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-size:38px;font-weight:800;color:var(--txt);line-height:1}
.ring-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700}
.phase-dot{width:7px;height:7px;border-radius:50%}
.phase-desc{font-size:12px;color:var(--txt2);line-height:1.5;margin-top:5px}
/* Stats grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc{background:var(--cream);border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px rgba(80,30,10,.08)}
.sv{font-size:18px;font-weight:800;color:var(--txt)}
.sl{font-size:9px;font-weight:600;color:var(--txt4);letter-spacing:.2px;margin-top:2px}
/* Chart */
.cw{background:var(--cream);border-radius:16px;padding:10px 6px 6px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px}
canvas{width:100%;display:block}
/* Filters & pills */
.filters{display:flex;flex-wrap:wrap;gap:5px;padding:0 16px;margin-bottom:8px}
.flt{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:600;background:var(--cream);color:var(--txt4);box-shadow:0 1px 4px rgba(80,30,10,.1)}
.flt.on{color:#fff}
.flt-ov.on{background:var(--gold)}.flt-per.on{background:var(--rose)}.flt-sex.on{background:var(--cobalt)}.flt-cm.on{background:var(--burnt)}
.pills{display:flex;gap:5px;padding:0 16px;overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.pill{padding:6px 12px;border-radius:18px;font-size:11px;font-weight:600;background:var(--cream);color:var(--txt4);white-space:nowrap;flex-shrink:0;box-shadow:0 1px 4px rgba(80,30,10,.1)}
.pill.on{background:var(--cobalt);color:#fff}
.pill.dim{opacity:.25}
.pill.clr{color:#fff}
/* Readings */
.rdg{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04);cursor:pointer}
.rdg:last-child{border-bottom:none}
.rdg-d{width:30px;font-size:17px;font-weight:800;color:var(--txt);text-align:center}
.rdg-dt{font-size:9px;color:var(--txt4);text-align:center}
.rdg-m{flex:1}.rdg-t{font-size:14px;font-weight:700;color:var(--txt)}
.rdg-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.rdg-tag{font-size:8px;padding:2px 5px;border-radius:6px;font-weight:600}
/* Modal */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,30,10,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.mdl{background:var(--cream);border-radius:20px 20px 0 0;padding:20px 16px calc(30px + env(safe-area-inset-bottom,0px));max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:480px;position:relative;z-index:101}
.mt{font-size:17px;font-weight:800;color:var(--txt);margin-bottom:14px}
.fl{font-size:10px;font-weight:600;color:var(--txt3);letter-spacing:.2px;margin-bottom:5px}
.fi{width:100%;padding:11px;border:1.5px solid var(--cream3);border-radius:12px;font-size:15px;background:var(--card);color:var(--txt);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--cobalt)}
.fr{margin-bottom:12px;position:relative;overflow:visible}
.chips{display:flex;flex-wrap:wrap;gap:5px;max-width:100%;overflow:hidden}
.chip{padding:6px 11px;border-radius:18px;font-size:10px;font-weight:600;background:var(--cream3);color:var(--txt4)}
.chip.on{color:#fff;border-color:transparent}
.chip-m.on{background:var(--cobalt)}.chip-s.on{background:var(--burnt)}.chip-c.on{background:var(--gold)}.chip-f.on{background:var(--rose)}
.br{display:flex;gap:8px;margin-top:14px}
.cb{flex:1;padding:13px;border-radius:14px;font-size:14px;font-weight:700;background:var(--cream3);color:var(--txt3)}
.sb{flex:2;padding:13px;border-radius:14px;font-size:14px;font-weight:800;background:var(--cobalt);color:#fff;border:none;cursor:pointer}
.sb:active{transform:scale(.97)}
.db{width:100%;padding:11px;border-radius:12px;font-size:12px;font-weight:700;background:var(--rose-bg);color:var(--rose);margin-top:8px}
/* FAB */
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:52px;height:52px;border-radius:50%;background:var(--cobalt);color:#fff;font-size:26px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(43,92,138,.3);z-index:55}
.fab:active{transform:scale(.9)}
@media(min-width:481px){.fab{right:calc(50% - 320px)}}
@media(min-width:768px){.fab{right:calc(50% - 320px)}}
/* Toast */
.toast{position:fixed;top:calc(12px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);z-index:999;background:var(--txt);border-radius:14px;padding:8px 18px;font-size:11px;font-weight:700;color:#fff;animation:fi .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Toggle */
.tr{display:flex;align-items:center;justify-content:space-between;padding:7px 0}
.tl{font-size:13px;font-weight:600;color:var(--txt)}
.tg{width:42px;height:24px;border-radius:12px;background:var(--cream3);position:relative;transition:background .2s;cursor:pointer}
.tg.on{background:var(--cobalt)}
.tg::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.tg.on::after{transform:translateX(18px)}
/* Progress bars */
.pr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.pn{font-size:10px;font-weight:600;color:var(--txt3);width:76px;text-align:right;flex-shrink:0}
.pt{flex:1;background:var(--cream3);border-radius:4px;height:6px;overflow:hidden}
.pb{height:6px;border-radius:4px}
/* Notes */
.ni{padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04)}.ni:last-child{border-bottom:none}
.nm{font-size:9px;font-weight:600;color:var(--txt4);margin-bottom:3px}
.nt{font-size:12px;color:var(--txt);line-height:1.4}
/* Photo & upload */
.pu{width:100%;padding:18px;border:1.5px dashed var(--cream3);border-radius:14px;text-align:center;color:var(--txt4);font-size:11px;font-weight:600;cursor:pointer;background:var(--card)}
.pth{width:56px;height:56px;border-radius:10px;object-fit:cover;border:1.5px solid var(--cream3)}
textarea{resize:vertical;min-height:56px}
/* Landscape */
@media(orientation:landscape) and (max-height:500px){
  .hdr{padding:10px 20px 6px}
  .hdr h1{font-size:17px}
  .hdr-sub{display:none}
  .tabs{padding:4px 0 calc(4px + env(safe-area-inset-bottom,0px))}
  .content{padding:4px 0 16px;border-radius:0}
  .app{max-width:100%;padding-bottom:56px}
  .section{padding:0 12px;margin-bottom:3px}
  .card{padding:8px;margin-bottom:4px;border-radius:12px}
  .cw{padding:4px;border-radius:10px;margin-bottom:4px}
  .cw canvas{height:calc(100vh - 140px)!important;min-height:180px}
  .pills{margin-bottom:4px;padding:0 12px}.pill{padding:4px 8px;font-size:10px}
  .filters{padding:0 12px;margin-bottom:4px;gap:3px}.flt{padding:3px 8px;font-size:9px}
  .fab{width:40px;height:40px;font-size:20px;bottom:calc(50px + env(safe-area-inset-bottom,0px))}
  .sg{gap:4px}.sc{padding:8px}.sv{font-size:15px}
  .sec-hdr{padding:6px 0 3px}.sec-hdr-col{padding:6px 0 3px}
  .land-hide{display:none!important}
}
/* Quick log */
.ql{display:flex;gap:6px;align-items:center}
.ql input{flex:1;padding:12px;border:1.5px solid var(--cream3);border-radius:12px;font-size:20px;font-weight:700;background:var(--card);color:var(--txt);text-align:center;outline:none;-moz-appearance:textfield}
.ql input::-webkit-outer-spin-button,.ql input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.ql input:focus{border-color:var(--cobalt)}
.ql button{padding:12px 18px;border-radius:12px;font-size:13px;font-weight:700;background:var(--cobalt);color:#fff}
/* OV prob bar */
.prob-bar{height:22px;border-radius:11px;background:var(--cream3);overflow:hidden;position:relative}
.prob-fill{height:100%;border-radius:11px;transition:width .5s ease}
.prob-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--txt)}
/* Compare */
.cmp-sel{display:flex;gap:6px;margin-bottom:8px}
.cmp-sel select{flex:1;padding:9px;border:1.5px solid var(--cream3);border-radius:12px;font-size:12px;font-weight:600;background:var(--card);color:var(--txt);outline:none;-webkit-appearance:none}
/* PT log */
.pt-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.pt-row:last-child{border-bottom:none}
.pt-res{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:700}
/* Meds */
.med-chip{padding:5px 9px;border-radius:8px;font-size:10px;font-weight:600;background:var(--forest-bg);color:var(--forest);display:inline-flex;align-items:center;gap:3px}
/* Backup */
.bk-row{display:flex;gap:6px}
.bk-btn{flex:1;padding:10px;border-radius:12px;font-size:11px;font-weight:700;text-align:center}
/* Summary card */
.sum-card{background:var(--cream);border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px;position:relative;overflow:hidden}
.sum-row{display:flex;justify-content:space-between;padding:3px 0}
.sum-lbl{font-size:10px;color:var(--txt3)}.sum-val{font-size:10px;font-weight:700;color:var(--txt)}
/* Score ring */
.score-ring{position:relative;width:56px;height:56px;display:inline-flex;align-items:center;justify-content:center}
.score-ring svg{width:56px;height:56px}
.score-ring .sr-bg{fill:none;stroke:var(--cream3);stroke-width:5}
.score-ring .sr-fg{fill:none;stroke-width:5;stroke-linecap:round}
.score-num{position:absolute;font-size:13px;font-weight:800}
/* Notifications */
.notif{padding:10px 12px;border-radius:14px;margin-bottom:6px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:7px;background:var(--cream);box-shadow:0 2px 8px rgba(80,30,10,.08)}
.notif-icon{font-size:15px;flex-shrink:0}
/* Smooth toggle */
.sm-tg{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--txt4);padding:0 16px;margin-bottom:5px}
/* TWW */
.tww-card{background:var(--cream);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px}
.tww-day{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.tww-day:last-child{border-bottom:none}
.tww-dpo{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.tww-dpo.now{background:var(--cobalt);color:#fff}
.tww-dpo.past{background:var(--cream3);color:var(--txt4)}
.tww-dpo.future{background:var(--cream);color:var(--txt5);border:1px dashed var(--cream3)}
.tww-info{flex:1}.tww-title{font-size:11px;font-weight:700;color:var(--txt)}.tww-desc{font-size:10px;color:var(--txt3);line-height:1.4;margin-top:1px}
/* Journey */
.jrn-line{position:relative;padding-left:22px;border-left:2px solid var(--cream3);margin-left:10px}
.jrn-dot{position:absolute;left:-7px;top:7px;width:12px;height:12px;border-radius:50%}
.jrn-item{padding:5px 0 14px;position:relative}
.jrn-date{font-size:9px;font-weight:600;color:var(--txt4)}
.jrn-text{font-size:11px;font-weight:600;color:var(--txt);margin-top:1px}
/* CM score */
.cm-score{display:flex;align-items:center;gap:10px}
.cm-bar{flex:1;height:6px;border-radius:3px;background:var(--cream3);overflow:hidden}
.cm-fill{height:100%;border-radius:3px}
/* AI insight */
.ai-disclaimer{font-size:8px;color:var(--txt5);margin-top:6px;font-style:italic}
/* Game plan */
.gp{background:var(--cream);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(80,30,10,.08);margin-bottom:8px;position:relative;overflow:hidden}
.gp-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:3px}
.gp-sub{font-size:11px;color:var(--txt2);line-height:1.4}
.gp-actions{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.gp-action{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--txt);padding:5px 0}
.gp-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--cream3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.gp-check.done{background:var(--forest);border-color:var(--forest);color:#fff}
/* Quick symptom chips */
.qs-chips{display:flex;flex-wrap:wrap;gap:4px}
.qs-chip{padding:6px 10px;border-radius:14px;font-size:10px;font-weight:600;background:var(--cream);color:var(--txt3);border:1px solid var(--cream3);cursor:pointer;transition:all .15s}
.qs-chip:hover{background:var(--cream2)}
.qs-chip.on{color:#fff;box-shadow:none;border-color:transparent}
.qs-chip.on-s{background:var(--burnt)}.qs-chip.on-m{background:var(--cobalt)}.qs-chip.on-c{background:var(--gold)}
/* Streak */
.streak{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--burnt);padding:2px 7px;border-radius:8px;background:var(--burnt-bg)}
/* Temp range bar */
.tmp-range{height:6px;border-radius:3px;background:var(--cream3);position:relative;margin:6px 0}
.tmp-range-fill{position:absolute;top:0;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--cobalt),var(--burnt))}
.tmp-range-dot{position:absolute;top:-4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:5px 16px;font-size:9px;font-weight:600;color:var(--txt4)}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.legend-sq{width:6px;height:6px;transform:rotate(45deg);flex-shrink:0}
/* Compare stats */
.cmp-tbl{width:100%;border-collapse:collapse;font-size:10px}
.cmp-tbl th{font-weight:600;color:var(--txt4);text-align:left;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.cmp-tbl td{padding:5px 0;font-weight:600;color:var(--txt);border-bottom:1px solid rgba(0,0,0,.03)}
.cmp-tbl td:not(:first-child),.cmp-tbl th:not(:first-child){text-align:center}
/* Empty state */
.empty{padding:20px;text-align:center;color:var(--txt4);font-size:11px;line-height:1.5}
.empty-icon{font-size:22px;margin-bottom:5px}
/* Regularity */
.reg-bar{height:6px;border-radius:3px;background:var(--cream3);overflow:hidden}
.reg-fill{height:100%;border-radius:3px;transition:width .4s ease}
/* Chart tooltip */
.chart-tip{position:absolute;background:var(--txt);color:#fff;border-radius:10px;padding:7px 11px;font-size:10px;font-weight:600;line-height:1.4;pointer-events:none;z-index:10;max-width:190px;box-shadow:0 4px 14px rgba(0,0,0,.25);white-space:nowrap}
.chart-tip::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--txt)}
</style>
</head>

function conceptionProb(ci){
  var c=D.cycles[ci];var od=effOv(ci);if(!od)return null;
  var fw={};
  for(var d=od-5;d<=od;d++)fw[d]=true;
  var hits=0,total=0;
  c.readings.forEach(function(r){
    if(fw[r.day]){total++;if(D.sex[r.date])hits++}
  });
  var cStart=new Date(c.key+'T12:00:00');
  for(var d2=od-5;d2<=od;d2++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+d2-1);
    var ds=dt.toISOString().slice(0,10);
    if(D.sex[ds]&&!fw['_'+d2]){fw['_'+d2]=true;if(!c.readings.find(function(r){return r.day===d2})){total++;hits++}}
  }
  if(total===0)return{pct:0,hits:0,total:6,lbl:"No fertile window data"};
  // Weight each fertile window day: OV-1 is peak, OV day is lower (egg may be gone),
  // OV-2 is high, OV-3 is moderate, OV-4/5 depend on sperm survival (so CM matters most here)
  var score=0,maxScore=0;
  var cmBoosts=0;  // how many sex-days had fertile CM
  var cmPenalties=0;  // how many sex-days had only non-fertile CM logged
  for(var d3=od-5;d3<=od;d3++){
    var baseW=d3===od?0.1:d3===od-1?0.3:d3===od-2?0.27:d3===od-3?0.16:d3===od-4?0.1:0.07;
    maxScore+=baseW;
    var dt2=new Date(cStart);dt2.setDate(dt2.getDate()+d3-1);var ds2=dt2.toISOString().slice(0,10);
    if(D.sex[ds2]){
      // Check CM on this day to adjust contribution
      var dayCM=(D.sym[ds2]||[]).filter(function(s){return s.indexOf('CM:')===0});
      var hasFertile=dayCM.some(function(s){return s==='CM: Egg white'||s==='CM: Watery'});
      var hasCreamy=dayCM.some(function(s){return s==='CM: Creamy'});
      var hasDry=dayCM.some(function(s){return s==='CM: Dry'});
      // Get max CM amount among fertile CM types on this day
      var fertileAmt=null;
      dayCM.forEach(function(cm){
        if(cm==='CM: Egg white'||cm==='CM: Watery'){
          var a=getCmAmt(cm,ds2);
          if(a==='lots')fertileAmt='lots';
          else if(a==='some'&&fertileAmt!=='lots')fertileAmt='some';
          else if(a==='little'&&!fertileAmt)fertileAmt='little';
        }
      });
      var multiplier=1;
      if(hasFertile){
        // Scale boost by amount: lots = 1.4x, some = 1.25x, little = 1.1x, unspecified = 1.25x (legacy default)
        if(fertileAmt==='lots')multiplier=1.4;
        else if(fertileAmt==='little')multiplier=1.1;
        else multiplier=1.25;
        cmBoosts++;
      }
      else if(hasCreamy){multiplier=1.0}
      else if(hasDry&&d3>=od-3){multiplier=0.6;cmPenalties++}  // dry on peak days is a real penalty
      // No CM logged — neutral
      score+=baseW*multiplier;
    }
  }
  // Cap at the maxScore (so boosts don't push past 100%)
  var cappedScore=Math.min(score,maxScore);
  var pct=Math.round(cappedScore/maxScore*100);
  var lbl=pct>=70?"Excellent timing":pct>=40?"Good timing":pct>=15?"Some chance":"Low — missed fertile window";
  // Add CM context if significant
  if(cmBoosts>=2&&pct>=40)lbl+=" (fertile CM boosted this)";
  else if(cmPenalties>=2)lbl+=" (dry CM on peak days held this back)";
  return{pct:pct,hits:hits,total:6,lbl:lbl,cmBoosts:cmBoosts,cmPenalties:cmPenalties}
}

function ixScore(ci){
  var c=D.cycles[ci];var od=effOv(ci);if(!od)return null;
  var cStart=new Date(c.key+'T12:00:00');
  var days=[];
  for(var d=od-5;d<=od;d++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+d-1);var ds=dt.toISOString().slice(0,10);
    var w=d===od?"OV day":d===od-1?"OV-1 (peak)":d===od-2?"OV-2 (high)":"OV-"+(od-d);
    days.push({day:d,date:ds,label:w,hit:!!D.sex[ds],peak:d>=od-2&&d<=od})
  }
  return days
}

function tempAlerts(info){
  var alerts=[];var c=info.c;var rs=c.readings;
  if(rs.length<2)return alerts;
  var last=rs[rs.length-1];var prev=rs[rs.length-2];
  if(!last.temp||!prev.temp)return alerts;
  var drop=prev.temp-last.temp;
  if(info.ho&&info.cd>=info.od+6&&info.cd<=info.od+12&&drop>=0.15){
    alerts.push({type:"implantation",icon:"🔵",bg:"var(--cob-bg)",color:"var(--cobalt)",msg:"Possible implantation dip — temp dropped "+drop.toFixed(2)+"° ("+last.temp.toFixed(2)+"°). Watch for rise tomorrow."})
  }
  if(info.ho&&info.cd>=info.od+10&&drop>=0.1){
    var cl=avgCL2();if(cl&&last.temp<cl)
      alerts.push({type:"period",icon:"🔴",bg:"var(--rose-bg)",color:"var(--rose)",msg:"Temp dropped below coverline ("+last.temp.toFixed(2)+"°) — period may be coming."})
  }
  var at=ats();var av=atVar();
  if(at[last.day]){
    var diff=last.temp-at[last.day];var sd=av[last.day]||0.1;
    if(diff>0.25)alerts.push({type:"spike",icon:"🟡",bg:"var(--gold-bg)",color:"var(--gold)",msg:"Temp is "+diff.toFixed(2)+"° above average for Day "+last.day+". Possible fever, poor sleep, or ovulation shift."});
    else if(diff<-0.2)alerts.push({type:"low",icon:"🔻",bg:"var(--cob-bg)",color:"var(--cobalt)",msg:"Temp is "+Math.abs(diff).toFixed(2)+"° below average for Day "+last.day+" (avg "+at[last.day].toFixed(2)+"°). Could be estrogen surge, poor sleep, or early waking."});
    else if(Math.abs(diff)>sd*1.8&&sd>0.05)alerts.push({type:"outlier",icon:"📊",bg:"var(--gold-bg)",color:"var(--gold)",msg:"Temp "+(diff>0?"above":"below")+" your usual range for Day "+last.day+" ("+last.temp.toFixed(2)+"° vs "+at[last.day].toFixed(2)+"° ±"+sd.toFixed(2)+")."});
  }
  // Today's temp vs yesterday — big swing alert
  var swing=Math.abs(last.temp-prev.temp);
  if(swing>=0.3&&!alerts.some(function(a){return a.type==="implantation"})){
    alerts.push({type:"swing",icon:"↕️",bg:"var(--burnt-bg)",color:"var(--burnt)",msg:"Big temp swing of "+swing.toFixed(2)+"° from yesterday. Check: same time? Alcohol? Illness? Mouth breathing?"})
  }
  return alerts
}

function smooth3(readings){
  var valid=readings.filter(function(r){return r.temp!=null});
  return valid.map(function(r,i){
    var sum=r.temp,cnt=1;
    if(i>0&&valid[i-1].temp!=null){sum+=valid[i-1].temp;cnt++}
    if(i<valid.length-1&&valid[i+1].temp!=null){sum+=valid[i+1].temp;cnt++}
    return{day:r.day,temp:sum/cnt}
  })
}

  if(info.ho&&info.cd===info.od+10)n.push({icon:"🤞",bg:"var(--plum-bg)",color:"var(--plum)",msg:"10 DPO — earliest you could get a positive test."});
  if(info.dtp<=2&&info.dtp>0)n.push({icon:"🔴",bg:"var(--rose-bg)",color:"var(--rose)",msg:"Period expected in "+info.dtp+" day"+(info.dtp>1?"s":"")+"."});
  return n
}

function getTWW(dpo){return TWW_GUIDE[dpo]||null}

function detectTriphasic(c,ci){
  var od=effOv(ci);if(!od)return null;
  var cl=avgCL2();if(!cl)return null;
  var post=c.readings.filter(function(r){return r.day>od&&r.temp!=null});
  if(post.length<8)return null;
  var early=[],late=[],lateReadings=[];
  post.forEach(function(r){var dpo=r.day-od;if(dpo>=1&&dpo<=6)early.push(r.temp);if(dpo>=7&&dpo<=10){late.push(r.temp);lateReadings.push(r)}});
  if(early.length<3||late.length<2)return null;
  var earlyAvg=early.reduce(function(a,b){return a+b},0)/early.length;
  var lateAvg=late.reduce(function(a,b){return a+b},0)/late.length;
  var shift=lateAvg-earlyAvg;
  // Find the first late reading that is clearly above the earlyAvg (the "second rise" point)
  var riseR=null;
  for(var i=0;i<lateReadings.length;i++){if(lateReadings[i].temp-earlyAvg>=0.1){riseR=lateReadings[i];break}}
  if(!riseR)riseR=lateReadings[0];
  var riseDay=riseR?riseR.day:null;
  var riseDpo=riseDay?(riseDay-od):null;
  if(shift>=0.1)return{found:true,shift:shift.toFixed(2),earlyAvg:earlyAvg.toFixed(2),lateAvg:lateAvg.toFixed(2),day:riseDay,dpo:riseDpo};
  return{found:false,shift:shift.toFixed(2),day:riseDay,dpo:riseDpo}
}

/* Check triphasic history across past completed cycles to contextualize a current triphasic detection */
function triphasicHistory(excludeCi){
  var evaluable=0,found=0,foundInPreg=0,pregCycles=0,totalCompleted=0;
  D.cycles.forEach(function(oc,oi){
    if(oi===excludeCi||!oc.length)return;
    totalCompleted++;
    var oTri=detectTriphasic(oc,oi);
    if(!oTri)return;
    evaluable++;
    var wasPreg=isExcl(oi);
    if(wasPreg)pregCycles++;
    if(oTri.found){found++;if(wasPreg)foundInPreg++}
  });
  return{evaluable:evaluable,found:found,foundInPreg:foundInPreg,pregCycles:pregCycles,totalCompleted:totalCompleted};
}

function triphasicHistoryNote(hist){
  if(hist.evaluable===0&&hist.totalCompleted>0)return ' <em>Personal history check: none of your '+hist.totalCompleted+' past cycles had enough post-OV data to compare (need ≥8 post-OV readings).</em>';
  if(hist.evaluable>=1){
    if(hist.found===0)return ' <em>Personal history: no triphasic patterns in your '+hist.evaluable+' past cycle'+(hist.evaluable>1?'s':'')+' with enough data — a stronger signal for you personally.</em>';
    if(hist.pregCycles===0)return ' <em>Personal history: '+hist.found+' of your '+hist.evaluable+' past cycles showed triphasic-like patterns (no pregnancy outcomes) — so this pattern alone isn\'t a strong pregnancy predictor for you.</em>';
    if(hist.foundInPreg>0&&hist.foundInPreg===hist.found)return ' <em>Notable: the only other time you showed this pattern was in your pregnancy cycle.</em>';
    if(hist.foundInPreg>0)return ' <em>Personal history: '+hist.found+' of your '+hist.evaluable+' past cycles showed this pattern, including '+hist.foundInPreg+' pregnancy cycle'+(hist.foundInPreg>1?'s':'')+'.</em>';
  }
  return '';
}

/* Generate a 2-3 sentence narrative for a cycle — used in Cycle tab story card */
function cycleStory(ci){
  var c=D.cycles[ci];if(!c)return '';
  var od=ovDay(c);var eod=effOv(ci);var cl=coverline(c);var len=c.length;
  var excl=isExcl(ci);
  var parts=[];
  // Opener
  parts.push('Cycle '+(ci+1)+' started '+fd(c.key)+'.');
  // Ovulation
  if(eod&&od)parts.push('OV detected Day '+od+' (LH+).');
  else if(eod)parts.push('OV estimated Day '+eod+' from temp shift.');
  else if(len&&len>=20)parts.push('No OV confirmed this cycle.');
  else if(!len)parts.push('Still in progress — OV not yet detected.');
  // Temp story
  if(eod){
    var postT=c.readings.filter(function(r){return r.day>eod&&r.temp!=null}).map(function(r){return r.temp});
    var preT=c.readings.filter(function(r){return r.day<=eod&&r.day>eod-6&&r.temp!=null}).map(function(r){return r.temp});
    if(postT.length>=3&&preT.length>=2){
      var postAvg=postT.reduce(function(a,b){return a+b},0)/postT.length;
      var preAvg=preT.reduce(function(a,b){return a+b},0)/preT.length;
      var shift=(postAvg-preAvg).toFixed(2);
      parts.push('Temp shift +'+shift+'° post-OV.');
    }
    // Triphasic status for THIS cycle
    var cTri=detectTriphasic(c,ci);
    if(cTri===null)parts.push('Not enough post-OV data for triphasic check.');
    else if(cTri.found)parts.push('Triphasic pattern (+'+cTri.shift+'° second rise' + (cTri.dpo?' around '+cTri.dpo+' DPO':'') + ').');
    else parts.push('No triphasic pattern (second rise was only +'+cTri.shift+'°).');
  }
  // Outcome
  if(excl)parts.push('★ Pregnancy cycle.');
  else if(len&&eod){
    var lp=len-eod;
    if(lp<10)parts.push(lp+'d luteal — short.');
    else if(lp<12)parts.push(lp+'d luteal — borderline.');
    else parts.push(lp+'d luteal — healthy.');
  }else if(!len&&eod){
    var info=cInfo();
    if(ci===info.ci){
      var dpo=info.cd-eod;
      parts.push(dpo+' DPO so far.');
    }
  }
  return parts.join(' ');
}



function cmScore(ci){
  var c=D.cycles[ci];var od=effOv(ci)||aod();
  var fertile=[];
  c.readings.forEach(function(r){
    if(r.day>=od-5&&r.day<=od){
      var syms=D.sym[r.date]||[];
      var cm=syms.filter(function(s){return s.indexOf("CM:")===0});
      fertile.push({day:r.day,date:r.date,cm:cm})
    }
  });
  if(!fertile.length)return null;
  // Also include days with logged sex that have CM but no temp reading
  var cStart=new Date(c.key+'T12:00:00');
  for(var dd=od-5;dd<=od;dd++){
    var dt=new Date(cStart);dt.setDate(dt.getDate()+dd-1);var ds=dt.toISOString().slice(0,10);
    if(!fertile.find(function(f){return f.day===dd})){
      var syms2=D.sym[ds]||[];var cm2=syms2.filter(function(s){return s.indexOf("CM:")===0});
      if(cm2.length)fertile.push({day:dd,date:ds,cm:cm2});
    }
  }
  var score=0,max=0;
  fertile.forEach(function(f){
    max+=3;
    f.cm.forEach(function(c2){
      var base=0;
      if(c2==="CM: Egg white")base=3;
      else if(c2==="CM: Watery")base=2;
      else if(c2==="CM: Creamy")base=1;
      // Amount multiplier
      var amt=getCmAmt(c2,f.date);
      var mult=1.0;
      if(amt==='lots')mult=1.25;
      else if(amt==='little')mult=0.7;
      // 'some' or no amount = 1.0
      score+=base*mult;
    });
  });
  // Cap per-day contribution so big boosts don't push past max
  score=Math.min(score,max);
  var pct=max>0?Math.round(score/max*100):0;
  var lbl=pct>=70?"Excellent — peak fertility CM":pct>=40?"Good — some fertile CM":pct>=10?"Fair — mostly non-fertile CM":"Low — no fertile CM logged";
  return{pct:pct,lbl:lbl,logged:fertile.filter(function(f){return f.cm.length}).length,total:fertile.length}
}

function amILate(info){
  if(!info.ho)return null;
  var luts=[];D.cycles.forEach(function(c,i){if(!isExcl(i)){var od2=ovDay(c);if(od2&&c.length)luts.push(c.length-od2)}});
  if(!luts.length)return null;
  var avgLut=Math.round(luts.reduce(function(a,b){return a+b},0)/luts.length);
  var maxLut=Math.max.apply(null,luts);
  var curLut=info.cd-info.od;
  // A 2-day buffer — one day past average is noise
  var late=curLut>avgLut+1;
  var veryLate=curLut>maxLut;
  return{curLut:curLut,avgLut:avgLut,maxLut:maxLut,late:late,veryLate:veryLate}
}

/* Returns a map of {symptom: {lutealFreq: 0-1, usualForYou: bool}} based on historical luteal phases.
   A symptom is "usual for you" if it appeared in >=40% of past luteal phases. */
function personalSymptomBaseline(excludeCi){
  var lutalCycles=0;
  var symLutalCounts={};  // symptom -> count of cycles it appeared in
  D.cycles.forEach(function(c,i){
    if(i===excludeCi||isExcl(i))return;
    var od=ovDay(c);if(!od||!c.length)return;
    lutalCycles++;
    var seen={};
    c.readings.forEach(function(r){
      if(r.day<=od)return;
      (D.sym[r.date]||[]).forEach(function(s){if(!seen[s]){seen[s]=true;symLutalCounts[s]=(symLutalCounts[s]||0)+1}});
      (D.mood[r.date]||[]).forEach(function(m){if(!seen[m]){seen[m]=true;symLutalCounts[m]=(symLutalCounts[m]||0)+1}});
    });
  });
  if(lutalCycles<2)return null;  // need at least 2 prior cycles to establish a baseline
  var result={};
  Object.keys(symLutalCounts).forEach(function(s){
    var freq=symLutalCounts[s]/lutalCycles;
    result[s]={lutealFreq:freq,usualForYou:freq>=0.4,cycles:symLutalCounts[s],total:lutalCycles};
  });
  return result;
}

/* The personal pattern engine — scans completed cycles and identifies strongest patterns
   specific to this person. Returns array of {kind, strength, label, detail} sorted by strength. */
function personalPatterns(){
  var patterns=[];
  // Need at least 2 completed cycles to find patterns
  var completed=D.cycles.filter(function(c,i){return c.length&&!isExcl(i)});
  if(completed.length<2)return patterns;

  // Pattern 1: Cycle length consistency
  var lens=completed.map(function(c){return c.length}).filter(function(l){return l<45});
  if(lens.length>=3){
    var avgLen=lens.reduce(function(a,b){return a+b},0)/lens.length;
    var sd=Math.sqrt(lens.reduce(function(a,b){return a+(b-avgLen)*(b-avgLen)},0)/lens.length);
    if(sd<=2)patterns.push({kind:'cycle-length',strength:90,label:'Highly regular cycles',detail:'Your cycles run '+Math.round(avgLen)+'d ±'+sd.toFixed(1)+'d. Predictions should be reliable.'});
    else if(sd<=4)patterns.push({kind:'cycle-length',strength:60,label:'Reasonably regular cycles',detail:'Your cycles run '+Math.round(avgLen)+'d ±'+sd.toFixed(1)+'d.'});
    else patterns.push({kind:'cycle-length',strength:40,label:'Variable cycle lengths',detail:'Your cycles range '+Math.min.apply(null,lens)+'-'+Math.max.apply(null,lens)+'d (avg '+Math.round(avgLen)+'d). Predictions are less reliable.'});
  }

  // Pattern 2: Luteal phase consistency
  var luts=[];
  completed.forEach(function(c){var od=ovDay(c);if(od)luts.push(c.length-od)});
  if(luts.length>=3){
    var avgLut=luts.reduce(function(a,b){return a+b},0)/luts.length;
    var sdLut=Math.sqrt(luts.reduce(function(a,b){return a+(b-avgLut)*(b-avgLut)},0)/luts.length);
    if(avgLut<10)patterns.push({kind:'luteal-short',strength:95,label:'Consistently short luteal phase',detail:'Your luteal phases average '+avgLut.toFixed(1)+'d (need 10+ for healthy implantation). Worth raising with GP.'});
    else if(avgLut<12)patterns.push({kind:'luteal-borderline',strength:70,label:'Borderline luteal phase',detail:'Your luteal phases average '+avgLut.toFixed(1)+'d. Below 12 is borderline — track for trends.'});
    else if(sdLut<=1)patterns.push({kind:'luteal-stable',strength:80,label:'Very stable luteal phase',detail:'Your luteal phases are consistently '+avgLut.toFixed(1)+'d ±'+sdLut.toFixed(1)+'d.'});
    else patterns.push({kind:'luteal-stable',strength:50,label:'Healthy luteal phase',detail:'Your luteal phases average '+avgLut.toFixed(1)+'d.'});
  }

  // Pattern 3: Ovulation timing
  var ovs=[];
  completed.forEach(function(c){var od=ovDay(c);if(od)ovs.push(od)});
  if(ovs.length>=3){
    var avgOv=ovs.reduce(function(a,b){return a+b},0)/ovs.length;
    var sdOv=Math.sqrt(ovs.reduce(function(a,b){return a+(b-avgOv)*(b-avgOv)},0)/ovs.length);
    if(sdOv<=1)patterns.push({kind:'ov-stable',strength:75,label:'Predictable ovulation day',detail:'You typically ovulate around Day '+Math.round(avgOv)+' (±'+sdOv.toFixed(1)+'d). Strong fertile window predictability.'});
    else if(sdOv>=4)patterns.push({kind:'ov-variable',strength:55,label:'Variable ovulation day',detail:'You ovulate Days '+Math.min.apply(null,ovs)+'-'+Math.max.apply(null,ovs)+' (±'+sdOv.toFixed(1)+'d). OPKs are essential for timing.'});
  }

  // Pattern 4: Fertile-CM patterns — when does egg-white CM typically appear?
  var ewDays=[];
  completed.forEach(function(c){
    var od=ovDay(c);if(!od)return;
    c.readings.forEach(function(r){
      var sy=D.sym[r.date]||[];
      if(sy.indexOf('CM: Egg white')>-1)ewDays.push(r.day-od);
    });
  });
  if(ewDays.length>=3){
    var avgEw=ewDays.reduce(function(a,b){return a+b},0)/ewDays.length;
    if(avgEw<=-2)patterns.push({kind:'cm-early',strength:65,label:'Egg-white CM arrives early',detail:'You typically log egg-white CM '+Math.abs(Math.round(avgEw))+' days before OV. Watch for it as your peak signal.'});
    else if(avgEw>=-1&&avgEw<=1)patterns.push({kind:'cm-onpoint',strength:75,label:'Egg-white CM aligns with OV',detail:'Your fertile CM and OV are well-synced (within ~1 day). Reliable timing signal.'});
  }

  // Pattern 5: Symptom timing patterns (e.g. cramps always on CD2)
  var sumByCD={};  // 'symptom-cd' -> count
  var totalC=completed.length;
  completed.forEach(function(c){
    var seen={};
    c.readings.forEach(function(r){
      (D.sym[r.date]||[]).forEach(function(s){
        if(s.indexOf('CM:')===0)return;  // CM has its own pattern
        var key=s+'|'+r.day;
        if(!seen[key]){seen[key]=true;sumByCD[key]=(sumByCD[key]||0)+1}
      });
    });
  });
  // Find symptoms that appear on the same day in 60%+ of cycles
  Object.keys(sumByCD).forEach(function(k){
    var freq=sumByCD[k]/totalC;
    if(freq>=0.6&&sumByCD[k]>=3){
      var parts=k.split('|');
      patterns.push({kind:'sym-timing',strength:50+Math.round(freq*30),label:parts[0]+' typically on Day '+parts[1],detail:'You logged '+parts[0].toLowerCase()+' on Day '+parts[1]+' in '+sumByCD[k]+'/'+totalC+' cycles.'});
    }
  });

  // Pattern 6: Triphasic frequency
  var triCount=0,triEval=0;
  completed.forEach(function(c,idx){
    var ci=D.cycles.indexOf(c);
    var t=detectTriphasic(c,ci);
    if(t){triEval++;if(t.found)triCount++}
  });
  if(triEval>=3){
    var triFreq=triCount/triEval;
    if(triFreq>=0.6)patterns.push({kind:'tri-common',strength:60,label:'Triphasic patterns are common for you',detail:triCount+'/'+triEval+' evaluable cycles showed triphasic — so this pattern alone isn\'t a strong pregnancy predictor for you.'});
    else if(triFreq===0)patterns.push({kind:'tri-rare',strength:55,label:'Triphasic is rare for you',detail:'None of your '+triEval+' evaluable cycles showed triphasic — if it appears, that\'s a meaningful signal.'});
  }

  // Sort by strength descending
  patterns.sort(function(a,b){return b.strength-a.strength});
  return patterns;
}

/* Generate the morning briefing for a given cycle info — 3-5 sentences combining
   focus, pattern observation, prediction, and unusual flag */
function morningBriefing(info){
  var c=info.c;var ci=info.ci;var cd=info.cd;var dpo=info.ho?(cd-info.od):null;
  var todayR=c.readings.find(function(x){return x.date===td()});
  var todaySy=D.sym[td()]||[];
  var ph=phase(cd,info.av,info.ao,info.ho,info.od);
  var cl=avgCL2();
  var bits=[];

  // ========== OPENER: where you are ==========
  if(ph.n.indexOf('Menstrual')>-1){
    bits.push('<strong>Day '+cd+' — period phase.</strong>');
  }else if(ph.n.indexOf('Follicular')>-1){
    var daysToOv=info.ao-cd;
    if(daysToOv>0)bits.push('<strong>Day '+cd+' — '+daysToOv+' day'+(daysToOv>1?'s':'')+' until typical ovulation.</strong>');
    else bits.push('<strong>Day '+cd+' — follicular phase.</strong>');
  }else if(ph.n.indexOf('Ovulatory')>-1){
    bits.push('<strong>Day '+cd+' — peak fertility window.</strong>');
  }else if(dpo!=null){
    bits.push('<strong>'+dpo+' DPO</strong> (Day '+cd+', luteal phase).');
  }else{
    bits.push('<strong>Day '+cd+'.</strong>');
  }

  // ========== TODAY'S TEMP: contextual reading ==========
  if(todayR&&todayR.temp!=null&&cl){
    var diff=todayR.temp-cl;
    if(dpo!=null&&dpo>=1){
      if(diff>=0.15)bits.push('Today\'s '+todayR.temp.toFixed(2)+'° is '+diff.toFixed(2)+'° above coverline — strong luteal hold.');
      else if(diff>=0.05)bits.push('Today\'s '+todayR.temp.toFixed(2)+'° is solidly above coverline.');
      else if(diff>=-0.05)bits.push('Today\'s '+todayR.temp.toFixed(2)+'° is right on coverline — watch tomorrow.');
      else if(dpo>=10)bits.push('Today\'s '+todayR.temp.toFixed(2)+'° dropped below coverline — period may be 1-2 days away.');
      else bits.push('Today\'s '+todayR.temp.toFixed(2)+'° dipped below coverline — could be a one-day blip.');
    }else if(cd<=info.ao){
      bits.push('Today\'s '+todayR.temp.toFixed(2)+'° logged.');
    }
  }else if(!todayR&&cd>=2){
    bits.push('No temp logged yet today.');
  }

  // ========== ACTION: what matters today ==========
  var fwStart=info.ao-5;
  if(ph.n.indexOf('Menstrual')>-1&&cd<=2){
    bits.push('Rest, hydrate, and start logging when you can.');
  }else if(cd>=fwStart-2&&cd<fwStart&&!info.ho){
    bits.push('Fertile window opens in '+(fwStart-cd)+' day'+(fwStart-cd>1?'s':'')+' — start daily OPKs.');
  }else if(cd>=fwStart&&cd<=info.ao&&!info.ho){
    bits.push('You\'re in the fertile window — prioritise intercourse'+(D.sex[td()]?'':' (none logged today)')+'.');
  }else if(dpo!=null){
    if(dpo>=6&&dpo<=9)bits.push('Implantation window — log any unusual symptoms but don\'t test yet.');
    else if(dpo>=10&&dpo<=12){
      var hasTest=D.ptests.some(function(p){return p.date===td()});
      bits.push(hasTest?'Test logged — check Compare tab for the result history.':'Testing window open — FRER with first morning urine.');
    }else if(dpo>=13)bits.push('Reliable test day — if not yet, test today.');
    else if(dpo<=2)bits.push('Just past OV — too early for symptoms or testing. Just keep logging temps.');
    else bits.push('Mid-TWW — keep logging temps, watch for patterns.');
  }

  // ========== PATTERN OBSERVATION ==========
  var patterns=personalPatterns();
  if(patterns.length){
    // Pick most relevant pattern for current context
    var relevant=null;
    if(dpo!=null&&dpo>=8){
      relevant=patterns.find(function(p){return p.kind==='luteal-stable'||p.kind==='luteal-short'||p.kind==='luteal-borderline'});
    }else if(cd<=info.ao){
      relevant=patterns.find(function(p){return p.kind==='ov-stable'||p.kind==='ov-variable'||p.kind==='cm-onpoint'||p.kind==='cm-early'});
    }
    if(!relevant)relevant=patterns[0];
    bits.push('<em>Pattern: '+relevant.detail+'</em>');
  }

  // ========== PREDICTION ==========
  if(dpo!=null&&dpo>=8){
    // Predict period day based on personal avg luteal
    var lutHist=[];
    D.cycles.forEach(function(oc,oi){if(!isExcl(oi)){var od=ovDay(oc);if(od&&oc.length)lutHist.push(oc.length-od)}});
    if(lutHist.length>=2){
      var avgL=Math.round(lutHist.reduce(function(a,b){return a+b},0)/lutHist.length);
      var daysOut=avgL-dpo;
      if(daysOut>=1&&daysOut<=4){
        var predDate=ad(td(),daysOut);
        bits.push('<strong>Predicted:</strong> Period likely around '+fd(predDate)+' (your avg luteal is '+avgL+'d).');
      }else if(daysOut===0){
        bits.push('<strong>Predicted:</strong> Period due today based on your average luteal length.');
      }else if(daysOut<0&&!c.length){
        bits.push('<strong>Predicted:</strong> '+Math.abs(daysOut)+'d past your average luteal length — testing recommended.');
      }
    }
  }else if(!info.ho&&cd>=info.ao-3&&cd<=info.ao+3){
    // Approaching/at typical OV but not yet detected
    var daysToOv2=info.ao-cd;
    if(daysToOv2>0)bits.push('<strong>Predicted:</strong> Ovulation likely around '+fd(ad(td(),daysToOv2))+' based on your typical Day '+info.ao+'.');
  }

  // ========== UNUSUAL FLAG ==========
  // Check if today's symptoms are unusual for this person
  if(dpo!=null&&dpo>=6&&todaySy.length){
    var symBase=personalSymptomBaseline(ci);
    if(symBase){
      var unusual=todaySy.filter(function(s){
        return s.indexOf('CM:')!==0&&symBase[s]&&symBase[s].lutealFreq<=0.2;
      });
      if(unusual.length){
        bits.push('<em>⚠️ Unusual for you: '+unusual.join(', ')+' — appeared in only '+(symBase[unusual[0]].cycles)+'/'+(symBase[unusual[0]].total)+' past luteal phases.</em>');
      }
    }
  }

  return bits.join(' ');
}

/* ===== ASK BOX ENGINE =====
   Pattern-matches user questions against ~30 templates, each returning a personalized
   answer using the user's actual data. Returns the best match or a fallback. */
function handleAsk(){
  var inputEl=document.getElementById('askInput');
  if(!inputEl)return;
  var q=inputEl.value.trim();
  if(!q)return;
  var qLower=q.toLowerCase();

  // Try rules first
  var ruleAnswer=answerQuestion(qLower);
  var isFallback=ruleAnswer.indexOf("I can't answer that one yet")===0;

  // If rules matched, use that answer immediately
  if(!isFallback){
    persistAskEntry(q,ruleAnswer,'rules');
    inputEl.value='';
    render();
    return;
  }

  // Rules fell through — try Gemini if configured
  if(D.aiCfg&&D.aiCfg.enabled&&D.aiCfg.url&&D.aiCfg.secret){
    inputEl.value='';
    // Show "thinking" state
    window._lastAskQuestion=q;
    window._lastAskAnswer='<em style="color:var(--cobalt)">🤔 Asking Gemini…</em>';
    window._aiThinking=true;
    render();
    askGemini(q).then(function(aiAnswer){
      window._aiThinking=false;
      if(aiAnswer){
        persistAskEntry(q,aiAnswer,'ai');
      }else{
        // Gemini failed — fall back to the rules' "I don't know" message
        persistAskEntry(q,ruleAnswer+' <span style="color:var(--rose);font-size:10px">(Gemini call failed)</span>','rules');
      }
      render();
    }).catch(function(err){
      window._aiThinking=false;
      persistAskEntry(q,ruleAnswer+' <span style="color:var(--rose);font-size:10px">(Gemini error: '+err.message+')</span>','rules');
      render();
    });
    return;
  }

  // No AI configured, use the rules fallback
  persistAskEntry(q,ruleAnswer,'rules');
  inputEl.value='';
  render();
}

/* Save a Q+A to the bank and to the live "last answer" display */
function persistAskEntry(q,answer,source){
  if(!D.askLog)D.askLog=[];
  var entry={ts:new Date().toISOString(),q:q,a:answer,rating:null,note:'',source:source||'rules'};
  D.askLog.unshift(entry);
  if(D.askLog.length>200)D.askLog=D.askLog.slice(0,200);
  save();
  window._lastAskQuestion=q;
  window._lastAskAnswer=answer;
  window._lastAskSource=source||'rules';
}

/* Build a comprehensive context snapshot for Gemini — current cycle + last 3 cycles + patterns */
function buildAIContext(){
  var info=cInfo();var c=info.c;var ci=info.ci;
  var today=td();
  var ctx={
    today:today,
    currentCycle:{
      number:ci+1,
      startDate:c.key,
      currentDay:info.cd,
      typicalCycleLength:info.av,
      typicalOvDay:info.ao,
      ovulationDetected:info.ho,
      ovDay:info.od||null,
      dpo:info.ho?(info.cd-info.od):null,
      coverline:avgCL2()?avgCL2().toFixed(2):null,
      isExcluded:isExcl(ci),
    },
    today_data:{
      temp:null,
      tempVsCoverline:null,
      wrist:null,
      sleep:null,
      sleepHours:null,
      symptoms:D.sym[today]||[],
      mood:D.mood[today]||[],
      cmAmounts:D.cmAmt&&D.cmAmt[today]||{},
      sex:!!D.sex[today],
      opk:D.opks&&D.opks[today]||null,
      flow:null,
      note:D.notes&&D.notes[today]||null,
    },
    recentReadings:[],  // last 10 days of current cycle
    pastCycles:[],  // up to 5 prior cycles (for broader pattern context)
    pregnancyTests:(D.ptests||[]).slice(-10),  // last 10 tests with dates and results
    patterns:[],
    luteralPhaseHistory:[],
    cycleLengthHistory:[],
  };

  var todayR=c.readings.find(function(x){return x.date===today});
  var cl=avgCL2();
  if(todayR){
    ctx.today_data.temp=todayR.temp;
    if(cl&&todayR.temp!=null){
      var diff=todayR.temp-cl;
      ctx.today_data.tempVsCoverline=(diff>=0?'+':'')+diff.toFixed(2)+' (coverline '+cl.toFixed(2)+')';
    }
    if(todayR.flow)ctx.today_data.flow=todayR.flow;
    if(todayR.ov)ctx.today_data.lhPositive=true;
  }
  if(D.wrist&&D.wrist[today])ctx.today_data.wrist=D.wrist[today];
  if(D.sleep&&D.sleep[today])ctx.today_data.sleep=D.sleep[today];
  if(D.sleepHrs&&D.sleepHrs[today])ctx.today_data.sleepHours=D.sleepHrs[today];

  // Last 10 days of readings with full data
  c.readings.slice(-10).forEach(function(r){
    var dpoVal=info.od&&r.day>info.od?(r.day-info.od):null;
    ctx.recentReadings.push({
      day:r.day,
      date:r.date,
      dpo:dpoVal,
      temp:r.temp,
      tempVsCoverline:cl&&r.temp!=null?((r.temp-cl>=0?'+':'')+(r.temp-cl).toFixed(2)):null,
      flow:r.flow||null,
      lhPositive:!!r.ov,
      symptoms:D.sym[r.date]||[],
      mood:D.mood[r.date]||[],
      cmAmounts:D.cmAmt&&D.cmAmt[r.date]||{},
      sex:!!D.sex[r.date],
      notes:D.notes&&D.notes[r.date]||null,
    });
  });

  // Last 5 cycles (excluding current) — broader context
  var pastIdx=[];
  for(var i=ci-1;i>=0&&pastIdx.length<5;i--)pastIdx.push(i);
  pastIdx.forEach(function(i){
    var pc=D.cycles[i];var pod=ovDay(pc);
    var temps=pc.readings.filter(function(r){return r.temp!=null}).map(function(r){return r.temp});
    var avgT=temps.length?(temps.reduce(function(a,b){return a+b},0)/temps.length).toFixed(2):null;
    var tri=detectTriphasic(pc,i);
    // Count fertile CM days and intimacy days in past cycle
    var sexDays=0,fertileCMDays=0;
    pc.readings.forEach(function(r){
      if(D.sex[r.date])sexDays++;
      var syms=D.sym[r.date]||[];
      if(syms.some(function(s){return s==='CM: Egg white'||s==='CM: Watery'}))fertileCMDays++;
    });
    ctx.pastCycles.push({
      number:i+1,
      startDate:pc.key,
      length:pc.length,
      ovDay:pod,
      lutealLength:pod&&pc.length?(pc.length-pod):null,
      avgTemp:avgT,
      excluded:isExcl(i),
      pregnancy:isExcl(i),
      triphasic:tri?(tri.found?'yes':'no'):'insufficient_data',
      sexDays:sexDays,
      fertileCMDays:fertileCMDays,
    });
    if(pod&&pc.length)ctx.luteralPhaseHistory.push(pc.length-pod);
    if(pc.length)ctx.cycleLengthHistory.push(pc.length);
  });

  // Patterns
  var pp=personalPatterns();
  if(pp&&pp.length)ctx.patterns=pp.slice(0,5).map(function(p){return{label:p.label,detail:p.detail}});

  // Compact summary strings — easier for LLM to digest than nested JSON
  ctx.summary={
    cyclesTracked:D.cycles.length,
    completedCycles:D.cycles.filter(function(oc,oi){return oc.length&&!isExcl(oi)}).length,
    avgCycleLength:ctx.cycleLengthHistory.length?(ctx.cycleLengthHistory.reduce(function(a,b){return a+b},0)/ctx.cycleLengthHistory.length).toFixed(1):null,
    avgLutealLength:ctx.luteralPhaseHistory.length?(ctx.luteralPhaseHistory.reduce(function(a,b){return a+b},0)/ctx.luteralPhaseHistory.length).toFixed(1):null,
    hadPregnancyCycle:D.cycles.some(function(oc,oi){return isExcl(oi)}),
  };

  return ctx;
}

/* Call Gemini via the Cloudflare Worker. Returns a promise with the answer text or null on failure. */
function askGemini(question){
  if(!D.aiCfg||!D.aiCfg.enabled||!D.aiCfg.url||!D.aiCfg.secret){
    return Promise.resolve(null);
  }
  var ctx=buildAIContext();
  var systemPrompt='You are CyTrack AI, a direct and data-savvy fertility assistant built into a personal cycle-tracking app. You speak with the user as a knowledgeable friend who has full access to their tracking data and uses it constantly.\n\n'+
    'CORE RULES — Follow these without exception:\n\n'+
    '1. **BE SPECIFIC WITH NUMBERS.** Every answer MUST reference at least one specific number from the user\'s data: DPO, cycle day, exact temps, exact dates, luteal phase length, coverline. Never answer vaguely when the data contains the answer.\n\n'+
    '2. **NO HEDGING PHRASES.** Banned phrases: "it could be many things", "spotting can be common", "it\'s possible", "you might want to consider", "various reasons", "some people find". Instead: pick the most likely 1-2 causes based on WHERE SHE IS in the cycle and say which is most likely.\n\n'+
    '3. **READ THE DATA BEFORE ANSWERING.** Check today_data.symptoms, today_data.temp, currentCycle.dpo, recentReadings for today\'s actual logged info. If she asks about something (e.g. spotting), FIRST check if she\'s logged it — if yes, reference it explicitly ("I can see you logged spotting today"). If NO, say so directly ("You haven\'t logged spotting today — is this new right now?").\n\n'+
    '4. **REASON FROM HER PATTERN.** She has tracked '+ctx.summary.cyclesTracked+' cycles'+(ctx.summary.hadPregnancyCycle?' including one pregnancy cycle':'')+'. Her avg luteal is '+(ctx.summary.avgLutealLength||'unknown')+'d. Today she is CD'+ctx.currentCycle.currentDay+(ctx.currentCycle.dpo?', '+ctx.currentCycle.dpo+' DPO':'')+'. ANCHOR every answer to this position.\n\n'+
    '5. **ACTIONABLE, NOT VAGUE.** When she asks "might I be pregnant" at 14+ DPO, the answer is specific: "Yes — at '+(ctx.currentCycle.dpo||'X')+' DPO with your typical luteal of '+(ctx.summary.avgLutealLength||'X')+'d, your period would have arrived. Test now with FMU — a negative at this DPO is very reliable." Not "it\'s possible, you might want to test soon."\n\n'+
    '6. **USE UK SPELLING** and a warm but direct tone. Write 3-5 sentences. Use <strong> for key stats. No bullet lists unless asked.\n\n'+
    '7. **DON\'T SELF-CENSOR.** She is an adult TTC for months. Don\'t add disclaimers like "consult your doctor" unless the situation is genuinely serious (heavy bleeding, severe pain, suspicious pattern). She wants real answers, not liability language.\n\n'+
    '8. **QUESTION THE QUESTION when useful.** If she asks "why is my temp low" and her temp isn\'t actually low compared to coverline, say so. Don\'t invent a problem to answer.\n\n'+
    'Today is '+ctx.today+'. Answer using her JSON data, which follows.';
  var userPrompt='Her cycle data as JSON:\n\n'+JSON.stringify(ctx,null,2)+'\n\n=== QUESTION ===\n'+question;

  return fetch(D.aiCfg.url,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'X-App-Secret':D.aiCfg.secret,
    },
    body:JSON.stringify({
      systemPrompt:systemPrompt,
      prompt:userPrompt,
      model:'gemini-2.5-flash',
    }),
  }).then(function(r){
    if(!r.ok)return r.json().then(function(j){throw new Error(j.error||('HTTP '+r.status))});
    return r.json();
  }).then(function(data){
    if(data.error)throw new Error(data.error);
    return data.answer||null;
  });
}

/* Test the AI configuration with a simple ping */
function testAICfg(){
  var url=document.getElementById('aiCfgUrl').value.trim();

  if(!url||!secret){flash('URL and secret required');return}
  flash('Testing…');
  fetch(url,{

}

/* Rate an answer in the bank. idx = position in D.askLog (0 = newest) */
function rateAsk(idx,rating){
  if(!D.askLog||!D.askLog[idx])return;
  // Toggle off if same value tapped
  if(D.askLog[idx].rating===rating)D.askLog[idx].rating=null;
  else D.askLog[idx].rating=rating;
  save();render();
  flash(rating==='up'?'👍 Thanks':rating==='down'?'👎 Logged':'Cleared');
}

/* Edit the free-text note on an answer */
function editAskNote(idx){
  if(!D.askLog||!D.askLog[idx])return;
  var current=D.askLog[idx].note||'';
  var note=prompt('Note about this answer (e.g. "missed X", "wrong about Y"):',current);
  if(note===null)return;  // cancelled
  D.askLog[idx].note=note.trim();
  save();render();
}

/* Delete a single bank entry */
function deleteAskEntry(idx){
  if(!D.askLog||!D.askLog[idx])return;
  if(!confirm('Delete this question from the bank?'))return;
  D.askLog.splice(idx,1);
  save();render();
  flash('Deleted');
}

/* Wipe the entire bank */
function clearAskBank(){
  if(!confirm('Clear the ENTIRE question bank? This cannot be undone.'))return;
  D.askLog=[];save();render();flash('Bank cleared');
}

/* Export bank as plain text — easy to paste into chat */
function exportAskBankText(){
  var log=D.askLog||[];
  var rated=log.filter(function(e){return e.rating||e.note});
  var t='CYTRACK QUESTION BANK\nGenerated: '+fdf(td())+'\nTotal questions: '+log.length+(rated.length?' (rated: '+rated.length+')':'')+'\n\n';
  log.forEach(function(e,i){
    var d=new Date(e.ts);
    var dateStr=d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    var ratingStr=e.rating==='up'?' 👍':e.rating==='down'?' 👎':'';
    t+='━━━ #'+(i+1)+' · '+dateStr+ratingStr+' ━━━\n';
    t+='Q: '+e.q+'\n';
    // Strip HTML tags from answer for plain text
    var aText=(e.a||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
    t+='A: '+aText+'\n';
    if(e.note)t+='Note: '+e.note+'\n';
    t+='\n';
  });
  var blob=new Blob([t],{type:'text/plain'});
  dlFB(blob,'cytrack_questions_'+td()+'.txt');
}

function answerQuestion(q){
  var info=cInfo();var c=info.c;var ci=info.ci;var cd=info.cd;var dpo=info.ho?(cd-info.od):null;
  var todayR=c.readings.find(function(x){return x.date===td()});
  var cl=avgCL2();var ph=phase(cd,info.av,info.ao,info.ho,info.od);

  // ===== Helper: build common stats =====
  function lutHistory(){
    var luts=[];D.cycles.forEach(function(oc,oi){if(!isExcl(oi)){var od=ovDay(oc);if(od&&oc.length)luts.push(oc.length-od)}});
    return luts;
  }
  function avgLut(){var l=lutHistory();return l.length?l.reduce(function(a,b){return a+b},0)/l.length:null}

  // ===== Question patterns — order matters (specific before general) =====

  // TEMP / BBT questions
  if(/why.*(temp|bbt).*(low|drop|down|fell|dipped)/.test(q)||/temp.*lower than (usual|normal)/.test(q)){
    var ans='Temperature can drop for several reasons: ';
    var causes=[];
    if(dpo===null||dpo<=1)causes.push('pre-ovulation it\'s normal — temps run cooler in follicular phase');
    if(dpo!=null&&dpo>=10&&todayR&&cl&&todayR.temp<cl)causes.push('a drop below coverline late in luteal usually signals period within 24-48h');
    if(dpo!=null&&dpo>=6&&dpo<=10)causes.push('a one-day dip mid-luteal can be an "implantation dip" (not always pregnancy-related)');
    causes.push('also: bad sleep, alcohol the night before, taking your temp later than usual, or mouth-breathing all lower readings');
    ans+=causes.join('. ')+'.';
    if(todayR)ans+=' Today\'s reading: '+todayR.temp.toFixed(2)+'°'+(cl?' (coverline '+cl.toFixed(2)+'°)':'')+'.';
    return ans;
  }
  if(/why.*(temp|bbt).*(high|up|spike|rose|risen)/.test(q)){
    var ans='Higher temps usually mean: ';
    if(dpo!=null)ans+='you\'re post-ovulation (progesterone raises baseline by ~0.2-0.5°). ';
    else ans+='ovulation may have happened — watch for sustained rise over next 2-3 days. ';
    ans+='Other causes: illness, alcohol, fragmented sleep, taking temp later than usual.';
    if(todayR&&cl)ans+=' Today: '+todayR.temp.toFixed(2)+'° vs coverline '+cl.toFixed(2)+'°.';
    return ans;
  }
  if(/(what|where).*coverline/.test(q)||/^coverline$/.test(q)){
    if(cl)return 'Your coverline is '+cl.toFixed(2)+'° — calculated as the average of pre-ovulation temps across your tracked cycles. Post-OV temps should sit above it; that\'s how you confirm ovulation happened.';
    return 'Coverline is the line dividing your pre-OV temps from post-OV temps. You don\'t have enough data yet to calculate one — usually need 3+ cycles.';
  }
  if(/temp (today|this morning|now)/.test(q)){
    if(todayR)return 'Today\'s temp: '+todayR.temp.toFixed(2)+'°'+(cl?' ('+(todayR.temp>=cl?(todayR.temp-cl).toFixed(2)+'° above':(cl-todayR.temp).toFixed(2)+'° below')+' coverline)':'')+'.';
    return 'You haven\'t logged a temp today yet.';
  }

  // OVULATION questions
  if(/when.*(ovulat|ov)/.test(q)||/when.*fertile/.test(q)){
    if(info.ho)return 'You\'ve already ovulated this cycle — Day '+info.od+' (you\'re '+dpo+' DPO now).';
    var daysOut=info.ao-cd;
    if(daysOut>0)return 'Based on your typical Day '+info.ao+' ovulation, you\'re probably ovulating in ~'+daysOut+' day'+(daysOut>1?'s':'')+' (around '+fd(ad(td(),daysOut))+'). Fertile window is the 5 days before plus OV day itself.';
    if(daysOut===0)return 'Today is your typical ovulation day — watch for LH+ on an OPK to confirm.';
    return 'You\'re past your typical OV day ('+info.ao+') — '+Math.abs(daysOut)+' day'+(Math.abs(daysOut)>1?'s':'')+' late. OV may have been delayed or already happened without confirmation.';
  }
  if(/did i ovulate/.test(q)){
    if(info.ho)return 'Yes — ovulation detected on Day '+info.od+'.';
    if(cd>=info.ao+5)return 'Not yet confirmed. You\'re past your typical OV day. Without LH+ or a clear temp shift, ovulation isn\'t verified for this cycle.';
    return 'Not yet — still waiting for LH+ or a sustained temp shift. Typical OV for you is around Day '+info.ao+'.';
  }

  // PERIOD questions
  if(/when.*(period|af|menstru|bleed)/.test(q)){
    if(dpo===null)return 'Without confirmed ovulation, hard to predict precisely. Your average cycle is '+info.av+' days, so based on Day 1 of this cycle, period would land around '+fd(ad(c.key,info.av-1))+'.';
    var aL=avgLut();
    if(aL){
      var daysOut=Math.round(aL)-dpo;
      if(daysOut>0)return 'Based on your average luteal length ('+aL.toFixed(1)+'d), period likely arrives in ~'+daysOut+' day'+(daysOut>1?'s':'')+' (around '+fd(ad(td(),daysOut))+').';
      if(daysOut===0)return 'Period due today based on your average luteal length.';
      return 'You\'re '+Math.abs(daysOut)+'d past your average luteal length — testing strongly recommended if you haven\'t.';
    }
    return 'Need more cycle data to predict precisely. You\'re currently '+dpo+' DPO.';
  }
  if(/am i late/.test(q)||/late.*period/.test(q)){
    var late=amILate(info);
    if(late)return late;
    return 'Not late — based on your historical luteal phase, you\'re still within normal range.';
  }

  // TESTING questions
  if(/when.*(test|frer|hpt)/.test(q)||/should i test/.test(q)){
    if(dpo===null)return 'Pregnancy tests need 10+ DPO for reliability. You haven\'t confirmed ovulation this cycle yet.';
    if(dpo<7)return 'Too early — at '+dpo+' DPO, hCG is almost certainly too low to detect. Wait until at least 10 DPO, ideally 12+.';
    if(dpo>=7&&dpo<10)return 'Possible but unreliable. At '+dpo+' DPO some FRERs can pick up faint positives but negatives mean nothing. Wait 2-3 more days for more confidence.';
    if(dpo>=10&&dpo<13)return 'Reasonable to test — FRER with first morning urine. A negative isn\'t definitive yet (some women don\'t show until 13-14 DPO).';
    return 'Yes, test now. At '+dpo+' DPO, a negative is much more reliable.';
  }
  if(/why.*(negative|bfn)/.test(q)){
    if(dpo===null)return 'Without confirmed ovulation, a negative test doesn\'t tell you much.';
    if(dpo<10)return 'At '+dpo+' DPO it\'s often too early — hCG hasn\'t built up enough. Statistically only about 25% of pregnancies are detectable at 10 DPO.';
    if(dpo<14)return 'At '+dpo+' DPO a negative is meaningful but not definitive. Late implanters can still test positive at 14+ DPO. If period doesn\'t arrive, retest in 2 days.';
    return 'At '+dpo+' DPO a negative is highly reliable — not pregnant this cycle. Sorry. 💜';
  }

  // LUTEAL PHASE questions
  if(/luteal.*(phase|short|long|healthy|normal)/.test(q)||/healthy.*luteal/.test(q)){
    var aL=avgLut();
    if(!aL)return 'Need more data to assess your luteal phase. Healthy ranges are 12-16 days; below 10 is a concern.';
    var ans='Your average luteal phase is '+aL.toFixed(1)+'d. ';
    if(aL>=12)ans+='That\'s healthy — well above the 10d threshold for healthy implantation.';
    else if(aL>=10)ans+='That\'s borderline — above the 10d threshold but worth tracking. Mention to GP if consistent.';
    else ans+='That\'s short — below 10d can make implantation difficult. Worth raising with your GP for progesterone support.';
    return ans;
  }

  // TRIPHASIC questions
  if(/(what|why).*triphasic/.test(q)||/^triphasic/.test(q)){
    return 'Triphasic = a third temperature rise in the luteal phase, usually 7-10 DPO. The theory is that hCG from implantation triggers a secondary progesterone surge. It\'s talked about as a pregnancy sign but isn\'t reliable on its own — many cycles show triphasic without pregnancy, and many pregnancies don\'t show it. Look at your Cycle tab to see whether each of your cycles was triphasic.';
  }

  // CM questions
  if(/(what|why).*(egg white|ewcm|fertile cm)/.test(q)){
    return 'Egg-white CM (stretchy, clear, lubricative) is your most fertile mucus. It usually appears 1-3 days before ovulation and means oestrogen is peaking. Sperm can survive in it for up to 5 days. Any logged egg-white CM = prioritise intercourse window.';
  }
  if(/dry.*cm/.test(q)){
    return 'Dry CM in the fertile window is suboptimal — sperm needs fluid to survive. If this is a pattern, try: more water (2.5L+/day), Evening Primrose Oil in follicular phase only (stop at OV), or Preseed lubricant during sex.';
  }

  // PATTERNS / PERSONAL questions
  if(/pattern|trend|what.*notic/.test(q)){
    var pp=personalPatterns();
    if(!pp.length)return 'Not enough completed cycles to spot patterns yet. Need 3+ tracked cycles for meaningful pattern detection.';
    var top=pp.slice(0,3);
    return 'Top patterns from your data: '+top.map(function(p){return p.label+' — '+p.detail}).join(' || ');
  }
  if(/(am i|is this|is my|are my).*(normal|healthy|ok|okay)/.test(q)){
    var pp=personalPatterns();
    if(!pp.length)return 'Need more cycle data to assess. Once you have 3+ completed cycles I can compare against your personal baseline.';
    var concerning=pp.filter(function(p){return p.kind==='luteal-short'||p.kind==='cycle-length'&&p.strength<=40});
    if(concerning.length)return 'Mostly normal, but worth flagging: '+concerning.map(function(p){return p.detail}).join(' ');
    return 'Based on your data, your cycles look healthy. '+pp[0].detail;
  }

  // CYCLE info
  if(/what (day|cd)/.test(q)||/^day$/.test(q)||/where am i/.test(q)){
    return 'You\'re on Day '+cd+(dpo!==null?' ('+dpo+' DPO)':'')+' of cycle '+(ci+1)+'. Phase: '+ph.n+'.';
  }

  // FALLBACK
  return 'I can\'t answer that one yet. I\'m good at questions about: <strong>your temp</strong> (why it\'s low/high, coverline), <strong>ovulation timing</strong> (when, did I), <strong>period prediction</strong> (when, am I late), <strong>pregnancy testing</strong> (when, why negative), <strong>luteal phase</strong> health, <strong>CM</strong> meaning, <strong>triphasic</strong>, and <strong>your personal patterns</strong>. Try rephrasing or pick from those.';
}



function ttcReport(ci){

  var r={good:[],improve:[]};
  if(od)r.good.push("Ovulation detected on Day "+od);else r.improve.push("No ovulation detected — consider more OPK testing");
  var cp=conceptionProb(ci);
  if(cp&&cp.pct>=70)r.good.push("Excellent intercourse timing ("+cp.pct+"%)");
  else if(cp&&cp.pct>=40)r.good.push("Good timing ("+cp.pct+"%) — try to add OV-1 or OV-2 next time");
  else if(cp)r.improve.push("Timing could improve ("+cp.pct+"%) — aim for every other day in fertile window");

  else if(cm&&cm.pct>=10)r.improve.push("Some fertile CM but could be better — stay hydrated, consider Evening Primrose Oil (follicular phase only)");

  return r
}

function dpoCompare(targetDPO){

/* Fertile window success rate across cycles */
function fwSuccess(){
  var results=[];
  D.cycles.forEach(function(c,i){
    if(isExcl(i))return;
    var eod=effOv(i);if(!eod)return;
    var cStart=new Date(c.key+'T12:00:00');
    var hitOV=false,hitOV1=false,hitOV2=false,totalHits=0;
    for(var d=eod-5;d<=eod;d++){

      if(D.sex[ds]){totalHits++;if(d===eod)hitOV=true;if(d===eod-1)hitOV1=true;if(d===eod-2)hitOV2=true}
    }

/* Cycle prediction accuracy */
function predAccuracy(){
  var results=[];
  D.cycles.forEach(function(c,i){
    if(i===0||!c.length||isExcl(i))return;
    // What would we have predicted based on cycles before this one?
    var prevLens=[];
    for(var j=0;j<i;j++){if(!isExcl(j)&&D.cycles[j].length&&D.cycles[j].length<45)prevLens.push(D.cycles[j].length)}
    if(!prevLens.length)return;
    var predicted=Math.round(prevLens.reduce(function(a,b){return a+b},0)/prevLens.length);
    var actual=c.length;
    var diff=actual-predicted;
    results.push({i:i,label:c.label,predicted:predicted,actual:actual,diff:diff});
  });
  return results;
}

/* Cycle regularity score */
function regularityScore(){
  var lens=[];
  D.cycles.forEach(function(c,i){if(!isExcl(i)&&c.length&&c.length<45)lens.push(c.length)});
  if(lens.length<3)return null;
  var avg=lens.reduce(function(a,b){return a+b},0)/lens.length;
  var variance=lens.reduce(function(a,b){return a+(b-avg)*(b-avg)},0)/lens.length;
  var sd=Math.sqrt(variance);
  // Score: 100 = perfectly regular, 0 = chaotic
  var score=Math.max(0,Math.round(100-sd*15));
  var lbl=score>=85?"Very regular":score>=70?"Regular":score>=50?"Somewhat variable":score>=30?"Variable":"Irregular";
  return{score:score,sd:sd.toFixed(1),lbl:lbl,count:lens.length};
}

/* OV probability — combines LH+, triphasic, total-above-coverline, and shift magnitude.
   Old version treated `consec` as fragile; a single dip below CL broke confirmation.
   This version weights the overall evidence instead. */
function ovProb(c,ci){
  var od=effOv(ci);if(!od)return null;
  var pre=c.readings.filter(function(r){return r.day<=od&&r.day>=od-6&&r.temp!=null});
  var post=c.readings.filter(function(r){return r.day>od&&r.temp!=null});
  if(!post.length)return{pct:10,lbl:"No post-OV data yet"};
  if(pre.length<2)return{pct:15,lbl:"Not enough pre-OV data to assess shift"};

  // Signal 1: Was there an LH+ test on or near the ovulation day?
  var ovR=c.readings.find(function(r){return r.day===od});
  var hasLHpos=!!(ovR&&ovR.ov);
  // Also check nearby days for LH+
  if(!hasLHpos){
    c.readings.forEach(function(r){if(r.ov&&Math.abs(r.day-od)<=2)hasLHpos=true});
  }

  // Signal 2: Temp shift magnitude (post-OV avg vs pre-OV avg)
  var preAvg=pre.reduce(function(a,b){return a+b.temp},0)/pre.length;
  var postAvg=post.reduce(function(a,b){return a+b.temp},0)/post.length;
  var shift=postAvg-preAvg;

  // Signal 3: Coverline and how many post-OV readings are above
  var preSorted=pre.map(function(r){return r.temp}).sort(function(a,b){return a-b});
  var med=preSorted.length%2===0?(preSorted[preSorted.length/2-1]+preSorted[preSorted.length/2])/2:preSorted[Math.floor(preSorted.length/2)];
  var cl=med+0.05;
  var above=0,consec=0,brokeConsec=false;
  for(var i=0;i<post.length;i++){
    if(post[i].temp>cl){above++;if(!brokeConsec)consec++}
    else{brokeConsec=true}
  }
  var total=post.length;
  var abovePct=total>0?Math.round(above/total*100):0;

  // Signal 4: Triphasic (a strong post-OV pattern confirming progesterone is holding)
  var tri=detectTriphasic(c,ci);
  var hasTri=!!(tri&&tri.found);

  var shiftStr=shift>=0?"+"+shift.toFixed(2):shift.toFixed(2);

  // Very early — not enough data to judge
  if(total<2)return{pct:hasLHpos?50:25,lbl:hasLHpos?"LH+ detected — waiting for temp shift to confirm ("+total+" post-OV reading)":"Only "+total+" reading — need 2-3 more days (shift "+shiftStr+"°)"};

  // STRONG CONFIRMATION: LH+ AND solid temp evidence
  if(hasLHpos&&shift>=0.2&&abovePct>=70)return{pct:99,lbl:"Fully confirmed — LH+, "+shiftStr+"° shift, "+above+"/"+total+" above coverline"+(hasTri?", triphasic":"")};
  if(hasLHpos&&shift>=0.15&&abovePct>=65)return{pct:97,lbl:"Confirmed — LH+ plus "+shiftStr+"° shift, "+abovePct+"% above coverline"+(hasTri?", triphasic":"")};
  if(hasLHpos&&shift>=0.1&&abovePct>=50)return{pct:92,lbl:"Confirmed — LH+ and temp shift ("+shiftStr+"°, "+abovePct+"% above CL)"};
  if(hasLHpos&&abovePct>=50)return{pct:85,lbl:"Likely confirmed — LH+ detected, temps holding ("+abovePct+"% above CL)"};
  if(hasLHpos)return{pct:70,lbl:"LH+ detected but temp shift unclear ("+shiftStr+"°)"};

  // No LH+ logged — rely on temp evidence alone
  if(shift>=0.2&&abovePct>=75)return{pct:90,lbl:"Confirmed by temps — "+shiftStr+"° shift, "+above+"/"+total+" above coverline"+(hasTri?", triphasic":"")};
  if(shift>=0.15&&abovePct>=65)return{pct:82,lbl:"Likely — "+shiftStr+"° shift, "+abovePct+"% above coverline"};
  if(shift>=0.15&&consec>=3)return{pct:78,lbl:"Likely — "+shiftStr+"° shift sustained over "+consec+" days"};
  if(shift>=0.1&&abovePct>=60)return{pct:65,lbl:"Probable — "+shiftStr+"° shift, "+above+"/"+total+" readings up"};
  if(shift>=0.1&&consec>=2)return{pct:55,lbl:"Emerging — "+shiftStr+"° shift building"};
  if(shift>=0.05)return{pct:35,lbl:"Possible — small "+shiftStr+"° shift, watching pattern"};
  if(shift>0)return{pct:20,lbl:"Minimal shift ("+shiftStr+"°) — may be too early or no clear rise yet"};
  return{pct:10,lbl:"No temp shift detected — temps flat or dropping"};
}
